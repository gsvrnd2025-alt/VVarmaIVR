<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart - V-VARMA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <?!= include('shared_styles'); ?>
</head>
<body>
  <?!= include('navbar'); ?>
  <main class="container my-5">
    <div class="row">
        <div class="col-lg-8">
            <div class="card shadow-sm border-0 rounded-4 overflow-hidden mb-4">
                <div class="card-header bg-dark text-white p-4">
                    <h4 class="mb-0 fw-bold"><i class="fas fa-shopping-cart me-2"></i>Your Shopping Cart</h4>
                </div>
                <div class="card-body p-0">
                    <div id="cartItemsContainer">
                        <!-- Items will be injected here -->
                        <div class="text-center py-5">
                            <div class="spinner-border text-primary" role="status"></div>
                            <p class="mt-3">Loading your cart...</p>
                        </div>
                    </div>
                </div>
            </div>
            <a href="<?= appUrl ?>?page=catalog" class="btn btn-outline-dark rounded-pill px-4">
                <i class="fas fa-arrow-left me-2"></i>Continue Shopping
            </a>
        </div>
        <div class="col-lg-4">
            <div class="card shadow-sm border-0 rounded-4 sticky-top" style="top: 100px;">
                <div class="card-body p-4">
                    <h5 class="fw-bold mb-4">Order Summary</h5>
                    <div class="d-flex justify-content-between mb-2">
                        <span>Subtotal</span>
                        <span id="cartSubtotal">₹0.00</span>
                    </div>
                    <div class="d-flex justify-content-between mb-4">
                        <span class="fw-bold h5">Total</span>
                        <span class="fw-bold h5 text-danger" id="cartTotal">₹0.00</span>
                    </div>
                    <div class="alert alert-warning border-0 rounded-3 p-3 mb-4 small" style="background-color: #fff9f0; color: #b75e00;">
                        <i class="fas fa-info-circle me-2 text-orange"></i>
                        <strong>Note on Wires:</strong> Wires will be measured on site and the cost will be evaluated accordingly. Wires rate is <strong>₹35 per meter</strong>.
                    </div>
                    <div class="d-flex gap-2 mb-3">
                        <button class="btn btn-outline-orange w-100 rounded-pill py-3 fw-bold" onclick="processCartAction('Enquiry')">
                            PLACE ENQUIRY
                        </button>
                        <button class="btn btn-orange w-100 rounded-pill py-3 fw-bold" onclick="processCartAction('Website Order')">
                            CHECKOUT
                        </button>
                    </div>
                    <div class="text-center">
                        <img src="https://www.gsvee.in/wp-content/uploads/2021/04/payments.png" alt="Payments" class="img-fluid opacity-75" style="max-height: 30px;" onerror="this.style.display='none'">
                    </div>
                </div>
            </div>
        </div>
    </div>
  </main>

  <style>
    .cart-item { border-bottom: 1px solid #eee; transition: background 0.2s; }
    .cart-item:hover { background: #fcfcfc; }
    .qty-input { width: 60px; text-align: center; border: 1px solid #ddd; border-radius: 5px; }
    .btn-qty { width: 30px; height: 30px; padding: 0; display: flex; align-items: center; justify-content: center; }
  </style>

  <script>
    function renderCart() {
        const cart = JSON.parse(localStorage.getItem('vvarma_cart') || '[]');
        const container = document.getElementById('cartItemsContainer');
        
        if (cart.length === 0) {
            container.innerHTML = `
                <div class="text-center py-5">
                    <i class="fas fa-shopping-basket fa-4x text-light mb-4"></i>
                    <h4 class="text-muted">Your cart is empty</h4>
                    <p class="text-secondary">Looks like you haven't added anything to your cart yet.</p>
                </div>
            `;
            updateSummary(0);
            return;
        }

        let html = '<div class="table-responsive"><table class="table table-borderless align-middle mb-0">';
        html += '<thead class="bg-light text-muted small uppercase"><tr><th class="ps-4">Product</th><th>Price</th><th>Quantity</th><th>Total</th><th></th></tr></thead><tbody>';
        
        let subtotal = 0;
        cart.forEach((item, index) => {
            const itemTotal = item.price * item.qty;
            subtotal += itemTotal;
            const isMaxStock = item.stock !== undefined && item.qty >= parseInt(item.stock, 10);
            
            const instPrice = parseFloat(item.installationCharges) || 0;
            const instChecked = item.installationChecked !== false;
            const accChecked = item.accessoriesChecked !== false;
            
            if (instPrice > 0 && instChecked) {
                subtotal += instPrice * item.qty;
            }
            if (accChecked) {
                subtotal += 300 * item.qty;
            }

            html += `
                <tr class="cart-item">
                    <td class="ps-4 py-4">
                        <div class="d-flex align-items-center">
                            <div class="bg-light rounded p-2 me-3" style="width: 60px; height: 60px; display: flex; align-items: center; justify-content: center;">
                                ${item.img ? `<img src="${item.img}" style="max-width:100%; max-height:100%; object-fit:contain;">` : `<i class="fas fa-box text-secondary"></i>`}
                            </div>
                            <div>
                                <h6 class="mb-0 fw-bold">${item.productTitle || item.ProductTitle || item.name}</h6>
                                <small class="text-muted">${item.code}</small>
                            </div>
                        </div>
                    </td>
                    <td>₹${item.price.toLocaleString('en-IN')}</td>
                    <td>
                        <div class="d-flex align-items-center">
                            <button class="btn btn-sm btn-outline-secondary btn-qty ${item.qty <= 1 ? 'opacity-50' : ''}" onclick="updateQty(${index}, -1)" ${item.qty <= 1 ? 'disabled' : ''}>-</button>
                            <input type="text" class="qty-input mx-2" value="${item.qty}" readonly>
                            <button class="btn btn-sm btn-outline-secondary btn-qty" onclick="updateQty(${index}, 1)">+</button>
                        </div>
                    </td>
                    <td class="fw-bold">₹${itemTotal.toFixed(2)}</td>
                    <td class="pe-4">
                        <button class="btn btn-link text-danger" onclick="removeItem(${index})"><i class="fas fa-trash-alt"></i></button>
                    </td>
                </tr>
            `;

            if (instPrice > 0) {
                html += `
                    <tr class="installation-row bg-light" style="border-bottom: 1px dashed #eee;">
                        <td class="ps-5 py-3">
                            <div class="d-flex align-items-center">
                                <input type="checkbox" class="form-check-input me-3 border-orange" style="transform: scale(1.2); accent-color: #f18912; cursor: pointer;" ${instChecked ? 'checked' : ''} onchange="toggleInstallationChecked(${index})">
                                <div>
                                    <span class="text-secondary small fw-bold"><i class="fas fa-tools me-2 text-orange"></i>${item.productTitle || item.name} - Installation Charges</span>
                                </div>
                            </div>
                        </td>
                        <td class="text-secondary small">₹${instPrice.toLocaleString('en-IN')}</td>
                        <td class="text-secondary small ps-3">${item.qty}</td>
                        <td class="text-secondary small fw-bold">₹${(instPrice * item.qty).toFixed(2)}</td>
                        <td></td>
                    </tr>
                `;
            }

            html += `
                <tr class="accessories-row bg-light" style="border-bottom: 1px solid #eee;">
                    <td class="ps-5 py-3">
                        <div class="d-flex align-items-center">
                            <input type="checkbox" class="form-check-input me-3 border-orange" style="transform: scale(1.2); accent-color: #f18912; cursor: pointer;" ${accChecked ? 'checked' : ''} onchange="toggleAccessoriesChecked(${index})">
                            <div>
                                <span class="text-secondary small fw-bold"><i class="fas fa-cubes me-2 text-orange"></i>${item.productTitle || item.name} - Accessories Included</span>
                            </div>
                        </div>
                    </td>
                    <td class="text-secondary small">₹300</td>
                    <td class="text-secondary small ps-3">${item.qty}</td>
                    <td class="text-secondary small fw-bold">₹${(300 * item.qty).toFixed(2)}</td>
                    <td></td>
                </tr>
            `;
        });
        html += '</tbody></table></div>';
        container.innerHTML = html;
        updateSummary(subtotal);
    }

    function updateQty(index, delta) {
        const cart = JSON.parse(localStorage.getItem('vvarma_cart') || '[]');
        let newQty = cart[index].qty + delta;
        if (newQty < 1) newQty = 1;
        
        // Stock Check
        const stockVal = cart[index].stock !== undefined ? parseInt(cart[index].stock, 10) : 999;
        if (delta > 0 && newQty > stockVal) {
            Swal.fire('Out of Stock', `Only ${stockVal} items left in stock for ${cart[index].productTitle || cart[index].name}.`, 'warning');
            return;
        }

        cart[index].qty = newQty;
        localStorage.setItem('vvarma_cart', JSON.stringify(cart));
        renderCart();
        if (typeof updateCartBadge === 'function') updateCartBadge();
    }

    function toggleInstallationChecked(index) {
        const cart = JSON.parse(localStorage.getItem('vvarma_cart') || '[]');
        if (cart[index]) {
            cart[index].installationChecked = cart[index].installationChecked === false ? true : false;
            localStorage.setItem('vvarma_cart', JSON.stringify(cart));
            renderCart();
            if (typeof updateCartBadge === 'function') updateCartBadge();
        }
    }

    function toggleAccessoriesChecked(index) {
        const cart = JSON.parse(localStorage.getItem('vvarma_cart') || '[]');
        if (cart[index]) {
            cart[index].accessoriesChecked = cart[index].accessoriesChecked === false ? true : false;
            localStorage.setItem('vvarma_cart', JSON.stringify(cart));
            renderCart();
            if (typeof updateCartBadge === 'function') updateCartBadge();
        }
    }

    function removeItem(index) {
        if (!confirm('Are you sure you want to remove this item?')) return;
        const cart = JSON.parse(localStorage.getItem('vvarma_cart') || '[]');
        cart.splice(index, 1);
        localStorage.setItem('vvarma_cart', JSON.stringify(cart));
        renderCart();
        if (typeof updateCartBadge === 'function') updateCartBadge();
    }

    function updateSummary(subtotal) {
        document.getElementById('cartSubtotal').innerText = '₹' + subtotal.toFixed(2);
        document.getElementById('cartTotal').innerText = '₹' + subtotal.toFixed(2);
    }

    async function processCartAction(type) {
        const cart = JSON.parse(localStorage.getItem('vvarma_cart') || '[]');
        if (cart.length === 0) {
            Swal.fire('Empty Cart', 'Your cart is empty!', 'warning');
            return;
        }

        // Step 1: Get Mobile Number
        const { value: mobile } = await Swal.fire({
            title: 'Verify Details',
            text: 'Please enter your mobile number',
            input: 'text',
            inputPlaceholder: '10-digit mobile number',
            showCancelButton: true,
            confirmButtonText: 'Next',
            confirmButtonColor: '#f18912',
            inputValidator: (value) => {
                if (!value || value.length < 10) {
                    return 'Please enter a valid mobile number';
                }
            }
        });

        if (!mobile) return; // Cancelled

        Swal.fire({ title: 'Verifying...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        
        // Step 2: Verify user
        google.script.run
            .withSuccessHandler(async function(res) {
                let customerName = '';
                if (res.exists) {
                    customerName = res.name;
                    // Confirm name
                    const { value: confirmName } = await Swal.fire({
                        title: 'Welcome Back!',
                        text: `Continue as ${customerName}?`,
                        showCancelButton: true,
                        confirmButtonText: 'Yes, Continue',
                        cancelButtonText: 'No, change name'
                    });
                    
                    if (!confirmName) {
                        const { value: newName } = await Swal.fire({
                            title: 'Enter Name', input: 'text', required: true,
                            inputValidator: (val) => !val && 'Name is required'
                        });
                        if (!newName) return;
                        customerName = newName;
                    }
                } else {
                    // Ask to register
                    const { isConfirmed } = await Swal.fire({
                        title: 'New Customer',
                        text: 'You need to register to place an order.',
                        icon: 'info',
                        showCancelButton: true,
                        confirmButtonText: 'Register Now',
                    });
                    if (isConfirmed) {
                        window.location.href = '<?= appUrl ?>?page=register&redirect=cart';
                    }
                    return;
                }

                let installRequired = cart.some(item => (parseFloat(item.installationCharges) > 0) && (item.installationChecked !== false));
                let paymentMethod = '';
                
                // Extra Checkout Steps
                if (type === 'Checkout' || type === 'Website Order') {

                    // Step 4: Payment Prompt
                    const paymentRes = await Swal.fire({
                        title: 'Payment Method',
                        text: 'Choose how you want to pay.',
                        icon: 'info',
                        showCancelButton: true,
                        showDenyButton: true,
                        confirmButtonText: '<i class="fas fa-qrcode"></i> UPI / GPay',
                        denyButtonText: '<i class="fas fa-money-bill-wave"></i> Cash After Installation',
                        cancelButtonText: 'Cancel',
                        confirmButtonColor: '#007bff',
                        denyButtonColor: '#28a745'
                    });

                    if (paymentRes.isDismissed) return; // Cancelled

                    if (paymentRes.isConfirmed) {
                        paymentMethod = 'UPI';
                        await Swal.fire({
                            title: 'UPI Payment',
                            html: '<p>Please scan the QR code to pay or use your UPI app.</p><img src="https://upload.wikimedia.org/wikipedia/commons/d/d0/QR_code_for_mobile_English_Wikipedia.svg" style="width:200px;height:200px;">',
                            confirmButtonText: 'I have Paid',
                            confirmButtonColor: '#f18912'
                        });
                    } else if (paymentRes.isDenied) {
                        paymentMethod = 'Cash';
                        const confirmCash = await Swal.fire({
                            title: 'Cash Payment',
                            text: 'You can pay after installation. Note: A cancellation penalty of ₹50 applies if you cancel later.',
                            icon: 'warning',
                            showCancelButton: true,
                            confirmButtonText: 'Accept & Continue',
                            confirmButtonColor: '#f18912'
                        });
                        if (!confirmCash.isConfirmed) return;
                    }
                }

                // Final Step: Place Order
                Swal.fire({ title: 'Processing...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                
                // Compute exact installation charge total from cart
                let installCharge = 0;
                cart.forEach(item => {
                    if (parseFloat(item.installationCharges) > 0 && item.installationChecked !== false) {
                        installCharge += (parseFloat(item.installationCharges) || 0) * item.qty;
                    }
                });
                
                google.script.run
                    .withSuccessHandler(function(response) {
                        if (response.success) {
                            Swal.fire('Success!', type === 'Enquiry' ? 'Your enquiry has been sent.' : 'Your order has been placed successfully.', 'success');
                            localStorage.removeItem('vvarma_cart');
                            renderCart();
                            if (typeof updateCartBadge === 'function') updateCartBadge();
                        } else {
                            Swal.fire('Error', response.message || 'Something went wrong.', 'error');
                        }
                    })
                    .withFailureHandler(function(error) {
                        Swal.fire('Error', 'Failed to communicate with server.', 'error');
                    })
                    .placeOrderFromWebsite(cart, customerName, mobile, type, paymentMethod, installRequired, installCharge);
                    
            }).withFailureHandler(e => Swal.fire('Error', 'Verification failed', 'error'))
            .verifyCustomerMobile(mobile);
    }

    document.addEventListener('DOMContentLoaded', renderCart);
  </script>

  <?!= include('floating_icons'); ?>
  <?!= include('chat_widget'); ?>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

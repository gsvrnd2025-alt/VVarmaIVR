<!-- V-VARMA V3 Chat Widget -->
<?!= include('ChatWidget_styles'); ?>

<!-- Chat Tagline and Icon Wrapper -->

    <div id="chatTagline">Varma Chat Assist Bot</div>
    <div id="customerChatIcon" onclick="toggleCustomerChat()">
        <svg width="40" height="40" viewBox="0 0 100 110" xmlns="http://www.w3.org/2000/svg">
            <path d="M50 5 C50 5 75 8 95 20 C95 55 75 90 50 105 C25 90 5 55 5 20 C25 8 50 5 50 5 Z" fill="url(#goldGrad)" />
            <path d="M50 10 C50 10 73 12 88 23 C88 53 70 85 50 97 C30 85 12 53 12 23 C27 12 50 10 50 10 Z" fill="url(#blueGrad)" />
            <path d="M50 10 C27 12 12 23 12 23 C12 53 30 85 50 97 C25 65 20 25 50 10 Z" fill="rgba(255,255,255,0.4)" />
            <path d="M28 35 L48 82 L78 22 L62 22 L48 58 L42 35 Z" fill="#000000" stroke="#ffffff" stroke-width="5" stroke-linejoin="round" />
            <defs>
                <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#f5d061" />
                    <stop offset="50%" stop-color="#cca829" />
                    <stop offset="100%" stop-color="#9a6411" />
                </linearGradient>
                <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#b6f1ff" />
                    <stop offset="50%" stop-color="#4cc3f0" />
                    <stop offset="100%" stop-color="#1481c2" />
                </linearGradient>
            </defs>
        </svg>
    </div>
</div>

<!-- Customer Chat Window -->
<div id="customerChatWindow" class="vvarma-chat-widget">
    <div class="chat-header">
        <div class="chat-header-info">
            <div class="chat-avatar" style="background:transparent;">
                <svg width="35" height="40" viewBox="0 0 100 110" xmlns="http://www.w3.org/2000/svg">
                    <path d="M50 5 C50 5 75 8 95 20 C95 55 75 90 50 105 C25 90 5 55 5 20 C25 8 50 5 50 5 Z"
                        fill="url(#avatarGoldGrad)" />
                    <path d="M50 10 C50 10 73 12 88 23 C88 53 70 85 50 97 C30 85 12 53 12 23 C27 12 50 10 50 10 Z"
                        fill="url(#avatarBlueGrad)" />
                    <path d="M50 10 C27 12 12 23 12 23 C12 53 30 85 50 97 C25 65 20 25 50 10 Z"
                        fill="rgba(255,255,255,0.4)" />
                    <path d="M28 35 L48 82 L78 22 L62 22 L48 58 L42 35 Z" fill="#000000" stroke="#ffffff"
                        stroke-width="5" stroke-linejoin="round" />
                    <defs>
                        <linearGradient id="avatarGoldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#f5d061" />
                            <stop offset="50%" stop-color="#cca829" />
                            <stop offset="100%" stop-color="#9a6411" />
                        </linearGradient>
                        <linearGradient id="avatarBlueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#b6f1ff" />
                            <stop offset="50%" stop-color="#4cc3f0" />
                            <stop offset="100%" stop-color="#1481c2" />
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <div>
                <strong style="display:block;line-height:1.2;">V-VARMA Assistant</strong>
                <small style="color: #d1ecf1;">Online</small>
            </div>
        </div>
        <button class="btn btn-sm btn-link text-white" style="font-size:20px;" onclick="toggleCustomerChat()"><i
                class="fas fa-times"></i></button>
    </div>
    <div class="chat-body" id="customerChatBody">
        <!-- Messages will be injected here -->
    </div>
    <div class="chat-input-area" id="customerChatInputArea">
        <input type="text" class="chat-input" id="customerChatInput" placeholder="Type a message..."
            onkeypress="handleChatInputKey(event)">
        <button class="chat-send-btn" onclick="sendCustomerChatMsg()"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script>
    // Chat Global Variables
    let currentChatSessionId = null;
    let currentChatPhone = null;
    let currentChatRole = 'Customer';
    let chatPollInterval = null;
    let customerChatActiveFlow = 'welcome';
    let customerProvidedData = {};

    function toggleCustomerChat() {
        if (window.chatContext === 'admin' || window.chatContext === 'tech') {
            // Open Admin/Tech internal chat instead of consumer chatbot
            if (window.chatContext === 'admin') {
                document.querySelectorAll('#adminDashboard .admin-panel').forEach(p => p.style.display = 'none');
                document.getElementById('universalChatDashboardSection').style.display = 'block';
                loadAdminChatDashboard('Admin', 'Admin');
            } else {
                document.querySelectorAll('#technicianDashboard .tech-panel').forEach(p => p.style.display = 'none');
                document.getElementById('universalChatDashboardTechSection').style.display = 'block';
                loadAdminChatDashboard('Technician', (window.currentTech && window.currentTech.Name) || 'Tech');
            }
            return;
        }

        const win = document.getElementById('customerChatWindow');
        if (win.style.display === 'none' || win.style.display === '') {
            win.style.display = 'flex';
            if (!currentChatSessionId && document.getElementById('customerChatBody').innerHTML.trim() === '') {
                startChatbotFlow();
            }
        } else {
            win.style.display = 'none';
        }
    }

    // --- Interactive Mouse Tracking & Flashing Tagline Logic ---
    document.addEventListener('DOMContentLoaded', () => {
        // Tagline Sequencer
        const taglines = ["Varma Chat Assist Bot", "How may I help you?", "Use me"];
        let tagIdx = 0;
        setInterval(() => {
            const el = document.getElementById('chatTagline');
            if (el) {
                el.style.opacity = '0';
                setTimeout(() => {
                    tagIdx = (tagIdx + 1) % taglines.length;
                    el.innerText = taglines[tagIdx];
                    el.style.opacity = '1';
                }, 500);
            }
        }, 3500);

        // Mouse Tracker
        document.addEventListener('mousemove', (e) => {
            const icon = document.getElementById('customerChatIcon');
            if (!icon) return;
            const rect = icon.getBoundingClientRect();
            const iconX = rect.left + rect.width / 2;
            const iconY = rect.top + rect.height / 2;

            const deltaX = e.clientX - iconX;
            const deltaY = e.clientY - iconY;

            // Simple 3d rotation bounds
            const maxRot = 25;
            const rotX = Math.max(-maxRot, Math.min(maxRot, -(deltaY / 15))); 
            const rotY = Math.max(-maxRot, Math.min(maxRot, (deltaX / 15))); 

            icon.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg) scale(1.05)`;
        });
    });

    function appendSystemMessage(text, options = []) {
        const body = document.getElementById('customerChatBody');
        let optsHtml = '';
        if (options.length > 0) {
            optsHtml = `<div class="chat-options-container">` +
                options.map(opt => `<div class="chat-option-btn" onclick="handleChatOption('${opt.value}')">${opt.label}</div>`).join('') +
                `</div>`;
        }
        const html = `<div class="chat-msg received slide-in"><div class="msg-content">${text}</div>${optsHtml}<span class="chat-msg-time">Just now</span></div>`;
        body.insertAdjacentHTML('beforeend', html);
        body.scrollTop = body.scrollHeight;
    }

    function appendUserMessage(text) {
        const body = document.getElementById('customerChatBody');
        const html = `<div class="chat-msg sent fade-in"><div class="msg-content">${text}</div><span class="chat-msg-time">Just now</span></div>`;
        body.insertAdjacentHTML('beforeend', html);
        body.scrollTop = body.scrollHeight;
    }

    function startChatbotFlow() {
        document.getElementById('customerChatBody').innerHTML = '';
        customerProvidedData = {};
        customerChatActiveFlow = 'welcome';
        appendSystemMessage("Welcome to V-VARMA! I'm your virtual assistant. How can I help you today?", [
            { label: 'Sales Enquiry', value: 'Sales' },
            { label: 'Register a Complaint', value: 'Complaint' },
            { label: 'Service Tracker', value: 'Service_Tracker' }
        ]);
        document.getElementById('customerChatInputArea').style.display = 'flex';
    }

    function handleChatOption(value) {
        appendUserMessage(value);
        customerChatActiveFlow = value;

        // Check if session can be preserved on reload
        setTimeout(() => {
            appendSystemMessage(`You selected ${value}. Please verify your identity. Enter your registered Mobile Number (10 digits).`);
            document.getElementById('customerChatInputArea').style.display = 'flex';
            document.getElementById('customerChatInput').focus();
        }, 500);
    }

    function handleChatInputKey(e) {
        if (e.key === 'Enter') sendCustomerChatMsg();
    }

    function sendCustomerChatMsg() {
        const input = document.getElementById('customerChatInput');
        const val = input.value.trim();
        if (!val) return;

        appendUserMessage(val);
        input.value = '';

        if (currentChatSessionId) {
            // Send to live chat
            google.script.run.withSuccessHandler(res => {
                if (res.success) {
                    // message sent successfully
                }
            }).sendChatMessage({
                sessionId: currentChatSessionId,
                sender: currentChatPhone || 'Guest',
                senderRole: 'Customer',
                content: val
            });
            return;
        }

        // Chatbot Flow Logic
        if (customerChatActiveFlow !== 'live') {
            processChatbotInput(val);
        }
    }

    function processChatbotInput(val) {
        const lval = val.toLowerCase();
        const greetings = ['hi', 'hello', 'hey', 'greetings', 'namaste'];

        // Check if user is in initial greeting state
        if (customerChatActiveFlow === 'welcome') {
            if (greetings.includes(lval)) {
                appendSystemMessage("Hello there! How can I help you today?");
                return;
            } else if (lval.includes('how are you')) {
                appendSystemMessage("I'm doing well, thank you! How can I assist you today?");
                return;
            } else if (lval.includes('who are you') || lval.includes('what are you')) {
                appendSystemMessage("I am the V-VARMA Virtual AI Assistant. I can help you with sales, complaints, or tracking service requests. What do you need help with?");
                return;
            } else if (!customerProvidedData.phone && !/^[0-9]{10}$/.test(val)) {
                appendSystemMessage("I can definitely help with that. Are you looking for Sales, Complaints, or to Track a Service?", [
                    { label: 'Sales Enquiry', value: 'Sales' },
                    { label: 'Register a Complaint', value: 'Complaint' },
                    { label: 'Service Tracker', value: 'Service_Tracker' }
                ]);
                return;
            }
        }

        if (!customerProvidedData.phone) {
            if (/^[0-9]{10}$/.test(val)) {
                customerProvidedData.phone = val;
                currentChatPhone = val;

                // Initiate session
                google.script.run.withSuccessHandler(res => {
                    if (res.success) {
                        currentChatSessionId = res.sessionId;
                        if (!res.isNew && res.sessionData) {
                            appendSystemMessage(`Welcome back! You have an open active session. Connecting you...`, [{ label: 'Load History', value: 'load_history' }]);
                        } else {
                            askForNextDetail();
                        }
                    }
                }).initChatSession({
                    phone: val,
                    type: customerChatActiveFlow,
                    deviceInfo: navigator.userAgent
                });
            } else {
                if (greetings.includes(lval)) {
                    appendSystemMessage("Hello! Please enter your 10-digit mobile number so I can verify your account.");
                } else if (lval.includes('how are you')) {
                    appendSystemMessage("I'm doing great! Please provide your 10-digit mobile number to proceed.");
                } else {
                    appendSystemMessage("Please enter a valid 10-digit mobile number to proceed.");
                }
            }
            return;
        }

        // Processing based on flow type
        if (customerProvidedData.awaitingConfirmation) {
            if (val.toLowerCase() === 'yes' || val.toLowerCase() === 'y') {
                customerProvidedData.awaitingConfirmation = false;
                if (customerChatActiveFlow === 'Complaint') {
                    finalizeComplaint();
                } else {
                    transferToAgent();
                }
            } else {
                customerProvidedData.awaitingConfirmation = false;
                appendSystemMessage(`Okay. Please provide any other identifier (Serial Number, etc.) so I can verify.`);
                customerProvidedData.awaitingAltInput = true;
            }
            return;
        }

        if (customerProvidedData.awaitingAltInput) {
            customerProvidedData.altId = val;
            fetchDetails(val);
            customerProvidedData.awaitingAltInput = false;
            return;
        }

        if (val === 'load_history') {
            customerChatActiveFlow = 'live';
            startPolling();
            return;
        }
    }

    function askForNextDetail() {
        if (customerChatActiveFlow === 'Complaint' || customerChatActiveFlow === 'Service_Tracker') {
            appendSystemMessage("Fetching your registered products...");
            fetchDetails(currentChatPhone);
        } else {
            transferToAgent();
        }
    }

    function fetchDetails(identifier) {
        google.script.run.withSuccessHandler(res => {
            if (res.success && res.details) {
                const d = res.details;
                customerProvidedData.record = d;
                let msg = `I found a record:<br><b>Product:</b> ${d.productName}<br><b>Name:</b> ${d.customerName}<br>`;
                if (d.type === 'Complaint') msg += `<b>Status:</b> ${d.status}<br><b>Issue:</b> ${d.issue}`;
                else msg += `<b>Warranty Ends:</b> ${d.warrantyEnd}`;
                msg += `<br><br>Is this the correct product?`;
                appendSystemMessage(msg, [{ label: 'Yes', value: 'Yes' }, { label: 'No', value: 'No' }]);
                customerProvidedData.awaitingConfirmation = true;
            } else {
                appendSystemMessage("I couldn't find a record for this number. Do you have a serial number or ID?",
                    [{ label: 'Contact Technician', value: 'Contact Tech' }, { label: 'Main Menu', value: 'Menu' }]);
                customerProvidedData.awaitingAltInput = true;
            }
        }).resolveChatComplaintDetails(identifier);
    }

    function finalizeComplaint() {
        appendSystemMessage("Booking your complaint...");
        google.script.run.withSuccessHandler(res => {
            if (res.success) {
                appendSystemMessage("Your complaint has been successfully booked!");
                transferToAgent("I want to speak with a technician regarding my complaint.");
            } else {
                appendSystemMessage("Failed to book complaint automatically. Transferring to human agent...");
                transferToAgent();
            }
        }).bookComplaintFromChat({
            phone: currentChatPhone,
            name: customerProvidedData.record ? customerProvidedData.record.customerName : 'Cust',
            model: customerProvidedData.record ? customerProvidedData.record.productName : ''
        });
    }

    function transferToAgent(initialMessage) {
        customerChatActiveFlow = 'live';
        appendSystemMessage("Connecting you to our team. Please wait while an agent or technician joins the chat...");
        if (initialMessage) {
            document.getElementById('customerChatInput').value = initialMessage;
            sendCustomerChatMsg();
        }
        startPolling();
    }

    function startPolling() {
        if (chatPollInterval) clearInterval(chatPollInterval);
        loadChatMessages(); // Initial load
        chatPollInterval = setInterval(loadChatMessages, 5000);
    }

    function loadChatMessages() {
        if (!currentChatSessionId) return;
        google.script.run.withSuccessHandler(res => {
            if (res.success) {
                renderMessages(res.messages, 'Customer');
            }
        }).getChatHistory(currentChatSessionId);
    }

    function renderMessages(messages, viewerRole) {
        let bodyId = viewerRole === 'Customer' ? 'customerChatBody' : 'adminChatBody';
        const body = document.getElementById(bodyId);

        // Extract last message ID to avoid full re-render flickering
        const currentMsgs = Array.from(body.querySelectorAll('.chat-msg'));
        
        // Quick re-render approach
        let html = '';
        messages.forEach(m => {
            const isMe = m.senderRole === viewerRole;
            const msgClass = isMe ? 'sent' : 'received';
            const senderLabel = isMe ? '' : `<strong>${m.senderRole}</strong><br>`;
            html += `<div class="chat-msg ${msgClass}"><div class="msg-content">${senderLabel}${m.content}</div><span class="chat-msg-time">${m.timestamp}</span></div>`;
        });

        // Only update if content changed
        if (body.innerHTML.length !== html.length) {
            body.innerHTML = html;
            body.scrollTop = body.scrollHeight;
        }
    }

    // ==========================================
    // ADMIN / TECHNICIAN DASHBOARD LOGIC
    // ==========================================
    function loadAdminChatDashboard(role, userId) {
        const containerId = role === 'Admin' ? 'universalChatDashboardAdmin' : 'universalChatDashboardTech';
        const container = document.getElementById(containerId);
        if (!container) return;

        // Store globally for message handler
        window.currentUserRole = role;
        window.currentUserId = userId;

        container.innerHTML = `
        <div class="chat-dashboard">
            <div class="chat-sidebar">
                <div class="chat-sidebar-header">
                    <h6 class="mb-0">Active Conversations</h6>
                </div>
                <div class="chat-list" id="adminChatList">
                    <div class="p-3 text-center text-muted"><i class="fas fa-spinner fa-spin"></i> Loading...</div>
                </div>
            </div>
            <div class="chat-main">
                <div class="chat-main-overlay" id="chatMainOverlay">
                    <i class="fas fa-comments fs-1 text-muted mb-3"></i>
                    <h5>Select a chat to start messaging</h5>
                </div>
                <div class="chat-header" id="adminChatHeader" style="display:none;">
                    <div class="chat-header-info">
                        <div class="chat-avatar"><i class="fas fa-user"></i></div>
                        <div>
                            <strong id="adminChatTitle" style="display:block;line-height:1.2;">Customer</strong>
                            <small id="adminChatSub" style="color: #d1ecf1;">Phone / Type</small>
                        </div>
                    </div>
                    <div>
                        <button class="btn btn-sm btn-outline-light me-2" onclick="assignToMe('${userId}')" title="Assign to me"><i class="fas fa-hand-paper"></i> Take Over</button>
                        <button class="btn btn-sm btn-danger" onclick="closeAdminChat()" title="Close chat"><i class="fas fa-times"></i></button>
                    </div>
                </div>
                <div class="chat-body" id="adminChatBody" style="display:none; background-color:#eaeaea; flex:1;">
                    <!-- Messages -->
                </div>
                <div class="chat-input-area" id="adminChatInputArea" style="display:none;">
                    <input type="text" class="chat-input" id="adminChatInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendAdminChatMsg('${role}', '${userId}')">
                    <button class="chat-send-btn" onclick="sendAdminChatMsg('${role}', '${userId}')"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    `;

        refreshAdminChatList(role, userId);
        if (!window.adminChatListInterval) window.adminChatListInterval = setInterval(() => refreshAdminChatList(role, userId), 10000);
    }

    function refreshAdminChatList(role, userId) {
        google.script.run.withSuccessHandler(res => {
            const listDiv = document.getElementById('adminChatList');
            if (!listDiv) return;
            if (res.length === 0) listDiv.innerHTML = '<div class="p-3 text-center text-muted">No active chats.</div>';
            else {
                listDiv.innerHTML = res.map(chat => `
                <div class="chat-list-item" onclick="openAdminChatSession('${chat.sessionId}', '${chat.customerName}', '${chat.phone}', '${chat.type}')">
                    <div class="cli-avatar"><i class="fas fa-user"></i></div>
                    <div class="cli-info">
                        <div class="cli-title"><span>${chat.customerName || chat.phone}</span> <span class="cli-time">${chat.updatedAt.split(' ')[1] || ''}</span></div>
                        <div class="cli-desc">${chat.type} | ${chat.status}</div>
                    </div>
                </div>
            `).join('');
            }
        }).getActiveChatsByRole(role, userId);
    }

    let activeAdminSessionId = null;
    let adminPollInterval = null;

    function openAdminChatSession(sessionId, name, phone, type) {
        document.getElementById('chatMainOverlay').style.display = 'none';
        document.getElementById('adminChatHeader').style.display = 'flex';
        document.getElementById('adminChatBody').style.display = 'block';
        document.getElementById('adminChatInputArea').style.display = 'flex';

        document.getElementById('adminChatTitle').innerText = name || phone;
        document.getElementById('adminChatSub').innerText = phone + ' | ' + type;

        activeAdminSessionId = sessionId;

        if (adminPollInterval) clearInterval(adminPollInterval);
        loadAdminChatMessages();
        adminPollInterval = setInterval(loadAdminChatMessages, 5000);
    }

    function loadAdminChatMessages() {
        if (!activeAdminSessionId) return;
        google.script.run.withSuccessHandler(res => {
            if (res.success) {
                renderMessages(res.messages, window.currentUserRole || 'Admin');
            }
        }).getChatHistory(activeAdminSessionId);
    }

    function sendAdminChatMsg(role, userId) {
        const input = document.getElementById('adminChatInput');
        const val = input.value.trim();
        if (!val || !activeAdminSessionId) return;

        input.value = '';

        google.script.run.withSuccessHandler(res => {
            if (res.success) loadAdminChatMessages();
        }).sendChatMessage({
            sessionId: activeAdminSessionId,
            sender: userId,
            senderRole: role,
            content: val
        });
    }

    function assignToMe(userId) {
        if (!activeAdminSessionId) return;
        google.script.run.withSuccessHandler(res => {
            if (res.success) alert("Chat assigned to you.");
        }).assignChatSession(activeAdminSessionId, userId);
    }

    function closeAdminChat() {
        if (!activeAdminSessionId) return;
        google.script.run.withSuccessHandler(res => {
            if (res.success) {
                activeAdminSessionId = null;
                document.getElementById('chatMainOverlay').style.display = 'flex';
                document.getElementById('adminChatHeader').style.display = 'none';
                document.getElementById('adminChatBody').style.display = 'none';
                document.getElementById('adminChatInputArea').style.display = 'none';
            }
        }).closeChatSession(activeAdminSessionId);
    }
</script>

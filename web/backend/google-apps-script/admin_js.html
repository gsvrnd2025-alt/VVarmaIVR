    function calculateDiscount() {
        const mrpInput = document.getElementById('cat-mrp');
        const sellInput = document.getElementById('cat-selling');
        const offerInput = document.getElementById('cat-offer');
        
        const mrp = parseFloat(mrpInput.value) || 0;
        const sell = parseFloat(sellInput.value) || 0;
        const offer = parseFloat(offerInput.value) || 0;
        
        // Final effective price is the lowest of selling or offer price (if set)
        const finalPrice = offer > 0 ? offer : sell;
        
        if (finalPrice > mrp && mrp > 0) {
            if (offer > mrp) offerInput.classList.add('is-invalid');
            else sellInput.classList.add('is-invalid');
            document.getElementById('cat-discount').value = 'Error';
            document.getElementById('cat-discount').style.color = 'red';
        } else {
            sellInput.classList.remove('is-invalid');
            offerInput.classList.remove('is-invalid');
            document.getElementById('cat-discount').style.color = 'inherit';
            if (mrp > 0 && finalPrice > 0) {
                const disc = ((mrp - finalPrice) / mrp) * 100;
                document.getElementById('cat-discount').value = disc.toFixed(1) + '%';
            } else {
                document.getElementById('cat-discount').value = '0%';
            }
        }
    }

    function processCatalogFiles(files, index) {
        if (index >= files.length) {
            document.getElementById('cat-image-input').value = ''; // Reset input
            return;
        }
        
        const reader = new FileReader();
        reader.onload = function(e) {
            catalogCurrentEditingIndex = -1; // New image
            catalogEditingType = 'image';
            initCatalogCropper(e.target.result, () => {
                processCatalogFiles(files, index + 1);
            });
        };
        reader.readAsDataURL(files[index]);
    }

    function initCatalogCropper(imgData, callback) {
        const modalEl = document.getElementById('catalogImageModal');
        const modal = new bootstrap.Modal(modalEl);
        const image = document.getElementById('catalog-cropper-image');
        image.src = imgData;
        
        const skipBtn = document.getElementById('catalog-skip-btn');
        if (callback && skipBtn) skipBtn.style.display = 'block';
        else if (skipBtn) skipBtn.style.display = 'none';

        if (catalogCropper) catalogCropper.destroy();

        // Highlight correct aspect button based on type
        document.querySelectorAll('.aspect-btn').forEach(b => b.classList.remove('active'));
        const aspectButtons = document.querySelectorAll('.aspect-btn');
        let initialRatio = 1;
        if (catalogEditingType === 'banner') {
            initialRatio = NaN;
            // "Free" is the 5th button (index 4)
            if (aspectButtons[4]) aspectButtons[4].classList.add('active');
        } else {
            // "1:1" is the 1st button (index 0)
            if (aspectButtons[0]) aspectButtons[0].classList.add('active');
        }

        modal.show();
        
        modalEl.addEventListener('shown.bs.modal', function onShown() {
            catalogCropper = new Cropper(image, {
                aspectRatio: initialRatio,
                viewMode: 1,
                dragMode: 'move',
                autoCropArea: 0.8,
                responsive: true
            });
            modalEl.removeEventListener('shown.bs.modal', onShown);
        }, { once: true });

        window._catalogCropCallback = callback;
    }

    function applyCatalogCrop() {
        if (!catalogCropper) return;
        
        let canvas;
        if (catalogEditingType === 'banner') {
            canvas = catalogCropper.getCroppedCanvas();
        } else {
            canvas = catalogCropper.getCroppedCanvas({ maxWidth: 1200, maxHeight: 1200 });
        }
        
        const croppedData = canvas.toDataURL('image/jpeg', 0.8);
        
        if (catalogEditingType === 'banner') {
            if (catalogCurrentEditingIndex !== -1) {
                catalogBanners[catalogCurrentEditingIndex].url = croppedData;
            } else {
                catalogBanners.push({
                    url: croppedData,
                    title: ''
                });
            }
            renderCatalogBannersPreviews();
        } else {
            if (catalogCurrentEditingIndex !== -1) {
                catalogImages[catalogCurrentEditingIndex].url = croppedData;
            } else {
                catalogImages.push({
                    url: croppedData,
                    isPrimary: catalogImages.length === 0
                });
            }
            renderCatalogImagePreviews();
        }
        
        bootstrap.Modal.getInstance(document.getElementById('catalogImageModal')).hide();
        
        if (window._catalogCropCallback) {
            const cb = window._catalogCropCallback;
            window._catalogCropCallback = null;
            cb();
        }
    }

        Swal.fire({

    function autoFixEditorImage() {
        if (!catalogCropper) return;
        const canvas = catalogCropper.getCroppedCanvas();
        if (!canvas) return;
        
        const ctx = canvas.getContext('2d');
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;
        
        let minBrightness = 255, maxBrightness = 0;
        for (let i = 0; i < data.length; i += 4) {
            const brightness = (data[i] + data[i+1] + data[i+2]) / 3;
            if (brightness < minBrightness) minBrightness = brightness;
            if (brightness > maxBrightness) maxBrightness = brightness;
        }
        
        const range = maxBrightness - minBrightness;
        if (range > 10) {
            const factor = 255 / range;
            for (let i = 0; i < data.length; i += 4) {
                data[i]   = Math.min(255, (data[i] - minBrightness) * factor);
                data[i+1] = Math.min(255, (data[i+1] - minBrightness) * factor);
                data[i+2] = Math.min(255, (data[i+2] - minBrightness) * factor);
            }
        }
        
        for (let i = 0; i < data.length; i += 4) {
            data[i]   = Math.min(255, Math.max(0, ((data[i] - 128) * 1.1) + 128 + 5));
            data[i+1] = Math.min(255, Math.max(0, ((data[i+1] - 128) * 1.1) + 128 + 5));
            data[i+2] = Math.min(255, Math.max(0, ((data[i+2] - 128) * 1.1) + 128 + 5));
        }
        
        ctx.putImageData(imageData, 0, 0);
        
        const enhancedDataUrl = canvas.toDataURL('image/jpeg', 0.9);
        catalogCropper.replace(enhancedDataUrl);
        
        Swal.fire({ title: 'Auto-Fix Applied', icon: 'success', timer: 1200, showConfirmButton: false });
    }

    function processPartnerLogosFiles(files, index) {
        if (index >= files.length) {
            document.getElementById('stats-partners-input').value = '';
            return;
        }
        
        const file = files[index];
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                try {
                    const canvas = document.createElement('canvas');
                    const max_size = 200; // partner logos are displayed small, 200px is perfect
                    let width = img.width;
                    let height = img.height;
                    
                    if (width > height) {
                        if (width > max_size) {
                            height *= max_size / width;
                            width = max_size;
                        }
                    } else {
                        if (height > max_size) {
                            width *= max_size / height;
                            height = max_size;
                        }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    const compressedBase64 = canvas.toDataURL('image/png'); // Preserve transparent backgrounds
                    partnerLogos.push({ url: compressedBase64 });
                    renderPartnerLogosPreviews();
                } catch (err) {
                    console.error('Error compressing partner logo:', err);
                    partnerLogos.push({ url: e.target.result }); // Fallback to raw base64 if compression fails
                    renderPartnerLogosPreviews();
                }
                processPartnerLogosFiles(files, index + 1);
            };
            img.onerror = function() {
                console.error('Error loading logo image');
                processPartnerLogosFiles(files, index + 1);
            };
            img.src = e.target.result;
        };
        reader.onerror = function() {
            console.error('FileReader error during logo upload');
            processPartnerLogosFiles(files, index + 1);
        };
        reader.readAsDataURL(file);
    }

    function refreshRecentSalesActivities() {
        const tbody = document.getElementById('recent-sales-activities-body');
        if (!tbody) return;
        tbody.innerHTML = '<tr><td colspan="11" class="text-center py-4"><div class="spinner-border spinner-border-sm text-primary"></div> Loading recent activities...</td></tr>';
        
        google.script.run
            .withFailureHandler(err => {
                console.error('[Inv] Failed to load sales activities:', err);
                tbody.innerHTML = '<tr><td colspan="11" class="text-center text-danger py-4">Error loading recent activities.</td></tr>';
            })
            .withSuccessHandler(history => {
                if (!history || history.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="11" class="text-center text-muted py-4">No recent sales/billing activities found.</td></tr>';
                    return;
                }
                
                let rows = [];
                history.forEach(doc => {
                    let items = [];
                    try {
                        items = JSON.parse(doc.ItemsJson || '[]');
                    } catch(e) {
                        console.error('Failed to parse ItemsJson:', e);
                    }
                    
                    items.forEach(item => {
                        let matchedProd = null;
                        if (catalogDataCache && item.productId) {
                            matchedProd = catalogDataCache.find(p => String(p.ProductID || p.id) === String(item.productId));
                        }
                        
                        rows.push({
                            date: doc.Date,
                            docType: doc.DocType,
                            docNumber: doc.DocNumber,
                            partyName: doc.PartyName || 'N/A',
                            category: (matchedProd && (matchedProd.Category || matchedProd.category)) || 'N/A',
                            productTitle: item.name || (matchedProd && matchedProd.Name) || 'N/A',
                            partNumber: (matchedProd && (matchedProd.PartNumber || matchedProd.partnumber)) || 'N/A',
                            serialNumber: item.sn || item.serialNumber || '-',
                            total: parseFloat(item.total || 0),
                            received: parseFloat(doc.AmountPaid || 0),
                            balance: parseFloat(doc.BalanceDue || 0),
                            status: doc.PaymentStatus || doc.Status || 'N/A'
                        });
                    });
                });
                
                if (rows.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="11" class="text-center text-muted py-4">No recent sales/billing activities found.</td></tr>';
                    return;
                }
                
                let html = '';

            if (invCurrentStep === 2 && invEntrySerials.length === 0) {

            syncInvState();
        }

        invCurrentStep = newStep;
        updateInventoryWizardUI();

    function searchCatalogForInventory(query) {
        if (!query || query.length < 1) {
            const results = document.getElementById('inv-search-results');
            if (results) results.style.display = 'none';
            return;
        }

        if (!catalogDataCache || catalogDataCache.length === 0) {
            console.warn('[Inv] Catalog cache is empty. Refreshing...');
            refreshInventoryCatalog();
            return;
        }

        const q = query.toLowerCase();
        
        // Robust property getter
        const getP = (p, keys) => {
            for (let k of keys) {
                if (p[k] !== undefined && p[k] !== null) return String(p[k]);
            }
            return '';
        };

        const results = catalogDataCache.filter(p => {
            const name = getP(p, ['Name', 'modelname', 'Model Name', 'model_name']).toLowerCase();
            const model = getP(p, ['ModelNo', 'modelnumber', 'Model Number', 'model_no']).toLowerCase();
            const part = getP(p, ['PartNumber', 'partnumber', 'Part Number', 'part_no']).toLowerCase();
            const mode = getP(p, ['ModeOfOperation', 'modeofoperation', 'Mode of Operation']).toLowerCase();
            const cat = getP(p, ['Category', 'category']).toLowerCase();
            
            return name.includes(q) || model.includes(q) || part.includes(q) || mode.includes(q) || cat.includes(q);
        });

        const container = document.getElementById('inv-search-results');
        if (!container) return;

        if (results.length === 0) {
            container.innerHTML = '<div class="p-3 text-center text-muted">No matching products found</div>';
        } else {
            let html = '';
            results.forEach(p => {
                const getP = (obj, keys) => {
                    for (let k of keys) if (obj[k] !== undefined && obj[k] !== null) return String(obj[k]);
                    return '';
                };
                
                const pName = getP(p, ['Name', 'modelname', 'Model Name']);
                const pModel = getP(p, ['ModelNo', 'modelnumber', 'Model Number']);
                const pPart = getP(p, ['PartNumber', 'partnumber', 'Part Number']);
                const pId = getP(p, ['ProductID', 'productid', 'Product ID']);
                const pStock = p.Stock || p.stock || 0;

                html += `<div class="list-group-item list-group-item-action py-3 border-bottom cursor-pointer" onclick="selectProductForInventory('${pId}')" style="cursor: pointer;">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <div class="fw-bold text-brown">${pName}</div>
                            <div class="small text-muted">Model: ${pModel || 'N/A'} | Part: ${pPart || 'N/A'}</div>
                        </div>
                        <span class="badge bg-light text-dark border">Stock: ${pStock}</span>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }
        container.style.display = 'block';
    }

    function addSerialToEntryList() {
        const input = document.getElementById('inv-serial-input');
        const rawInput = input.value.trim().toUpperCase();
        
        if (!rawInput) return;

        // Split by comma for bulk entry
        const segments = rawInput.split(',').map(s => s.trim()).filter(s => s);
        let addedCount = 0;
        let dupCount = 0;

        segments.forEach(seg => {
            // Check for range entry (e.g., SN001-SN010 or 1001-1010)
            if (seg.includes('-')) {
                const parts = seg.split('-');
                if (parts.length === 2) {
                    const startVal = parts[0].trim();
                    const endVal = parts[1].trim();
                    
                    // Regex to extract prefix and numeric suffix
                    const matchStart = startVal.match(/^(.*?)(\d+)$/);
                    const matchEnd = endVal.match(/^(.*?)(\d+)$/);

                    if (matchStart && matchEnd && matchStart[1] === matchEnd[1]) {
                        const prefix = matchStart[1];
                        const startNum = parseInt(matchStart[2]);
                        const endNum = parseInt(matchEnd[2]);
                        const padding = matchStart[2].length;

                        if (startNum <= endNum) {
                            for (let i = startNum; i <= endNum; i++) {
                                const currentSerial = prefix + String(i).padStart(padding, '0');
                                if (!invEntrySerials.includes(currentSerial)) {
                                    invEntrySerials.unshift(currentSerial);
                                    addedCount++;
                                } else {
                                    dupCount++;
                                }
                            }
                        }
                    } else if (!isNaN(startVal) && !isNaN(endVal)) {
                        // Purely numeric range
                        const startNum = parseInt(startVal);
                        const endNum = parseInt(endVal);
                        if (startNum <= endNum) {
                            for (let i = startNum; i <= endNum; i++) {
                                const currentSerial = String(i);
                                if (!invEntrySerials.includes(currentSerial)) {
                                    invEntrySerials.unshift(currentSerial);
                                    addedCount++;
                                } else {
                                    dupCount++;
                                }
                            }
                        }
                    } else {
                        // Fallback as single entry if range invalid
                        if (!invEntrySerials.includes(seg)) {
                            invEntrySerials.unshift(seg);
                            addedCount++;
                        } else {
                            dupCount++;
                        }
                    }
                }
            } else {
                // Single entry
                if (!invEntrySerials.includes(seg)) {
                    invEntrySerials.unshift(seg);
                    addedCount++;
                } else {
                    dupCount++;
                }
            }
        });

        input.value = '';
        renderEntryList();

        if (dupCount > 0) {
            Swal.fire({
                title: 'Duplicates Skipped',
                text: `${dupCount} serial(s) were already in the list.`,
                icon: 'info',
                toast: true,
                position: 'top-end',
                timer: 3000,
                showConfirmButton: false
            });
        }
    }

            return;

    function generateSequentialSerials() {
        const startVal = document.getElementById('bulk-serial-start').value.trim();
        const count = parseInt(document.getElementById('bulk-serial-count').value) || 0;

        if (!startVal || count <= 0) {
            Swal.fire('Invalid Input', 'Please provide a starting serial and a valid count.', 'warning');
            return;
        }

        // Parse suffix
        const match = startVal.match(/^(.*?)(\d+)$/);
        if (!match) {
            Swal.fire('Invalid Serial Format', 'Serial must end with a number to increment (e.g. SN001).', 'error');
            return;
        }

        const prefix = match[1];
        const suffixStr = match[2];
        const startNum = parseInt(suffixStr);
        const padding = suffixStr.length;

        let addedCount = 0;
        let dupCount = 0;

        for (let i = 0; i < count; i++) {
            const currentNum = startNum + i;
            const currentSuffix = String(currentNum).padStart(padding, '0');
            const serial = (prefix + currentSuffix).toUpperCase();

            if (!invEntrySerials.includes(serial)) {
                invEntrySerials.unshift(serial);
                addedCount++;
            } else {
                dupCount++;
            }
        }

        renderEntryList();
        
        Swal.fire({
            title: 'Bulk Generation Complete',
            text: `Generated ${addedCount} new serials.${dupCount > 0 ? ` ${dupCount} duplicates were skipped.` : ''}`,
            icon: 'success',
            timer: 2000
        });

        // Reset fields
        document.getElementById('bulk-serial-start').value = '';
        document.getElementById('bulk-serial-count').value = '';
    }

        const color = document.getElementById('about-section-color').value;
        const italic = document.getElementById('about-section-italic').checked;
        const bold = document.getElementById('about-section-bold').checked;
        
        const imgWidth = document.getElementById('about-section-img-width').value;
        const imgHeight = document.getElementById('about-section-img-height').value;
        const fitMode = document.getElementById('about-section-fit').value;
        
        const styleObj = {
            fontFamily,
            fontSize,
            color,
            italic,
            bold,
            layout,
            imgWidth,
            imgHeight,
            fitMode
        };
        
        const base64 = aboutSectionImageBase64;
        
        const proceedWithSave = (imgUrl) => {
            const sectionData = {
                title,
                content,
                imageUrl: imgUrl || '',
                style: styleObj
            };
            
            if (indexVal === -1) {
                aboutUsSectionsCache.push(sectionData);
            } else {
                if (!base64 && aboutUsSectionsCache[indexVal] && aboutUsSectionsCache[indexVal].imageUrl) {
                    sectionData.imageUrl = aboutUsSectionsCache[indexVal].imageUrl;
                }
                aboutUsSectionsCache[indexVal] = sectionData;
            }
            
            showAdminLoading();
            google.script.run
                .withSuccessHandler(res => {
                    hideAdminLoading();
                    if (res.success) {
                        const modalEl = document.getElementById('aboutUsSectionModal');
                        if (modalEl) {
                            const m = bootstrap.Modal.getInstance(modalEl);
                            if (m) m.hide();
                        }
                        aboutSectionImageBase64 = null;
                        refreshAboutSections();
                        Swal.fire('Success', 'About Us Section saved successfully!', 'success');
                    } else {
                        Swal.fire('Error', res.message, 'error');
                    }
                })
                .withFailureHandler(err => {
                    hideAdminLoading();
                    Swal.fire('Error', 'Server error: ' + err.message, 'error');
                })
                .saveAboutUsData(aboutUsSectionsCache);
        };
        
        if (base64) {
            showAdminLoading();
            google.script.run
                .withSuccessHandler(res => {
                    hideAdminLoading();
                    if (res.success) {
                        proceedWithSave(res.url);
                    } else {
                        Swal.fire('Error', 'Image upload failed: ' + res.message, 'error');
                    }
                })
                .withFailureHandler(err => {
                    hideAdminLoading();
                    Swal.fire('Error', 'Image upload server error: ' + err.message, 'error');
                })
                .uploadSectionImage(base64);
        } else {
            proceedWithSave();
        }
    }

    function deleteAboutSection(index) {
        Swal.fire({
            title: 'Delete Section?',
            text: 'Are you sure you want to remove this section from the About Us page?',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#d33',
            confirmButtonText: 'Yes, delete it'
        }).then((result) => {
            if (result.isConfirmed) {
                aboutUsSectionsCache.splice(index, 1);
                showAdminLoading();
                google.script.run
                    .withSuccessHandler(res => {
                        hideAdminLoading();
                        if (res.success) {
                            refreshAboutSections();
                            Swal.fire('Deleted!', 'Section has been removed.', 'success');
                        } else {
                            Swal.fire('Error', res.message, 'error');
                        }
                    })
                    .withFailureHandler(err => {
                        hideAdminLoading();
                        Swal.fire('Error', 'Server error: ' + err.message, 'error');
                    })
                    .saveAboutUsData(aboutUsSectionsCache);
            }
        });
    }

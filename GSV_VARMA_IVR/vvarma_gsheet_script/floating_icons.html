<!-- Consolidated Floating Action Button -->
<div class="fab-wrapper" id="fabWrapper">
  <!-- Tagline -->
  <div class="fab-tagline" id="fabTagline" onclick="toggleFab()">Contact Us</div>
  
  <!-- Main FAB -->
  <div class="fab-main pulse-animation" id="fabMain" onclick="toggleFab()">
    <i class="fa-solid fa-phone text-white" style="color: white !important;"></i>
    <span class="fab-label">Contact Us</span>
  </div>

  <!-- Expandable Menu -->
  <div class="fab-menu" id="fabMenu">
    <!-- WhatsApp -->
    <a href="https://wa.me/919092610415" target="_blank" class="fab-item fab-whatsapp">
      <i class="fab fa-whatsapp"></i>
      <span class="fab-label">WhatsApp</span>
    </a>
    <!-- Call -->
    <a href="tel:9092610415" class="fab-item fab-call">
      <i class="fas fa-phone-alt"></i>
      <span class="fab-label">Call Us</span>
    </a>
    <!-- Catalog -->
    <a href="<?= appUrl ?>?page=catalog" class="fab-item fab-catalog" id="fabCatalogItem">
      <i class="fas fa-th-large"></i>
      <span class="fab-label">Catalog</span>
      <span class="fab-badge" id="catalogBadge" style="display:none;">1</span>
    </a>
  </div>
</div>

<script>
  let fabTimer = null;

  function toggleFab() {
    const wrapper = document.getElementById('fabWrapper');
    const main = document.getElementById('fabMain');
    const menu = document.getElementById('fabMenu');
    const tagline = document.getElementById('fabTagline');
    
    wrapper.classList.toggle('active');
    main.classList.toggle('active');
    menu.classList.toggle('active');
    
    // Manage timer
    if (main.classList.contains('active')) {
      startFabTimer();
    } else {
      clearTimeout(fabTimer);
    }
  }

  function startFabTimer() {
    clearTimeout(fabTimer);
    fabTimer = setTimeout(() => {
      const main = document.getElementById('fabMain');
      if (main.classList.contains('active')) {
        toggleFab();
      }
    }, 8000); // Auto-close after 8 seconds of inactivity
  }

  // Logic for Cart opened trigger
  function notifyCartAction() {
    const badge = document.getElementById('catalogBadge');
    const catalogItem = document.getElementById('fabCatalogItem');
    const main = document.getElementById('fabMain');
    const menu = document.getElementById('fabMenu');
    
    badge.style.display = 'flex';
    
    // If FAB is not open, open it automatically to show the catalog badge
    if (!main.classList.contains('active')) {
        toggleFab();
        main.classList.add('animate__animated', 'animate__heartBeat');
        setTimeout(() => main.classList.remove('animate__animated', 'animate__heartBeat'), 2000);
    }
  }

  // Monitor URL for cart page
  function checkCartPage() {
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('page') === 'cart') {
      notifyCartAction();
    }
  }

  // Close menu when clicking outside
  document.addEventListener('click', (e) => {
    const wrapper = document.getElementById('fabWrapper');
    const main = document.getElementById('fabMain');
    if (!wrapper.contains(e.target) && main.classList.contains('active')) {
      toggleFab();
    }
  });

  document.addEventListener('DOMContentLoaded', checkCartPage);
</script>

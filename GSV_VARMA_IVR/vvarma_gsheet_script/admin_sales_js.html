<script>

    document.addEventListener('DOMContentLoaded', function() {
        const pColor = document.getElementById('setRegularPrimaryColor');
        const sColor = document.getElementById('setRegularSecondaryColor');
        const pHex = document.getElementById('primaryColorHex');
        const sHex = document.getElementById('secondaryColorHex');
        
        if(pColor && pHex) {
            pColor.addEventListener('input', e => pHex.textContent = e.target.value.toUpperCase());
        }
        if(sColor && sHex) {
            sColor.addEventListener('input', e => sHex.textContent = e.target.value.toUpperCase());
        }
    });

    /**
     * V-VARMA V3 - Sales & Billing Module
     */

    let partyList = [];
    let billingHistory = [];
    let billingItems = [];
    let currentDocType = 'Invoice';
    let billingProducts = [];
    let billingSerials = [];

    function initSalesModule() {
        console.log('[Sales] Initializing Sales Module...');
        refreshPartyManagement();
        refreshBillingHistory();
        loadSellerInfo();
        loadBillingProducts();
    }

    function loadSellerInfo() {
        google.script.run.withSuccessHandler(res => {
            if (res && res.success && res.profile) {
                const p = res.profile;
                const nameEl = document.getElementById('sellerNameDisplay');
                const addrEl = document.getElementById('sellerAddressDisplay');
                const gstEl = document.getElementById('sellerGstDisplay');
                const contEl = document.getElementById('sellerContactDisplay');
                const labelEl = document.getElementById('sellerNameLabel');

                if (nameEl) nameEl.innerText = p.CompanyName || 'V-VARMA INDUSTRIES';
                if (addrEl) addrEl.innerText = p.CompanyAddress || 'Main Road, District Center';
                if (gstEl) gstEl.innerText = p.CompanyGst || 'N/A';
                if (contEl) contEl.innerText = p.CompanyMobile || '9092610415';
                if (labelEl) labelEl.innerText = p.CompanyName || 'V-VARMA';
            }
        }).getCompanyProfile();
    }

    function showSellerProfileModal() {
        google.script.run.withSuccessHandler(res => {
            if (res.success) {
                const p = res.profile;
                const form = document.getElementById('sellerProfileForm');
                if (form) {
                    form.reset();
                    Object.keys(p).forEach(key => {
                        const input = form.querySelector(`[name="${key}"]`);
                        if (input) input.value = p[key];
                    });
                }
                new bootstrap.Modal(document.getElementById('sellerProfileModal')).show();
            }
        }).getCompanyProfile();
    }

    function saveSellerProfile() {
        const form = document.getElementById('sellerProfileForm');
        const profile = {};
        const inputs = form.querySelectorAll('input, textarea');
        inputs.forEach(input => profile[input.name] = input.value);

        const btn = event.currentTarget;
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';

        google.script.run.withSuccessHandler(res => {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-save me-1"></i> Save Profile';
            if (res.success) {
                Swal.fire('Success', 'Company profile saved!', 'success');
                bootstrap.Modal.getInstance(document.getElementById('sellerProfileModal')).hide();
                loadSellerInfo(); // Refresh display
            } else {
                Swal.fire('Error', res.message, 'error');
            }
        }).saveCompanyProfile(profile);
    }

    // ==============================================
    // PARTY MANAGEMENT
    // ==============================================

    function refreshPartyManagement(showToast) {
        const tbody = document.getElementById('party-management-body');
        if (tbody) tbody.innerHTML = '<tr><td colspan="8" class="text-center py-4">Loading parties...</td></tr>';

        if (showToast) {
            Swal.fire({
                title: 'Refreshing Parties...',
                toast: true,
                position: 'top-end',
                showConfirmButton: false,
                timer: 1500,
                didOpen: () => Swal.showLoading()
            });
        }

        google.script.run
            .withSuccessHandler(data => {
                partyList = data || [];
                if (tbody) filterParties();
                if (showToast) {
                    Swal.fire({
                        icon: 'success',
                        title: 'Party list updated',
                        toast: true,
                        position: 'top-end',
                        showConfirmButton: false,
                        timer: 2000
                    });
                }
            })
            .withFailureHandler(err => {
                console.error('[Sales] Failed to load parties:', err);
                if (tbody) tbody.innerHTML = `<tr><td colspan="8" class="text-center text-danger py-4">Error loading parties</td></tr>`;
                if (showToast) Swal.fire('Error', 'Failed to refresh parties', 'error');
            })
            .getPartyList();
    }

    function filterParties() {
        const typeFilter = document.getElementById('filterPartyType').value;
        const searchVal = document.getElementById('searchParty').value.toLowerCase().trim();

        let filtered = partyList.filter(p => {
            let matchType = (typeFilter === 'All' || p.PartyType === typeFilter);
            if (!matchType) return false;
            
            if (!searchVal) return true;

            // Generic dynamic recursive/multi-property search across all fields of the party object
            const checkMatch = (val) => {
                if (val === null || val === undefined) return false;
                if (typeof val === 'object') {
                    return Object.values(val).some(v => checkMatch(v));
                }
                return String(val).toLowerCase().includes(searchVal);
            };

            return Object.keys(p).some(key => {
                // Skip internal/ID properties if we want clean search, or search all
                return checkMatch(p[key]);
            });
        });

        const tbody = document.getElementById('party-management-body');
        if (!tbody) return;

        if (filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" class="text-center py-4 text-muted">No parties found.</td></tr>';
            return;
        }

        let html = '';
        filtered.forEach(p => {
            let typeBadge = '';
            if (p.PartyType === 'B2B') typeBadge = '<span class="badge bg-primary">B2B</span>';
            else if (p.PartyType === 'B2C') typeBadge = '<span class="badge bg-success">B2C</span>';
            else typeBadge = `<span class="badge bg-secondary">${p.PartyType}</span>`;

            let balClass = parseFloat(p.CurrentBalance) > 0 ? 'text-danger' : 'text-success';

            html += `
        <tr>
            <td>
                <div class="fw-bold text-brown">${p.Name}</div>
                <div class="small text-muted" style="font-size: 0.75rem;">${p.ShopName || 'N/A'}</div>
            </td>
            <td>
                <div class="fw-semibold text-dark"><i class="fas fa-phone-alt small text-muted me-2"></i>${p.Mobile}</div>
            </td>
            <td>
                <div class="small text-secondary" style="font-size: 0.8rem;"><i class="fas fa-envelope small text-muted me-2"></i>${p.Email || 'N/A'}</div>
            </td>
            <td>
                <div class="small text-wrap" style="font-size: 0.8rem; max-width: 200px;">
                    <i class="fas fa-map-marker-alt text-muted me-2"></i>${p.Address || 'N/A'}
                    <span class="text-muted d-block ps-4" style="font-size: 0.72rem;">PIN: ${p.Pincode || 'N/A'}</span>
                </div>
            </td>
            <td>
                ${typeBadge}
                ${p.PartyType === 'B2B' && p.GstNumber ? `<div class="mt-1" style="font-size: 0.75rem;"><span class="badge bg-light text-dark border">GST: ${p.GstNumber}</span></div>` : ''}
            </td>
            <td>
                <div class="fw-bold ${balClass}" style="font-size: 0.88rem;">\u20B9${parseFloat(p.CurrentBalance || 0).toFixed(2)}</div>
                <div class="mt-1" style="font-size: 0.7rem;">
                    <span class="text-muted d-block text-truncate" style="max-width: 140px;" title="${p.InvoiceNumbers || 'No Invoices'}">
                        Invoices: <b>${p.InvoiceNumbers || 'N/A'}</b>
                    </span>
                </div>
            </td>
            <td>
                <span class="badge ${String(p.Status || 'Active').toLowerCase() === 'active' ? 'bg-success-subtle text-success border border-success-subtle' : 'bg-secondary-subtle text-secondary border border-secondary-subtle'}" style="font-size: 0.72rem; padding: 4px 10px; font-weight: 600;">
                    ${p.Status || 'Active'}
                </span>
            </td>
            <td>
                <div class="btn-group shadow-sm">
                    <button class="btn btn-sm btn-outline-primary" onclick="editParty('${p.Id}')" title="Edit Profile">
                        <i class="fas fa-edit"></i>
                    </button>
                    <button class="btn btn-sm btn-outline-info" onclick="openPartyLedgerDirect('${p.Id}')" title="View Ledger Statement">
                        <i class="fas fa-file-invoice"></i>
                    </button>
                    <button class="btn btn-sm btn-outline-success" onclick="openNewReceiptModalForParty('${p.Id}')" title="Record Payment">
                        <i class="fas fa-hand-holding-usd"></i>
                    </button>
                </div>
            </td>
        </tr>`;
        });
        tbody.innerHTML = html;
    }

    function handlePartyManagementSearch(e) {
        const query = e.target.value.toLowerCase().trim();
        const dropdown = document.getElementById('partyManagementSearchDropdown');
        const typeFilter = document.getElementById('filterPartyType').value;

        if (!query) {
            if (dropdown) dropdown.classList.remove('show');
            filterParties(); // Re-apply normal table filter
            return;
        }

        // In the list view, we just call filterParties which already handles searchParty input
        filterParties();
    }

    function showSalesAddPartyModal() {
        document.getElementById('partyForm').reset();
        document.getElementById('partyId').value = '';
        new bootstrap.Modal(document.getElementById('addPartyModal')).show();
    }

    function savePartyFromAdmin() {
        const form = document.getElementById('partyForm');
        if (!form.checkValidity()) {
            form.classList.add('was-validated');
            return;
        }

        const btn = event.currentTarget;
        const originalText = btn.innerHTML;

        const partyData = {
            Id: document.getElementById('partyId') ? document.getElementById('partyId').value : '',
            PartyType: document.getElementById('partyType').value,
            Name: document.getElementById('partyName').value,
            ShopName: document.getElementById('partyShopName').value,
            Mobile: document.getElementById('partyMobile').value,
            Email: document.getElementById('partyEmail').value,
            GstNumber: document.getElementById('partyGst').value.toUpperCase(),
            Address: document.getElementById('partyAddress').value,
            Pincode: document.getElementById('partyPincode').value,
            CreditLimit: document.getElementById('partyCreditLimit').value,
            OpeningBalance: document.getElementById('partyOpeningBalance').value
        };

        const isUpdate = !!partyData.Id;

        if (isUpdate) {
            const oldParty = partyList.find(x => x.Id === partyData.Id);
            const oldMobile = oldParty ? oldParty.Mobile : '';

            Swal.fire({
                title: 'Confirm Party Update & Sync',
                html: `
                <div class="text-start small">
                    <p class="mb-2">Are you sure you want to update this party and synchronize the fields across related records?</p>
                    <ul class="mb-2">
                        <li><b>Columns Modified:</b> Party ID, Name, Mobile, Email, GST Number</li>
                        <li><b>Synced Sheets:</b> Warranty Register, Complaints, Ledger, Dealers List</li>
                    </ul>
                    <p class="mb-0 text-muted">Click <b>OK / Proceed</b> to run the synchronization script.</p>
                </div>
            `,
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'OK, Sync & Update',
                cancelButtonText: 'Cancel'
            }).then((result) => {
                if (result.isConfirmed) {
                    executeSavePartyFromAdmin(btn, originalText, partyData, oldMobile);
                }
            });
        } else {
            executeSavePartyFromAdmin(btn, originalText, partyData, null);
        }
    }



    function executeSavePartyFromAdmin(btn, originalText, partyData, oldMobile) {
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';

        google.script.run
            .withSuccessHandler(res => {
                if (res.success) {
                    if (oldMobile) {
                        google.script.run
                            .withSuccessHandler(syncRes => {
                                btn.disabled = false;
                                btn.innerHTML = originalText;
                                bootstrap.Modal.getInstance(document.getElementById('addPartyModal')).hide();
                                Swal.fire('Success', 'Party updated and synchronized successfully!', 'success');
                                refreshPartyManagement(false);
                            })
                            .withFailureHandler(syncErr => {
                                btn.disabled = false;
                                btn.innerHTML = originalText;
                                Swal.fire('Sync Warning', 'Party saved, but synchronization failed: ' + syncErr.message, 'warning');
                            })
                            .propagatePartyUpdates(oldMobile, partyData.Id, partyData);
                    } else {
                        btn.disabled = false;
                        btn.innerHTML = originalText;
                        bootstrap.Modal.getInstance(document.getElementById('addPartyModal')).hide();
                        Swal.fire('Success', 'Party saved successfully!', 'success');
                        refreshPartyManagement(false);
                    }
                } else {
                    btn.disabled = false;
                    btn.innerHTML = originalText;
                    Swal.fire('Error', res.message, 'error');
                }
            })
            .withFailureHandler(err => {
                btn.disabled = false;
                btn.innerHTML = originalText;
                Swal.fire('Error', err.message, 'error');
            })
            .savePartyRecord(partyData);
    }

    function openNewBillingView(docType) {
        currentDocType = docType;
        document.getElementById('billingModalTitle').innerHTML = `<i class="fas fa-file-invoice me-2"></i> Create ${docType}`;

        document.getElementById('billingForm').reset();
        document.getElementById('partyDetailsDisplay').classList.add('d-none');

        // Apply global GST/Business Type preference
        const bTypeSelect = document.getElementById('billBusinessType');
        if (bTypeSelect && window.AdminConfig) {
            bTypeSelect.value = window.AdminConfig.gstPref === 'offline' ? 'B2C' : 'B2B';
        }

        billingItems = [];
        addBillingProductRow(); // Add one empty row

        document.getElementById('billDate').value = new Date().toISOString().split('T')[0];

        // Fetch actual sequence number from backend
        google.script.run
            .withSuccessHandler(num => {
                document.getElementById('billingDocNumber').innerText = num;
            })
            .getNextDocNumber(docType);

        onBusinessTypeChange();
        calculateBillingTotals();
        loadBillingProducts();

        new bootstrap.Modal(document.getElementById('billingModal')).show();
    }

    function loadBillingProducts() {
        const searchInput = document.getElementById('billProductSearch');
        let originalIcon = '';
        let iconSpan = null;
        if (searchInput) {
            iconSpan = searchInput.previousElementSibling;
            if (iconSpan) {
                originalIcon = iconSpan.innerHTML;
                iconSpan.innerHTML = '<i class="fas fa-spinner fa-spin text-primary"></i>';
            }
        }
        google.script.run
            .withSuccessHandler(data => {
                if (iconSpan) iconSpan.innerHTML = originalIcon;
                if (data && data.success) {
                    billingProducts = data.products || [];
                    billingSerials = data.serials || [];
                }
            })
            .withFailureHandler(() => {
                if (iconSpan) iconSpan.innerHTML = originalIcon;
            })
            .getBillingProducts();
    }

    function closeBillingModal() {
        const modalEl = document.getElementById('billingModal');
        if (modalEl) {
            let modalInstance = bootstrap.Modal.getInstance(modalEl);
            if (!modalInstance) {
                modalInstance = new bootstrap.Modal(modalEl);
            }
            modalInstance.hide();
        }
    }

    function openBillingSettings() {
        const modal = new bootstrap.Modal(document.getElementById('billingSettingsModal'));
        modal.show();

        // Show spinner in prefixes tbody while loading
        document.getElementById('prefixes-list-body').innerHTML = `<tr><td colspan="4" class="text-center py-3"><div class="spinner-border spinner-border-sm text-primary"></div> Loading...</td></tr>`;

        google.script.run
            .withSuccessHandler(res => {
                if (res.success) {
                    // 1. Hydrate Prefixes & Sequence Series table
                    const tbody = document.getElementById('prefixes-list-body');
                    let html = '';
                    res.sequences.forEach(s => {
                        html += `<tr>
                        <td class="fw-bold">${s.type}</td>
                        <td><input type="text" class="form-control form-control-sm shadow-sm" value="${s.prefix}" id="pref-${s.type}"></td>
                        <td><input type="number" class="form-control form-control-sm shadow-sm" value="${s.next}" id="next-${s.type}"></td>
                        <td><button class="btn btn-sm btn-outline-info w-100 fw-bold shadow-sm" onclick="saveSequence('${s.type}')"><i class="fas fa-save me-1"></i> Save</button></td>
                    </tr>`;
                    });
                    tbody.innerHTML = html;

                    // Cache settings globally for real-time QR generation & PDF downloads
                    window.salesBillingSettings = res.settings;

                    // 2. Hydrate Settings Form Fields Dynamically
                    const form = document.getElementById('salesSettingsForm');
                    Object.keys(res.settings).forEach(key => {
                        const el = form.elements[key];
                        if (el) {
                            if (el.type === 'checkbox') {
                                el.checked = res.settings[key] === 'true' || res.settings[key] === true;
                            } else {
                                el.value = res.settings[key];
                            }
                        }
                    });

                    // Hydrate the terms conditions preview pane
                    if (res.settings.FooterTC) {
                        document.getElementById('billTCPreview').innerText = res.settings.FooterTC;
                    }

                    // Immediately refresh live QR code inside editor
                    refreshBillingQR();
                    
                    // Synchronize print settings UI active states and render dynamic preview
                    syncPrintSettingsUI();

                    // Auto-load branding asset configs (logo, signature, seal) from GDrive/GSheet
                    // so they restore their last saved state when the settings modal reopens
                    try { loadLogoConfig(); } catch(e) { console.warn('loadLogoConfig failed:', e); }
                    try { loadSignatureConfig(); } catch(e) { console.warn('loadSignatureConfig failed:', e); }
                    try { loadSealConfig(); } catch(e) { console.warn('loadSealConfig failed:', e); }

                    // Initialize canvas editors (mouse/touch handlers) so they're ready even if
                    // the user hasn't clicked into the specific tab yet
                    try { initLogoEditor(); } catch(e) { console.warn('initLogoEditor failed:', e); }
                    try { initSignatureCanvas(); } catch(e) { console.warn('initSignatureCanvas failed:', e); }
                } else {
                    Swal.fire('Error', res.message || 'Failed to load master settings', 'error');
                }
            })
            .getSalesSettings();
    }

    function saveSequence(type) {
        const pref = document.getElementById('pref-' + type).value;
        const next = document.getElementById('next-' + type).value;
        google.script.run
            .withSuccessHandler(res => {
                if (res.success) {
                    Swal.fire({
                        icon: 'success',
                        title: 'Sequence Updated',
                        text: `Series sequence for ${type} was saved.`,
                        timer: 1500,
                        showConfirmButton: false
                    });
                } else {
                    Swal.fire('Error', res.message || 'Failed to save sequence', 'error');
                }
            })
            .updateBillingSequence(type, pref, next);
    }

    function saveBillingMasterSettings() {
        const form = document.getElementById('salesSettingsForm');
        const settingsData = {};

        // Serialise form inputs
        for (let i = 0; i < form.elements.length; i++) {
            const el = form.elements[i];
            if (el.name) {
                if (el.type === 'checkbox') {
                    settingsData[el.name] = el.checked ? 'true' : 'false';
                } else {
                    settingsData[el.name] = el.value;
                }
            }
        }

        Swal.fire({
            title: 'Saving Settings...',
            html: 'Please wait while we update your configuration on the Google Sheet.',
            allowOutsideClick: false,
            didOpen: () => {
                Swal.showLoading();
            }
        });

        google.script.run
            .withSuccessHandler(res => {
                if (res.success) {
                    Swal.fire({
                        icon: 'success',
                        title: 'Saved Successfully',
                        text: 'Billing & UPI QR settings updated on Google Sheet.',
                        timer: 1500,
                        showConfirmButton: false
                    });

                    // Sync back to client cache
                    window.salesBillingSettings = settingsData;

                    if (settingsData.FooterTC) {
                        document.getElementById('billTCPreview').innerText = settingsData.FooterTC;
                    }

                    // Trigger QR Code refresh in billing modal
                    refreshBillingQR();
                } else {
                    Swal.fire('Error', res.message || 'Failed to save settings', 'error');
                }
            })
            .saveSalesSettings(settingsData);
    }

    function uploadCompanyLogoFile(event) {
        const file = event.target.files[0];
        if (!file) return;

        const spinner = document.getElementById('companyLogoFileSpinner');
        if (spinner) spinner.style.display = 'inline-block';

        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                // Downscale image to max 150x150 pixels for tiny storage size
                const canvas = document.createElement('canvas');
                let width = img.width;
                let height = img.height;
                const maxDim = 150;
                if (width > maxDim || height > maxDim) {
                    if (width > height) {
                        height = Math.round((height * maxDim) / width);
                        width = maxDim;
                    } else {
                        width = Math.round((width * maxDim) / height);
                        height = maxDim;
                    }
                }
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);

                const base64 = canvas.toDataURL('image/png');
                const urlInput = document.getElementById('setCompanyLogoUrl');
                if (urlInput) {
                    urlInput.value = base64;
                    const changeEvent = new Event('change', { bubbles: true });
                    urlInput.dispatchEvent(changeEvent);
                }
                if (spinner) spinner.style.display = 'none';

                // Automatically trigger live preview update!
                triggerPrintPreview();
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function setLogoFrameShape(shape, element) {
        window.logoShape = shape;
        document.getElementById('logo-frame-shape-value').value = shape;
        
        // Update shape button styling
        const options = document.querySelectorAll('.logo-frame-opt');
        options.forEach(opt => {
            opt.style.borderColor = '#aaa';
            opt.style.background = '#f8f9fa';
            opt.style.color = '#555';
            opt.classList.remove('border-primary');
        });
        if (element) {
            element.style.borderColor = '#7c3aed';
            element.style.background = '#f3f0ff';
            element.style.color = '#7c3aed';
            element.classList.add('border-primary');
        }

        // Apply visual mask to container
        const container = document.getElementById('logo-frame-container');
        if (container) {
            if (shape === 'circle') {
                container.style.borderRadius = '50%';
                container.style.width = '120px';
                container.style.height = '120px';
            } else if (shape === 'square') {
                container.style.borderRadius = '0';
                container.style.width = '120px';
                container.style.height = '120px';
            } else if (shape === 'rectangle') {
                container.style.borderRadius = '0';
                container.style.width = '150px';
                container.style.height = '100px';
            } else if (shape === 'rounded') {
                container.style.borderRadius = '14px';
                container.style.width = '120px';
                container.style.height = '120px';
            } else if (shape === 'horizontal-oval') {
                container.style.borderRadius = '50% / 30%';
                container.style.width = '150px';
                container.style.height = '100px';
            } else if (shape === 'vertical-oval') {
                container.style.borderRadius = '30% / 50%';
                container.style.width = '100px';
                container.style.height = '150px';
            }
            
            // Adjust canvas size
            const canvas = document.getElementById('logo-crop-canvas');
            canvas.width = parseInt(container.style.width);
            canvas.height = parseInt(container.style.height);
        }
        
        drawLogoCanvas();
    }

    function initLogoEditor() {
        const container = document.getElementById('logo-frame-container');
        const canvas = document.getElementById('logo-crop-canvas');
        if (!container || !canvas) return;

        // Hook mouse events for panning/dragging
        container.onmousedown = function(e) {
            if (!window.logoImg) return;
            window.logoIsDragging = true;
            window.logoStartX = e.clientX - window.logoX;
            window.logoStartY = e.clientY - window.logoY;
            e.preventDefault();
        };

        window.addEventListener('mouseup', function() {
            window.logoIsDragging = false;
        });

        window.addEventListener('mousemove', function(e) {
            if (!window.logoIsDragging) return;
            window.logoX = e.clientX - window.logoStartX;
            window.logoY = e.clientY - window.logoStartY;
            drawLogoCanvas();
        });

        // Touch support
        container.ontouchstart = function(e) {
            if (!window.logoImg || e.touches.length === 0) return;
            window.logoIsDragging = true;
            window.logoStartX = e.touches[0].clientX - window.logoX;
            window.logoStartY = e.touches[0].clientY - window.logoY;
            e.preventDefault();
        };

        window.addEventListener('touchend', function() {
            window.logoIsDragging = false;
        });

        window.addEventListener('touchmove', function(e) {
            if (!window.logoIsDragging || e.touches.length === 0) return;
            window.logoX = e.touches[0].clientX - window.logoStartX;
            window.logoY = e.touches[0].clientY - window.logoStartY;
            drawLogoCanvas();
        });

        // Setup mouse wheel zoom
        container.onwheel = function(e) {
            if (!window.logoImg) return;
            e.preventDefault();
            let newZoom = window.logoZoom + (e.deltaY < 0 ? 5 : -5);
            newZoom = Math.max(20, Math.min(300, newZoom));
            document.getElementById('logo-zoom-slider').value = newZoom;
            updateLogoZoom(newZoom);
        };

        // Redraw initial state
        drawLogoCanvas();
    }

    function handleLogoUpload(event) {
        const file = event.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = function(e) {

    function updateLogoZoom(val) {

    function fitLogoToFrame() {
        if (!window.logoImg) return;
        const canvas = document.getElementById('logo-crop-canvas');
        
        // Compute optimal scale to cover canvas
        const scaleX = canvas.width / window.logoImg.width;
        const scaleY = canvas.height / window.logoImg.height;
        const fitScale = Math.max(scaleX, scaleY);
        
        window.logoZoom = Math.round(fitScale * 100);
        document.getElementById('logo-zoom-slider').value = window.logoZoom;
        document.getElementById('logo-zoom-display').innerText = window.logoZoom + '%';
        
        // Center image
        window.logoX = (canvas.width - window.logoImg.width * (window.logoZoom / 100)) / 2;
        window.logoY = (canvas.height - window.logoImg.height * (window.logoZoom / 100)) / 2;
        
        drawLogoCanvas();
    }

    function drawLogoCanvas() {

        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (!window.logoImg) return;

        const w = window.logoImg.width * (window.logoZoom / 100);
        const h = window.logoImg.height * (window.logoZoom / 100);
        
        // Clear canvas and draw logo
        ctx.drawImage(window.logoImg, window.logoX, window.logoY, w, h);
    }

    function saveLogoConfiguration() {
        if (!window.logoImg) {
            Swal.fire('No Logo', 'Please upload a logo image first.', 'info');
            return;
        }

        const canvas = document.getElementById('logo-crop-canvas');
        const shape = window.logoShape;
        
        // Create an export canvas to clip according to shape natively
        const exportCanvas = document.createElement('canvas');
        exportCanvas.width = canvas.width;
        exportCanvas.height = canvas.height;
        const eCtx = exportCanvas.getContext('2d');

        // Apply clipping path to export canvas
        eCtx.beginPath();
        if (shape === 'circle') {
            eCtx.arc(canvas.width / 2, canvas.height / 2, canvas.width / 2, 0, Math.PI * 2);
        } else if (shape === 'rounded') {
            const radius = 14;
            eCtx.roundRect(0, 0, canvas.width, canvas.height, radius);
        } else if (shape === 'horizontal-oval') {
            eCtx.ellipse(canvas.width / 2, canvas.height / 2, canvas.width / 2, canvas.height / 2, 0, 0, Math.PI * 2);
        } else if (shape === 'vertical-oval') {
            eCtx.ellipse(canvas.width / 2, canvas.height / 2, canvas.width / 2, canvas.height / 2, 0, 0, Math.PI * 2);
        } else {
            // Square / Rectangle
            eCtx.rect(0, 0, canvas.width, canvas.height);
        }
        eCtx.clip();

        // Draw current frame content to export canvas
        const w = window.logoImg.width * (window.logoZoom / 100);
        const h = window.logoImg.height * (window.logoZoom / 100);
        eCtx.drawImage(window.logoImg, window.logoX, window.logoY, w, h);

        const base64Data = exportCanvas.toDataURL('image/png');
        const statusBox = document.getElementById('logo-save-status');
        statusBox.innerHTML = '<span class="text-warning"><i class="fas fa-spinner fa-spin me-1"></i>Saving to Google Drive...</span>';

        Swal.fire({
            title: 'Saving Logo...',
            html: 'Please wait while we save your company logo and shape settings to Google Drive.',
            allowOutsideClick: false,
            didOpen: () => {
                Swal.showLoading();
            }
        });

        // Call backend function
        google.script.run
            .withSuccessHandler(res => {
                if (res.success) {
                    statusBox.innerHTML = '<span class="text-success"><i class="fas fa-check-circle me-1"></i>Saved Successfully!</span>';
                    // Sync with company logo settings input for backwards compatibility
                    const setUrl = document.getElementById('setCompanyLogoUrl');
                    if (setUrl) {
                        setUrl.value = res.imageUrl || base64Data;
                        setUrl.dispatchEvent(new Event('change', { bubbles: true }));
                    }
                    setTimeout(() => statusBox.innerHTML = '', 2000);
                    
                    Swal.fire({
                        icon: 'success',
                        title: 'Saved Successfully',
                        text: 'Company logo configuration updated successfully.',
                        timer: 1500,
                        showConfirmButton: false
                    });
                    
                    // Refresh live print preview
                    triggerPrintPreview();
                } else {
                    statusBox.innerHTML = '<span class="text-danger"><i class="fas fa-times-circle me-1"></i>Save Failed: ' + res.message + '</span>';
                    Swal.fire('Error', res.message || 'Failed to save logo config', 'error');
                }
            })
            .saveLogoConfig({
                frameShape: shape,
                imageData: base64Data,
                posX: window.logoX,
                posY: window.logoY,
                zoom: window.logoZoom
            });
    }

    window.sigDrawCanvas = null;

    function initSignatureCanvas() {
        window.sigDrawCanvas = document.getElementById('signature-draw-canvas');
        if (!window.sigDrawCanvas) return;
        window.sigCtx = window.sigDrawCanvas.getContext('2d');
        
        // Initial setup
        window.sigCtx.strokeStyle = window.sigPenColor;
        window.sigCtx.lineWidth = window.sigPenSize;
        window.sigCtx.lineCap = 'round';
        window.sigCtx.lineJoin = 'round';

        // Mouse Events
        window.sigDrawCanvas.onmousedown = function(e) {
            window.sigIsDrawing = true;
            const rect = window.sigDrawCanvas.getBoundingClientRect();
            window.sigLastX = e.clientX - rect.left;
            window.sigLastY = e.clientY - rect.top;
            e.preventDefault();
        };

        window.sigDrawCanvas.onmousemove = function(e) {
            if (!window.sigIsDrawing) return;
            const rect = window.sigDrawCanvas.getBoundingClientRect();
            const currX = e.clientX - rect.left;
            const currY = e.clientY - rect.top;
            
            window.sigCtx.beginPath();
            window.sigCtx.moveTo(window.sigLastX, window.sigLastY);
            window.sigCtx.lineTo(currX, currY);
            window.sigCtx.stroke();
            
            window.sigLastX = currX;
            window.sigLastY = currY;
            updateFinalSignaturePreview();
        };

        window.sigDrawCanvas.onmouseup = function() {
            window.sigIsDrawing = false;
        };

        window.sigDrawCanvas.onmouseleave = function() {
            window.sigIsDrawing = false;
        };

        // Touch Events
        window.sigDrawCanvas.ontouchstart = function(e) {
            if (e.touches.length === 0) return;
            window.sigIsDrawing = true;
            const rect = window.sigDrawCanvas.getBoundingClientRect();
            window.sigLastX = e.touches[0].clientX - rect.left;
            window.sigLastY = e.touches[0].clientY - rect.top;
            e.preventDefault();
        };

        window.sigDrawCanvas.ontouchmove = function(e) {
            if (!window.sigIsDrawing || e.touches.length === 0) return;
            const rect = window.sigDrawCanvas.getBoundingClientRect();
            const currX = e.touches[0].clientX - rect.left;
            const currY = e.touches[0].clientY - rect.top;
            
            window.sigCtx.beginPath();
            window.sigCtx.moveTo(window.sigLastX, window.sigLastY);
            window.sigCtx.lineTo(currX, currY);
            window.sigCtx.stroke();
            
            window.sigLastX = currX;
            window.sigLastY = currY;
            updateFinalSignaturePreview();
        };

        window.sigDrawCanvas.ontouchend = function() {
            window.sigIsDrawing = false;
        };
    }

    function clearSignatureCanvas() {
        if (!window.sigCtx || !window.sigDrawCanvas) return;
        window.sigCtx.clearRect(0, 0, window.sigDrawCanvas.width, window.sigDrawCanvas.height);

            img.onload = function() {
                window.sigUploadedImage = img;
                const canvas = document.getElementById('signature-upload-preview');
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // Draw aspect fit inside upload preview
                const scale = Math.min(canvas.width / img.width, canvas.height / img.height);
                const w = img.width * scale;
                const h = img.height * scale;
                const x = (canvas.width - w) / 2;
                const y = (canvas.height - h) / 2;
                
                ctx.drawImage(img, x, y, w, h);

            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function updateFinalSignaturePreview() {
        const finalCanvas = document.getElementById('sig-final-preview');
        if (!finalCanvas) return;
        const ctx = finalCanvas.getContext('2d');
        ctx.clearRect(0, 0, finalCanvas.width, finalCanvas.height);

        // Determine active signature tab
        const activeTab = document.querySelector('#signatureTabs .nav-link.active');
        const isUpload = activeTab && activeTab.innerText.includes('Upload');

        if (isUpload && window.sigUploadedImage) {
            ctx.drawImage(window.sigUploadedImage, 0, 0, finalCanvas.width, finalCanvas.height);
        } else if (window.sigDrawCanvas && !isCanvasBlank(window.sigDrawCanvas)) {
            ctx.drawImage(window.sigDrawCanvas, 0, 0, finalCanvas.width, finalCanvas.height);
        } else if (window.sigUploadedImage) {
            ctx.drawImage(window.sigUploadedImage, 0, 0, finalCanvas.width, finalCanvas.height);
        }
    }

  function triggerPrint() {

    var images = Array.prototype.slice.call(document.querySelectorAll('#printContent img'));

    var loaded = 0;
    var done = false;
    function onLoad() {
      loaded++;
      if (!done && loaded >= total) { done = true; doPrint(); }
    }
    images.forEach(function(img) {
      if (img.complete && img.naturalWidth > 0) { onLoad(); }
      else { img.addEventListener('load', onLoad); img.addEventListener('error', onLoad); }
    });
    // Safety fallback: print after 4s even if some images are slow/blocked
    setTimeout(function() { if (!done) { done = true; doPrint(); } }, 4000);
  }
  function doPrint() {
    var btn = document.getElementById('printBtn');
    if (btn) { btn.disabled = false; btn.innerHTML = '&#128424;&#65039; Print / Save as PDF'; }

    let bluetoothDevice = null;
    let bluetoothCharacteristic = null;

    async function connectBluetoothPrinter() {
        const btn = document.getElementById('btn-connect-bluetooth');
        const statusDiv = document.getElementById('bt-printer-status');
        const testBtn = document.getElementById('btn-test-bluetooth');

        if (bluetoothDevice && bluetoothDevice.gatt.connected) {
            try {
                await disconnectBluetoothPrinter();
            } catch (e) {
                console.error("Disconnect error:", e);
            }
            return;
        }

        try {
            statusDiv.innerHTML = '<i class="fas fa-spinner fa-spin me-1"></i> Scanning for devices...';
            statusDiv.className = "small text-primary text-center py-1 bg-light rounded border border-dashed";
            
            // Standard BLE printer service UUIDs or fallbacks
            bluetoothDevice = await navigator.bluetooth.requestDevice({
                filters: [
                    { name: 'SC03h-BF67' },
                    { namePrefix: 'SC03h' },

                    { services: ['000018f0-0000-1000-8000-00805f9b34fb'] },
                    { namePrefix: 'MTP' },
                    { namePrefix: 'PT-' },
                    { namePrefix: 'Printer' },
                    { namePrefix: 'RP' },
                    { namePrefix: 'QS' },
                    { namePrefix: 'T9' }
                ],
                optionalServices: ['000018f0-0000-1000-8000-00805f9b34fb', '00001101-0000-1000-8000-00805f9b34fb']
            }).catch(async (err) => {
                console.warn("BLE service filtering failed or canceled, prompting all devices...", err);
                return await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['000018f0-0000-1000-8000-00805f9b34fb', '00001101-0000-1000-8000-00805f9b34fb', '49535343-fe7d-4158-9337-ab367e9d9550']
                });
            });

            if (!bluetoothDevice) {
                statusDiv.innerText = 'No device selected';
                statusDiv.className = "small text-muted text-center py-1 bg-light rounded border border-dashed";
                return;
            }

            statusDiv.innerHTML = `<i class="fas fa-spinner fa-spin me-1"></i> Connecting to ${bluetoothDevice.name || 'Printer'}...`;
            
            const server = await bluetoothDevice.gatt.connect();
            const services = await server.getPrimaryServices();
            let foundChar = null;
            
            for (const service of services) {
                const characteristics = await service.getCharacteristics();
                for (const char of characteristics) {
                    if (char.properties.write || char.properties.writeWithoutResponse) {
                        foundChar = char;
                        break;
                    }
                }
                if (foundChar) break;
            }

            if (!foundChar) {
                try {
                    const service = await server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb');
                    foundChar = await service.getCharacteristic('00002af1-0000-1000-8000-00805f9b34fb');
                } catch (e) {
                    console.warn("Direct BLE GATT discovery failed:", e);
                }
            }

            if (!foundChar) {
                throw new Error("No writeable GATT characteristic found on printer.");
            }

            bluetoothCharacteristic = foundChar;
            bluetoothDevice.addEventListener('gattserverdisconnected', onBluetoothPrinterDisconnected);

            if (btn) {
                btn.innerHTML = '<i class="fas fa-unlink me-1"></i> Disconnect Printer';
                btn.className = "btn btn-sm btn-outline-danger fw-bold";
            }
            if (statusDiv) {
                statusDiv.innerHTML = `<i class="fas fa-check-circle text-success me-1"></i> Connected: <strong>${bluetoothDevice.name || 'Mini Printer'}</strong>`;
                statusDiv.className = "small text-success text-center py-1 bg-light rounded border border-success";
            }
            if (testBtn) {
                testBtn.style.display = 'block';
            }

            Swal.fire({
                icon: 'success',
                title: 'Printer Connected',
                text: `Successfully paired with ${bluetoothDevice.name || 'Mini Printer'}.`,
                timer: 2000,
                showConfirmButton: false
            });

        } catch (err) {
            console.error("Bluetooth printer connection error:", err);
            statusDiv.innerHTML = `<i class="fas fa-times-circle text-danger me-1"></i> Connection failed: ${err.message}`;
            statusDiv.className = "small text-danger text-center py-1 bg-light rounded border border-danger";
            bluetoothDevice = null;
            bluetoothCharacteristic = null;
            if (testBtn) testBtn.style.display = 'none';
        }
    }

    async function disconnectBluetoothPrinter() {
        if (bluetoothDevice && bluetoothDevice.gatt.connected) {
            await bluetoothDevice.gatt.disconnect();
        }
        onBluetoothPrinterDisconnected();
    }

    function onBluetoothPrinterDisconnected() {
        bluetoothDevice = null;
        bluetoothCharacteristic = null;
        
        const btn = document.getElementById('btn-connect-bluetooth');
        const statusDiv = document.getElementById('bt-printer-status');
        const testBtn = document.getElementById('btn-test-bluetooth');

        if (btn) {
            btn.innerHTML = '<i class="fas fa-link me-1"></i> Connect Bluetooth Printer';
            btn.className = "btn btn-sm btn-outline-primary fw-bold";
        }
        if (statusDiv) {
            statusDiv.innerText = 'No bluetooth printer connected';
            statusDiv.className = "small text-muted text-center py-1 bg-light rounded border border-dashed";
        }
        if (testBtn) {
            testBtn.style.display = 'none';
        }
    }

    async function sendToBluetoothPrinter(buffer) {
        if (!bluetoothCharacteristic) {
            throw new Error("Printer disconnected. Please reconnect.");
        }

        const CHUNK_SIZE = 20;
        const DELAY_MS = 15;

        for (let offset = 0; offset < buffer.length; offset += CHUNK_SIZE) {
            const chunk = buffer.slice(offset, offset + CHUNK_SIZE);
            try {
                await bluetoothCharacteristic.writeValueWithoutResponse(chunk);
            } catch (err) {
                console.warn("writeValueWithoutResponse failed, trying standard writeValue:", err);
                await bluetoothCharacteristic.writeValue(chunk);
            }
            await new Promise(resolve => setTimeout(resolve, DELAY_MS));
        }
    }

    class EscPosBuilder {
        constructor() {
            this.buffer = [];
        }

        initialize() {
            this.buffer.push(0x1B, 0x40);
            return this;
        }

        alignLeft() {
            this.buffer.push(0x1B, 0x61, 0x00);
            return this;
        }

        alignCenter() {
            this.buffer.push(0x1B, 0x61, 0x01);
            return this;
        }

        alignRight() {
            this.buffer.push(0x1B, 0x61, 0x02);
            return this;
        }

        bold(on = true) {
            this.buffer.push(0x1B, 0x45, on ? 0x01 : 0x00);
            return this;
        }

        doubleSize(on = true) {
            this.buffer.push(0x1D, 0x21, on ? 0x11 : 0x00);
            return this;
        }

        lineFeed(count = 1) {
            for (let i = 0; i < count; i++) {
                this.buffer.push(0x0A);
            }
            return this;
        }

        text(str) {
            const sanitized = str.replace(/₹/g, 'Rs.').normalize('NFD').replace(/[\u0300-\u036f]/g, '');
            for (let i = 0; i < sanitized.length; i++) {
                this.buffer.push(sanitized.charCodeAt(i) & 0xFF);
            }
            return this;
        }

        textLine(str = '') {
            this.text(str);
            this.lineFeed();
            return this;
        }

        divider(char = '-', length = 32) {
            this.textLine(char.repeat(length));
            return this;
        }

        twoColumn(left, right, totalWidth = 32) {
            const leftClean = left.replace(/₹/g, 'Rs.');
            const rightClean = right.replace(/₹/g, 'Rs.');
            const spaces = totalWidth - leftClean.length - rightClean.length;
            if (spaces > 0) {
                this.text(leftClean + ' '.repeat(spaces) + rightClean);
            } else {
                const maxLeftLen = totalWidth - rightClean.length - 1;
                const truncatedLeft = leftClean.substring(0, maxLeftLen);
                const actualSpaces = totalWidth - truncatedLeft.length - rightClean.length;
                this.text(truncatedLeft + ' '.repeat(actualSpaces) + rightClean);
            }
            this.lineFeed();
            return this;
        }

        cashDrawer() {
            this.buffer.push(0x1B, 0x70, 0x00, 0x19, 0xfa);
            return this;
        }

        cut() {
            this.buffer.push(0x1D, 0x56, 0x42, 0x00);
            return this;
        }

        getBuffer() {
            return new Uint8Array(this.buffer);
        }
    }

                    el.style.borderColor = '';

            }
        });

    function triggerPrintPreview() {
        const previewPane = document.getElementById('live-print-preview-pane');
        if (!previewPane) return;

        // Determine which printer type is active
        const activePrinter = document.getElementById('set-default-printer') ? document.getElementById('set-default-printer').value : 'Regular';

        if (activePrinter === 'Thermal' || activePrinter === 'Portable') {
            // === THERMAL RECEIPT PREVIEW ===
            const thermalHTML = generateThermalPreviewHTML();
            // Thermal receipts are narrow (80mm ~= 302px). Scale to fit preview pane.
            const containerWidth = previewPane.clientWidth || 300;
            const thermalWidthPx = 302;
            const scale = Math.min(1, containerWidth / thermalWidthPx);

            previewPane.innerHTML = `
                <div style="width: 100%; display: flex; justify-content: center; padding: 10px 0;">
                    <div style="width: ${thermalWidthPx}px; transform: scale(${scale}); transform-origin: top center; background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.15); border-radius: 2px; font-family: 'Courier New', Courier, monospace;">
                        ${thermalHTML}
                    </div>
                </div>
            `;
        } else {
            // === REGULAR A4 PREVIEW ===
            const a4HTML = generateA4PreviewHTML();
            
            // Create offscreen container to measure actual unscaled height
            const tempDiv = document.createElement('div');
            tempDiv.style.width = '794px';
            tempDiv.style.position = 'absolute';
            tempDiv.style.left = '-9999px';
            tempDiv.style.top = '-9999px';
            tempDiv.style.visibility = 'hidden';
            tempDiv.innerHTML = a4HTML;
            document.body.appendChild(tempDiv);
            
            // Get computed height
            const unscaledHeight = tempDiv.offsetHeight || 1123;
            document.body.removeChild(tempDiv);
            
            const containerWidth = previewPane.clientWidth || 300;
            const a4WidthPx = 794;
            const scale = containerWidth / a4WidthPx;

            previewPane.innerHTML = `
                <div style="width: 100%; height: ${unscaledHeight * scale}px; overflow: hidden; position: relative; border-radius: 4px;">
                    <div style="width: 210mm; min-height: 297mm; transform: scale(${scale}); transform-origin: top left; position: absolute; top: 0; left: 0;">
                        ${a4HTML}
                    </div>
                </div>
            `;
        }
    }

    function refreshBillingQR() {
        if (!window.salesBillingSettings) {
            google.script.run.withSuccessHandler(res => {
                if (res.success) {
                    window.salesBillingSettings = res.settings;
                    refreshBillingQR();
                }
            }).getSalesSettings();
            return;
        }

        const settings = window.salesBillingSettings;
        const upiId = settings.CompanyUpi;
        const payeeName = settings.CompanyUpiName || settings.CompanyName || "V Varma";

        // Identify the active document type and number from editor
        const docTypeSelect = document.getElementById('billingDocType');
        const docType = docTypeSelect ? docTypeSelect.value : 'Invoice';

        const paymentMethod = document.getElementById('billPaymentMethod') ? document.getElementById('billPaymentMethod').value : '';
        let qrEnabled = (paymentMethod === 'UPI');
        if (!qrEnabled) {
            if (docType === 'Invoice' && settings.QrInvoice === 'true') qrEnabled = true;
            else if (docType === 'Sales Invoice' && settings.QrSalesInvoice === 'true') qrEnabled = true;
            else if (docType === 'Proforma Invoice' && settings.QrProformaInvoice === 'true') qrEnabled = true;
            else if (docType === 'Quotation' && settings.QrQuotation === 'true') qrEnabled = true;
            else if (docType === 'Estimation' && settings.QrEstimation === 'true') qrEnabled = true;
            else if (docType === 'Credit Note' && settings.QrCreditNote === 'true') qrEnabled = true;
            else if (docType === 'Debit Note' && settings.QrDebitNote === 'true') qrEnabled = true;
            else if (docType === 'Delivery Challan' && settings.QrDeliveryChallan === 'true') qrEnabled = true;
            else if (docType === 'Receipt' && settings.QrReceipt === 'true') qrEnabled = true;
            else if (docType === 'Payment Request' && settings.QrPaymentRequest === 'true') qrEnabled = true;
        }

        // Apply conditional toggle for DC and Estimations
        if ((docType === 'Estimation' || docType === 'Delivery Challan') && settings.EnablePaymentRequestChallanEst !== 'true') {
            qrEnabled = false;
        }

        const qrContainer = document.getElementById('billingQrContainer');
        if (!qrContainer) return;

        if (!qrEnabled || !upiId) {
            document.getElementById('billingQrPlaceholder').classList.remove('d-none');
            document.getElementById('billingQrPlaceholder').innerHTML = `<div class="text-muted" style="font-size: 0.65rem;">${!upiId ? 'Setup UPI details in Settings' : 'QR code hidden for ' + docType}</div>`;
            document.getElementById('billingQrImage').classList.add('d-none');
            document.getElementById('billingQrPayButton').classList.add('d-none');
            document.getElementById('billingQrAmtInfo').innerText = 'Pay Amount: \u20B90.00';
            return;
        }

        const docNumber = document.getElementById('billNo') ? document.getElementById('billNo').value : 'DRAFT';
        const grandTotalText = document.getElementById('billGrandTotal').innerText;
        let amount = parseFloat(grandTotalText.replace(/[^\d.]/g, '')) || 0;

        // Special Credit Note Refund logic
        if (docType === 'Credit Note') {
            amount = Math.abs(amount);
        }

        document.getElementById('billingQrAmtInfo').innerText = `Pay Amount: \u20B9${amount.toFixed(2)}`;

        if (amount <= 0) {
            document.getElementById('billingQrPlaceholder').classList.remove('d-none');
            document.getElementById('billingQrPlaceholder').innerHTML = `<div class="text-muted" style="font-size: 0.65rem;">Amount must be > \u20B90</div>`;
            document.getElementById('billingQrImage').classList.add('d-none');
            document.getElementById('billingQrPayButton').classList.add('d-none');
            return;
        }

        // Construct UPI URL format
        const encodedPn = encodeURIComponent(payeeName);
        const encodedTn = encodeURIComponent(`${docType} ${docNumber}`);
        const upiUrl = 'upi:/' + '/pay?pa=' + upiId + '&pn=' + encodedPn + '&am=' + amount.toFixed(2) + '&cu=INR&tn=' + encodedTn;

        // Generate dynamically at runtime via QRServer
        const qrImageUrl = 'https:/' + '/api.qrserver.com/v1/create-qr-code/?size=150x150&data=' + encodeURIComponent(upiUrl);

        document.getElementById('billingQrPlaceholder').classList.add('d-none');

        const qrImg = document.getElementById('billingQrImage');
        qrImg.src = qrImageUrl;
        qrImg.classList.remove('d-none');

        const payBtn = document.getElementById('billingQrPayButton');
        payBtn.href = upiUrl;
        payBtn.classList.remove('d-none');
        payBtn.onclick = function(e) {
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            if (!isMobile) {
                e.preventDefault();
                Swal.fire({
                    title: 'Scan QR Code instead!',
                    text: 'This button is meant for mobile devices with UPI apps installed. Since you are on a desktop browser, please scan the generated QR code on the screen using GPay, PhonePe, Paytm, or BHIM on your phone to complete the payment.',
                    icon: 'info',
                    confirmButtonText: 'Got it!'
                });
            }
        };
    }

        const bType = document.getElementById('billBusinessType').value;
        if (!keepParty) {
            document.getElementById('billPartySearchInput').value = '';
            document.getElementById('billPartySelect').value = '';
            document.getElementById('partyDetailsDisplay').classList.add('d-none');
        }

        // Toggle GST visibility for the whole billing modal
        const modalContent = document.querySelector('#billingModal .modal-content');
        const gstToggle = document.getElementById('billGstToggle');
        if (modalContent) {
            if (bType === 'B2C') {
                modalContent.classList.add('gst-disabled');
                if (gstToggle) gstToggle.checked = false;
            } else {
                modalContent.classList.remove('gst-disabled');
                if (gstToggle) gstToggle.checked = true;
            }
        }

        // Refresh product list if needed (though usually empty at start)
        calculateBillingTotals();
    }

    function handlePartySearch(e) {
        const query = e.target.value.toLowerCase().trim();
        const dropdown = document.getElementById('billPartyDropdown');
        const bType = document.getElementById('billBusinessType').value;

        if (!query) {
            dropdown.classList.remove('show');
            return;
        }

        let matches = partyList.filter(p => {
            const pType = p.PartyType || 'B2C';
            if (pType !== bType && bType !== 'All') return false;
            return (p.Name && p.Name.toLowerCase().includes(query)) ||
                (p.Mobile && String(p.Mobile).includes(query)) ||
                (p.GstNumber && p.GstNumber.toLowerCase().includes(query)) ||
                (p.ShopName && p.ShopName.toLowerCase().includes(query));
        });

        // If no matches in selected type, try searching in all types
        if (matches.length === 0 && bType !== 'All') {
            matches = partyList.filter(p => {
                return (p.Name && p.Name.toLowerCase().includes(query)) ||
                    (p.Mobile && String(p.Mobile).includes(query)) ||
                    (p.GstNumber && p.GstNumber.toLowerCase().includes(query)) ||
                    (p.ShopName && p.ShopName.toLowerCase().includes(query));
            });
        }

        if (matches.length === 0) {
            dropdown.innerHTML = '<div class="p-2 text-muted small">No parties found. Click Add to create a new party.</div>';
        } else {
            let html = '';
            matches.slice(0, 10).forEach(p => {
                html += `<a href="javascript:void(0)" class="dropdown-item py-2 border-bottom" onclick="selectParty('${p.Id}'); return false;">
                        <div class="d-flex justify-content-between">
                            <strong class="text-primary">${p.Name} ${p.ShopName ? '(' + p.ShopName + ')' : ''}</strong>
                            <span class="badge bg-light text-dark border">${p.Mobile}</span>
                        </div>
                        <div class="small text-muted"><i class="fas fa-map-marker-alt me-1"></i> ${p.Address || 'No address'} | GST: <b>${p.GstNumber || 'N/A'}</b></div>
                     </a>`;
            });
            dropdown.innerHTML = html;
        }
        dropdown.classList.add('show');
    }

    function selectParty(id) {
        const p = partyList.find(x => x.Id === id);
        if (!p) {
            console.warn('[Sales] Party not found:', id);
            return;
        }

        try {
            const selEl = document.getElementById('billPartySelect');
            const searchEl = document.getElementById('billPartySearchInput');
            const ddEl = document.getElementById('billPartyDropdown');

            if (selEl) selEl.value = p.Id;
            if (searchEl) searchEl.value = `${p.Name} - ${p.Mobile}`;
            if (ddEl) ddEl.classList.remove('show');

            const safeSet = (id, val) => {
                const el = document.getElementById(id);
                if (el) el.innerText = val;
            };

            safeSet('pdName', p.Name || 'N/A');
            safeSet('pdShop', p.ShopName || '');
            safeSet('pdContact', `Ph: ${p.Mobile || ''} | ${p.Email || ''}`);
            safeSet('pdAddress', `${p.Address || ''} ${p.Pincode || ''}`);
            safeSet('pdGst', p.GstNumber || 'N/A');
            safeSet('pdLimit', p.CreditLimit || '0');
            safeSet('pdOutstanding', p.CurrentBalance || '0');
            safeSet('billPrevBalance', `\u20B9${parseFloat(p.CurrentBalance || 0).toFixed(2)}`);

            const displayEl = document.getElementById('partyDetailsDisplay');
            if (displayEl) displayEl.classList.remove('d-none');

            // Auto-sync Business Type and GST visibility
            const bizDropdown = document.getElementById('billBusinessType');
            const gstToggle = document.getElementById('billGstToggle');
            if (bizDropdown && p.PartyType && bizDropdown.value !== p.PartyType) {
                bizDropdown.value = p.PartyType;
                if (p.PartyType === 'B2C' && gstToggle) gstToggle.checked = false;
                onBusinessTypeChange(true);
            }
        } catch (e) {
            console.error('[Sales] selectParty error:', e);
        }
    }

    // Global Error Handler
    window.onerror = function (msg, url, line, col, error) {
        console.error('GLOBAL JS ERROR:', msg, 'at', line, ':', col);
        
        // Ignore extension errors or cross-origin/third-party benign errors
        if (url && (url.indexOf('chrome-extension') !== -1 || url.indexOf('moz-extension') !== -1 || url.indexOf('extension') !== -1)) {
            return false;
        }
        
        // If it's a serious application error, show Swal alert
        if (typeof Swal !== 'undefined') {
            // Ignore generic extension/cross-origin syntax noise
            if (msg && (msg.includes('Script error') || (msg.includes('Unexpected token') && col > 700000))) {
                return false;
            }
            Swal.fire({
                icon: 'error',
                title: 'System Script Error',
                text: msg,
                footer: 'Line: ' + line + ' Col: ' + col

        }

    /**
     * Utility: Format Date for UI
     */
    function formatDate(date) {
        if (!date) return 'N/A';
        const d = new Date(date);
        if (isNaN(d.getTime())) return String(date);
        const day = String(d.getDate()).padStart(2, '0');
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const year = d.getFullYear();
        return `${day}/${month}/${year}`;
    }

    /**
     * Utility: Get Status Badge Class
     */
    function getStatusBadge(s) {
        if (!s) return 'bg-secondary';
        const status = s.toString().toLowerCase();
        if (status.includes('registered') || status.includes('pending') || status.includes('waiting')) return 'bg-warning text-dark';
        if (status.includes('assigned') || status.includes('approved')) return 'bg-primary';
        if (status.includes('resolved') || status.includes('completed') || status.includes('active')) return 'bg-success';
        if (status.includes('cancelled') || status.includes('blocked') || status.includes('reject')) return 'bg-danger';
        if (status.includes('inactive')) return 'bg-secondary';
        return 'bg-warning text-dark';
    }

    function switchAdminModule(sectionId) {
        // Normalize sectionId (handle singular/plural mismatches)
        if (sectionId === 'installation') sectionId = 'installations';
        
        console.log('[Nav] switchAdminModule called for:', sectionId);

        // Handle specific route redirects
        if (sectionId === 'register') {
            window.location.search = '?page=register';
            return;
        }

        const target = document.getElementById('section-' + sectionId);
        if (!target) {
            console.error('[Nav] FAILED: Target section not found: section-' + sectionId);
            Swal.fire('Navigation Error', 'Module section not found: ' + sectionId, 'warning');
            return;
        }

        showAdminLoading();

        setTimeout(() => {
            try {
                // 1. Update Sidebar Active State
                document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
                const activeMenu = document.getElementById('menu-' + sectionId);
                if (activeMenu) activeMenu.classList.add('active');

                // 2. Hide All Sections Immediately
                document.querySelectorAll('.admin-section').forEach(s => {
                    s.style.display = 'none';
                });

                // 3. Reveal Target Section
                target.style.display = 'block';
                console.log('[Nav] Section visible:', sectionId);

                // 4. Trigger Data Refreshers
                const refreshers = {
                    'dashboard': typeof initDashboard === 'function' ? initDashboard : null,
                    'catalog': typeof refreshCatalogDashboard === 'function' ? refreshCatalogDashboard : null,
                    'complaints': typeof refreshComplaints === 'function' ? refreshComplaints : null,
                    'warranties': typeof refreshWarranties === 'function' ? refreshWarranties : null,
                    'installations': typeof refreshInstallations === 'function' ? refreshInstallations : null,
                    'products': typeof refreshProducts === 'function' ? refreshProducts : null,
                    'ledger': typeof refreshLedger === 'function' ? refreshLedger : null,
                    'inventory': typeof refreshInventory === 'function' ? refreshInventory : null,
                    'dealers': typeof refreshDealers === 'function' ? refreshDealers : null,
                    'technicians': typeof refreshTechnicians === 'function' ? refreshTechnicians : null,
                    'orders': typeof refreshOrders === 'function' ? refreshOrders : null,
                    'amc': typeof refreshAMC === 'function' ? refreshAMC : null,
                    'notifications': typeof refreshNotifications === 'function' ? refreshNotifications : null,
                    'parties': typeof refreshParties === 'function' ? refreshParties : null,
                    'sales': typeof initSalesModule === 'function' ? initSalesModule : null,
                    'websettings': typeof refreshWebSettings === 'function' ? refreshWebSettings : null,
                    'settings': () => console.log('Settings module loaded')
                };

                if (refreshers[sectionId]) {
                    try {
                        refreshers[sectionId]();
                    } catch (re) {
                        console.error('[Nav] Refresher failed for ' + sectionId + ':', re);
                    }
                }

                // 5. Mobile UX: Auto-close sidebar
                if (window.innerWidth < 992) {
                    const sidebar = document.getElementById('sidebar');
                    if (sidebar && sidebar.classList.contains('show')) sidebar.classList.remove('show');
                }
                hideAdminLoading();

            } catch (err) {
                console.error('[Nav] Critical Navigation Crash:', err);
                hideAdminLoading();
                Swal.fire('System Error', 'Navigation failed. Please refresh the page.', 'error');
            }
        }, 10);
    }

    /**
     * Safe DOM Utilities

    function safeSetText(id, val) {
        const el = document.getElementById(id);
        if (el) el.innerText = val !== undefined && val !== null ? val : '0';
    }

    function safeSetHtml(id, val) {
        const el = document.getElementById(id);
        if (el) el.innerHTML = val !== undefined && val !== null ? val : '';

    function saveManualSSId() {
        const id = document.getElementById('manual-ss-id').value;
        if (!id) {
            Swal.fire({
                title: 'Clear Override?',
                text: 'Are you sure you want to remove the manual spreadsheet ID and use the default?',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'Yes, clear it'
            }).then((result) => {
                if (result.isConfirmed) {
                    executeManualSSIdUpdate('');
                }
            });
        } else {
            executeManualSSIdUpdate(id);
        }
    }

    function executeManualSSIdUpdate(id) {
        showAdminLoading();
        google.script.run.withFailureHandler(err => { console.error('Backend Error:', err); Swal.fire('System Error', err.message || 'Failed to load data', 'error'); hideAdminLoading && typeof hideAdminLoading === 'function' ? hideAdminLoading() : null; }).withSuccessHandler(res => {
            hideAdminLoading();
            if (res.success) {
                Swal.fire('Success', res.message, 'success').then(() => {
                    checkDatabaseDiagnostics();
                    refreshWebSettings();
                });
            } else {
                Swal.fire('Error', res.message, 'error');
            }
        }).setManualSpreadsheetId(id);
    }

    function checkDatabaseDiagnostics() {
        google.script.run.withFailureHandler(err => { console.error('Backend Error:', err); Swal.fire('System Error', err.message || 'Failed to load data', 'error'); hideAdminLoading && typeof hideAdminLoading === 'function' ? hideAdminLoading() : null; }).withSuccessHandler(res => {
            const diag = document.getElementById('diag-results');
            diag.style.display = 'block';
            let html = `<strong>Connected To:</strong> ${res.ssName}<br>`;
            html += `<strong>SS ID:</strong> ${res.ssId}<br>`;
            html += `<strong>Manual Override:</strong> ${res.manualId}<br>`;
            html += `<strong>Container Bound:</strong> ${res.isContainerBound}<br>`;
            html += `<hr><strong>Tabs Detected:</strong><br>`;
            res.sheets.forEach(s => {
                html += `- ${s.name}: ${s.rows} rows<br>`;
            });
            diag.innerHTML = html;

            // Auto-fill manual ID field if not already filled
            if (res.manualId !== 'None (Using Default/Active)') {
                document.getElementById('manual-ss-id').value = res.ssId;
            }
        }).withFailureHandler(err => {
            Swal.fire('Diagnostic Error', err.message, 'error');
        }).getDiagnostics();
    }

    // --- Web Settings & Carousel Logic ---

    function refreshWebSettings() {
        console.log('[WS] refreshWebSettings called');

        // Defensive modal init
        try {
            if (!carouselModal) {
                var modalEl = document.getElementById('carouselModal');
                if (modalEl) carouselModal = new bootstrap.Modal(modalEl);
            }
            if (!carouselImageModal) {
                var galleryModalEl = document.getElementById('carouselImageModal');
                if (galleryModalEl) carouselImageModal = new bootstrap.Modal(galleryModalEl);
            }
        } catch (modalErr) {
            console.error('[WS] Modal init error:', modalErr);
        }

        // Load Configs (fast: reads only webSettings sheet)
        try {
            google.script.run.withFailureHandler(err => { console.error('Backend Error:', err); Swal.fire('System Error', err.message || 'Failed to load data', 'error'); hideAdminLoading && typeof hideAdminLoading === 'function' ? hideAdminLoading() : null; }).withSuccessHandler(function (settings) {
                console.log('[WS] Settings loaded:', settings);
                try {
                    if (settings && settings.site_logo) {
                        var logoEl = document.getElementById('current-logo-preview');
                        if (logoEl) logoEl.src = settings.site_logo;
                    }
                    if (settings && settings.banner_timing) {
                        var btEl = document.getElementById('config-banner-timing');
                        if (btEl) btEl.value = settings.banner_timing;
                    }
                    if (settings && settings.catalog_timing) {
                        var ctEl = document.getElementById('config-catalog-timing');
                        if (ctEl) ctEl.value = settings.catalog_timing;
                    }
                    if (settings && settings.gallery_timing) {
                        var gtEl = document.getElementById('config-gallery-timing');
                        if (gtEl) gtEl.value = settings.gallery_timing;
                    }
                    if (settings) {
                        const serviceAreas = settings.service_areas || '';
                        const serviceAreasEl = document.getElementById('stats-service-areas');
                        if (serviceAreasEl) serviceAreasEl.value = serviceAreas;
                        
                        partnerLogos = [];
                        let pLogos = settings.partner_logos || '[]';
                        if (typeof pLogos === 'string' && pLogos.trim().startsWith('[')) {
                            try { pLogos = JSON.parse(pLogos); } catch(e) {}
                        }
                        if (pLogos && Array.isArray(pLogos)) {
                            pLogos.forEach(url => {
                                if (url && url.length > 10) {
                                    partnerLogos.push({ url: url });
                                }
                            });
                        }
                        renderPartnerLogosPreviews();
                    }
                } catch (e) { console.error('[WS] Settings render error:', e); }
            }).withFailureHandler(function (err) {
                console.error('[WS] Settings load failed:', err);
            }).getWebSettings();
        } catch (e) { console.error('[WS] Settings call error:', e); }

        // Load Auto Stats separately (slow: reads warranty, dealers, users, parties sheets)
        // Show loading placeholder in read-only stat inputs
        ['stats-installs','stats-dealers','stats-techs','stats-areas-count'].forEach(id => {
            const el = document.getElementById(id);
            if (el) { el.value = ''; el.placeholder = 'Calculating...'; }
        });
        try {
            google.script.run
                .withSuccessHandler(function(stats) {
                    if (stats && stats.success) {
                        const installsEl = document.getElementById('stats-installs');
                        if (installsEl) { installsEl.value = stats.installations_count; installsEl.placeholder = 'Auto-calculated from DB'; }
                        const dealersEl = document.getElementById('stats-dealers');
                        if (dealersEl) { dealersEl.value = stats.dealers_count; dealersEl.placeholder = 'Auto-calculated from DB'; }
                        const techsEl = document.getElementById('stats-techs');
                        if (techsEl) { techsEl.value = stats.technicians_count; techsEl.placeholder = 'Auto-calculated from DB'; }
                        const areasEl = document.getElementById('stats-areas-count');
                        if (areasEl) { areasEl.value = stats.areas_count; areasEl.placeholder = 'Auto-calculated from DB'; }
                        console.log('[WS] Auto stats loaded:', stats);
                    } else {
                        console.warn('[WS] Auto stats returned failure:', stats);
                        ['stats-installs','stats-dealers','stats-techs','stats-areas-count'].forEach(id => {
                            const el = document.getElementById(id);
                            if (el) el.placeholder = 'Could not calculate';
                        });
                    }
                })
                .withFailureHandler(function(err) {
                    console.error('[WS] Auto stats load failed:', err);
                    ['stats-installs','stats-dealers','stats-techs','stats-areas-count'].forEach(id => {
                        const el = document.getElementById(id);
                        if (el) el.placeholder = 'Error loading stats';
                    });
                })
                .getAutoStats();
        } catch (e) { console.error('[WS] Auto stats call error:', e); }

        // Load Hero Slides
        var heroTbody = document.getElementById('hero-slides-content');
        if (heroTbody) heroTbody.innerHTML = '<tr><td colspan="4" class="text-center py-3"><div class="spinner-border spinner-border-sm text-primary"></div> Loading slides...</td></tr>';

        try {
            google.script.run
                .withSuccessHandler(function (slides) {
                    console.log('[WS] Hero slides received:', slides ? slides.length : 'NULL');
                    try {
                        allHeroSlides = slides || [];
                        var tbody = document.getElementById('hero-slides-content');
                        if (!tbody) { console.error('[WS] hero-slides-content tbody not found!'); return; }

                        if (!slides || slides.length === 0) {
                            tbody.innerHTML = '<tr><td colspan="4" class="text-center py-5 text-muted">No hero slides found. getData returned: ' + JSON.stringify(slides) + '</td></tr>';
                            return;
                        }

                        var html = '';
                        for (var i = 0; i < slides.length; i++) {
                            var s = slides[i];
                            var sid = s.SlideID || s['Slide ID'] || s.ImageID || s.id || ('idx-' + i);
                            var imgUrl = s.ImageURL || s['Image URL'] || s.url || '';
                            var title = s.Title || s.title || 'No Title';
                            var badge = s.Badge || s.badge || '';
                            var status = (s.Status || s.status || '').toString().toLowerCase();
                            var statusText = status === 'active' ? 'Active' : 'Paused';
                            var badgeClass = status === 'active' ? 'bg-success' : 'bg-secondary';

                            html += '<tr>';
                            html += '<td class="ps-4"><img src="' + imgUrl + '" class="rounded border" style="width: 120px; height: 50px; object-fit: cover;" onerror="this.src=\'https://via.placeholder.com/120x50?text=No+Image\'"></td>';
                            html += '<td><div class="fw-bold text-brown">' + title + '</div><div class="small text-muted">' + badge + '</div></td>';
                            html += '<td><span class="badge ' + badgeClass + '">' + statusText + '</span></td>';
                            html += '<td class="text-end pe-4"><div class="btn-group">';
                            html += '<button class="btn btn-sm btn-outline-primary" onclick="editSlide(\'' + sid + '\')"><i class="fas fa-edit"></i></button>';
                            if (status === 'active') {
                                html += '<button class="btn btn-sm btn-outline-warning" onclick="toggleSlideStatus(\'' + sid + '\', \'Paused\')"><i class="fas fa-pause"></i></button>';
                            } else {
                                html += '<button class="btn btn-sm btn-outline-success" onclick="toggleSlideStatus(\'' + sid + '\', \'Active\')"><i class="fas fa-play"></i></button>';
                            }
                            html += '<button class="btn btn-sm btn-outline-danger" onclick="deleteSlide(\'' + sid + '\')"><i class="fas fa-trash-alt"></i></button>';
                            html += '</div></td></tr>';
                        }
                        tbody.innerHTML = html;
                        console.log('[WS] Rendered ' + slides.length + ' hero slides');
                    } catch (renderErr) {
                        console.error('[WS] Hero render error:', renderErr);
                        var errTbody = document.getElementById('hero-slides-content');
                        if (errTbody) errTbody.innerHTML = '<tr><td colspan="4" class="text-danger fw-bold p-3">RENDER ERROR: ' + renderErr.message + '</td></tr>';
                    }
                })
                .withFailureHandler(function (err) {
                    console.error('[WS] Hero slides server error:', err);
                    var errTbody = document.getElementById('hero-slides-content');
                    if (errTbody) errTbody.innerHTML = '<tr><td colspan="4" class="text-danger fw-bold p-3">SERVER ERROR: ' + (err.message || err) + '</td></tr>';
                })
                .getData('heroSlides');
        } catch (e) {
            console.error('[WS] Hero slides call error:', e);
            if (heroTbody) heroTbody.innerHTML = '<tr><td colspan="4" class="text-danger fw-bold p-3">JS ERROR: ' + e.message + '</td></tr>';
        }

        // Load Carousel Images
        try {
            google.script.run.withFailureHandler(err => { console.error('Backend Error:', err); Swal.fire('System Error', err.message || 'Failed to load data', 'error'); hideAdminLoading && typeof hideAdminLoading === 'function' ? hideAdminLoading() : null; }).withSuccessHandler(function (images) {
                console.log('[WS] Carousel images received:', images ? images.length : 'NULL');
                try {
                    allCarouselImages = images || [];
                    var grid = document.getElementById('carousel-grid-content');
                    if (!grid) { console.error('[WS] carousel-grid-content not found!'); return; }

                    if (!images || images.length === 0) {

    function handleLinkTypeChange(btnNum) {
        const typeSelect = document.getElementById('slide-btn' + btnNum + '-link-type');
        const container = document.getElementById('slide-btn' + btnNum + '-link-target-container');
        if (!typeSelect || !container) return;

        const type = typeSelect.value;
        if (type === 'page') {
            const standardPages = btnNum === 2 ? 
                ['register', 'catalog', 'service_portal', 'complaint', 'installation', 'tracking', 'dealers', 'cart'] :
                ['catalog', 'register', 'service_portal', 'complaint', 'installation', 'tracking', 'dealers', 'cart'];
            
            let html = '<label class="form-label fw-bold" style="font-size: 0.75rem;">Destination</label>';
            html += `<select class="form-select form-select-sm" id="slide-btn${btnNum}-link-target" onchange="handleLinkTargetChange(${btnNum})">`;
            standardPages.forEach(p => {
                const label = p.replace('_', ' ').replace(/\b\w/g, c => c.toUpperCase());
                html += `<option value="${p}">${label}</option>`;
            });
            html += '</select>';
            container.innerHTML = html;
            handleLinkTargetChange(btnNum);
        } else if (type === 'product') {
            container.innerHTML = `
                <label class="form-label fw-bold" style="font-size: 0.75rem;">Destination</label>
                <select class="form-select form-select-sm" id="slide-btn${btnNum}-link-target" onchange="handleLinkTargetChange(${btnNum})">

                </select>

        } else {
            container.innerHTML = `
                <label class="form-label fw-bold" style="font-size: 0.75rem;">Custom URL / Anchor</label>
                <input type="text" class="form-control form-control-sm" id="slide-btn${btnNum}-link-target-input" placeholder="e.g. #about or https://..." oninput="handleLinkTargetChange(${btnNum})">
            `;
            handleLinkTargetChange(btnNum);
        }
    }

    function fetchCatalogProductsForSlideDropdown(btnNum, selectedVal = '') {
        const select = document.getElementById('slide-btn' + btnNum + '-link-target');
        if (!select) return;

        function populateSelect(products) {
            let html = '<option value="">-- SELECT PRODUCT --</option>';
            products.forEach(p => {
                const pid = p.ProductID || p.productid || p['Product ID'] || '';
                const mNo = p.ModelNo || p.modelno || p['Model Number'] || '';
                const title = p.ProductTitle || p.Name || '';
                html += `<option value="catalog?pid=${pid}">${mNo} - ${title}</option>`;
            });
            select.innerHTML = html;
            if (selectedVal) {
                select.value = selectedVal;
            }
        }

        if (catalogDataCache && catalogDataCache.length > 0) {
            populateSelect(catalogDataCache);
        } else {
            google.script.run
                .withSuccessHandler(data => {
                    catalogDataCache = data || [];
                    populateSelect(catalogDataCache);
                })
                .withFailureHandler(err => {
                    console.error('[Slide Link Dropdown] Product load error:', err);
                    select.innerHTML = '<option value="">Failed to load products</option>';
                })
                .getPublicCatalogProducts();
        }
    }

        const typeSelect = document.getElementById('slide-btn' + btnNum + '-link-type');
        const hiddenInput = document.getElementById('slide-btn' + btnNum + 'Url');
        if (!typeSelect || !hiddenInput) return;

    function initSlideLinkFields(btnNum, url) {
        url = url || (btnNum === 2 ? 'register' : 'catalog');
        const typeSelect = document.getElementById('slide-btn' + btnNum + '-link-type');
        const hiddenInput = document.getElementById('slide-btn' + btnNum + 'Url');
        if (hiddenInput) hiddenInput.value = url;
        if (!typeSelect) return;

        const standardPages = ['catalog', 'register', 'service_portal', 'complaint', 'installation', 'tracking', 'dealers', 'cart'];
        
        if (url.includes('catalog?pid=')) {
            typeSelect.value = 'product';
            handleLinkTypeChange(btnNum);
            fetchCatalogProductsForSlideDropdown(btnNum, url);
        } else if (standardPages.includes(url)) {
            typeSelect.value = 'page';
            handleLinkTypeChange(btnNum);
            const targetSelect = document.getElementById('slide-btn' + btnNum + '-link-target');
            if (targetSelect) targetSelect.value = url;
        } else {
            typeSelect.value = 'custom';
            handleLinkTypeChange(btnNum);
            const targetInput = document.getElementById('slide-btn' + btnNum + '-link-target-input');
            if (targetInput) targetInput.value = url;
        }
    }

    function saveCarouselSlide() {
        const btn = document.getElementById('saveCarouselBtnText');
        const spinner = document.getElementById('saveCarouselSpinner');

        let base64 = null;
        if (cropper) {
            try {
                const canvas = cropper.getCroppedCanvas({ width: 1000, height: 1000 });
                if (canvas) {
                    base64 = canvas.toDataURL('image/jpeg', 0.85);
                }
            } catch (cropErr) {
                console.error('Cropper Canvas Error:', cropErr);
                if (!currentEditingSlideId) {
                    Swal.fire('Image Error', 'Could not process the image. Try uploading a new file.', 'error');
                    return;
                }
            }
        } else {
            base64 = window.slideImageBase64 || null;
        }

        if (!base64 && !currentEditingSlideId) {
            Swal.fire('Warning', 'Please select an image first.', 'warning');
            return;
        }

        if (btn) btn.style.opacity = '0.5';
        if (spinner) spinner.style.display = 'inline-block';

        const titleEl = document.getElementById('slide-title') || document.querySelector('input[name="title"]');
        const descEl = document.getElementById('slide-desc') || document.querySelector('textarea[name="subtitle"]');
        const btn1TextEl = document.getElementById('slide-btn1Text') || document.querySelector('input[name="btnText"]');
        const btn1UrlEl = document.getElementById('slide-btn1Url') || document.querySelector('input[name="btnLink"]');

        const data = {
            id: currentEditingSlideId,
            base64: base64,
            title: titleEl ? titleEl.value : '',
            badge: document.getElementById('slide-badge') ? document.getElementById('slide-badge').value : '',
            desc: descEl ? descEl.value : '',
            btn1Text: btn1TextEl ? btn1TextEl.value : '',
            btn1Url: btn1UrlEl ? btn1UrlEl.value : '',
            btn2Text: document.getElementById('slide-btn2Text') ? document.getElementById('slide-btn2Text').value : '',
            btn2Url: document.getElementById('slide-btn2Url') ? document.getElementById('slide-btn2Url').value : '',
            stat1: document.getElementById('slide-stat1') ? document.getElementById('slide-stat1').value : '',
            stat2: document.getElementById('slide-stat2') ? document.getElementById('slide-stat2').value : '',
            stat3: document.getElementById('slide-stat3') ? document.getElementById('slide-stat3').value : '',
            style: JSON.stringify({
                fontSize: document.getElementById('slide-font-size') ? document.getElementById('slide-font-size').value : '3.8',
                fontWeight: document.getElementById('slide-font-weight') ? document.getElementById('slide-font-weight').value : '800',
                color: document.getElementById('slide-text-color') ? document.getElementById('slide-text-color').value : '#1a1a1a'
            })
        };

        const handler = currentEditingSlideId === 'GALLERY_UPLOAD' ? 'addCarouselImage' : (currentEditingSlideId ? 'updateHeroSlide' : 'addHeroSlide');

        google.script.run
            .withSuccessHandler(res => {
                if (btn) btn.style.opacity = '1';
                if (spinner) spinner.style.display = 'none';
                if (res.success) {
                    carouselModal.hide();
                    window.slideImageBase64 = null;
                    refreshWebSettings();
                    Swal.fire('Success', 'Saved successfully!', 'success');
                } else {
                    Swal.fire('Error', 'Error: ' + res.message, 'error');
                }
            })
            .withFailureHandler(err => {
                if (btn) btn.style.opacity = '1';
                if (spinner) spinner.style.display = 'none';
                Swal.fire('Error', 'Server error: ' + err.message, 'error');
            })[handler](data);
    }

        if (titleEl) titleEl.value = img.Caption || img.caption || '';

        // Populate styling fields
        const style = JSON.parse(img.StyleJSON || img.StyleJson || img.stylejson || '{}');
        if (document.getElementById('carousel-image-title-pos')) document.getElementById('carousel-image-title-pos').value = style.titlePosition || 'bottom';
        if (document.getElementById('carousel-image-fit')) document.getElementById('carousel-image-fit').value = style.imageFit || 'contain';
        if (document.getElementById('carousel-image-title-color')) document.getElementById('carousel-image-title-color').value = style.color || '#3d2b1f';

        if (preview) {
            preview.crossOrigin = 'anonymous';

            const isGoogleHost = finalUrl.includes('googleusercontent.com') || finalUrl.includes('drive.google.com');
            if (finalUrl && !isGoogleHost) {
                const separator = finalUrl.includes('?') ? '&' : '?';
                finalUrl = finalUrl + separator + 't=' + Date.now();
            }
            preview.src = finalUrl;
        }

        const container = document.getElementById('gallery-preview-container');
        if (container) container.style.display = 'block';

        const fileInput = document.getElementById('gallery-image-input');
        if (fileInput) fileInput.value = '';

        // Initialize gallery link fields on edit - check all possible field names from getData()
        const linkedProductVal = img['Linked Product ID'] || img.linkedproductid || img.LinkedProductID || img.linkedId || 'None';
        initGalleryLinkFields(linkedProductVal);

        carouselImageModal.show();

    function saveCarouselImage() {
        let base64 = window.galleryImageBase64 || null;
        if (!base64 && !currentEditingGalleryId) {

        }

        showAdminLoading();

        const linkedInput = document.getElementById('gallery-linkedId');
        const linkedId = linkedInput ? linkedInput.value : 'None';

        const styleObj = {

            color: document.getElementById('carousel-image-title-color').value,
            fontSize: document.getElementById('carousel-image-title-size').value,
            fontWeight: 'bold'
        };

        const data = {
            id: currentEditingGalleryId,
            base64: base64,
            caption: titleEl ? titleEl.value : '',
            linkedId: linkedId,
            style: JSON.stringify(styleObj)
        };

        const handler = currentEditingGalleryId ? 'updateCarouselImage' : 'addCarouselImage';

    function refreshDealers() {
        const body = document.getElementById('dealers-list-body');

                return;

            // Update badges
            const pendingCount = data.filter(d => String(d.Status).toLowerCase() === 'pending').length;
            const badgeSidebar = document.getElementById('badge-pending-dealers');
            const badgeTab = document.getElementById('badge-pending-dealers-tab');
            
            if (pendingCount > 0) {
                if (badgeSidebar) { badgeSidebar.innerText = pendingCount; badgeSidebar.classList.remove('d-none'); }
                if (badgeTab) { badgeTab.innerText = pendingCount; badgeTab.classList.remove('d-none'); }

                if (badgeSidebar) badgeSidebar.classList.add('d-none');

                const searchable = `${d['Dealer Name']} ${d['Shop Name']} ${d['Mobile']} ${d['Pincode']} ${d['Area']} ${d['District']}`.toLowerCase();

                        <td class="small">
                            <span class="text-muted"><i class="fas fa-map-marker-alt me-1"></i> ${areaDist}</span>
                        </td>
                        <td class="fw-bold text-dark">${pincode}</td>
                        <td class="text-center"><span class="badge ${badgeClass} px-3 py-2 rounded-pill text-uppercase" style="font-size: 0.65rem;">${status}</span></td>
                        <td class="text-end pe-4">
                            <div class="d-flex gap-1 justify-content-end">
                                <a href="https://wa.me/91${mobile}" target="_blank" class="btn btn-sm btn-success rounded-circle shadow-sm" title="WhatsApp" style="width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;">

                    return;

                const btn = document.getElementById('adminSubmitBtn');
                const originalText = btn.innerHTML;
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Saving...';

                const formData = new FormData(this);

    function showAddTechView() {
        console.log('[Admin] Opening Add Technician View');
        document.getElementById('admin-tech-list-view').style.display = 'none';
        document.getElementById('admin-add-tech-view').style.display = 'block';
        
        const stateSelect = document.getElementById('techStateDropdown');
        const districtSelect = document.getElementById('techDistrictDropdown');
        
        // Reset dropdowns
        stateSelect.innerHTML = '<option value="">-- SELECT STATE --</option>';
        districtSelect.innerHTML = '<option value="">-- SELECT DISTRICT --</option>';
        districtSelect.disabled = true;

        // 1. Populate State Dropdown
        google.script.run.withFailureHandler(err => {
            console.error('[Admin] Error loading states:', err);
        }).withSuccessHandler(res => {
            console.log('[Admin] getDropdownOptions res:', res);
            if (res.success && res.data) {
                const states = res.data.State || res.data.state || [];
                states.forEach(s => {
                    if (s) stateSelect.add(new Option(s, s));
                });
            }
        }).getDropdownOptions();
        
        // 2. Clear previous onchange and attach new one
        stateSelect.onchange = function() {
            const stateValue = this.value;
            districtSelect.innerHTML = '<option value="">-- LOADING... --</option>';
            districtSelect.disabled = true;
            
            if (!stateValue) {
                districtSelect.innerHTML = '<option value="">-- SELECT DISTRICT --</option>';
                return;
            }
            
            console.log('[Admin] Fetching districts for:', stateValue);
            google.script.run.withFailureHandler(err => {
                console.error('[Admin] District fetch failed:', err);
                districtSelect.innerHTML = '<option value="">-- ERROR --</option>';
            }).withSuccessHandler(districts => {
                districtSelect.innerHTML = '<option value="">-- SELECT DISTRICT --</option>';
                if (districts && Array.isArray(districts) && districts.length > 0) {
                    districts.forEach(d => {
                        if (d) districtSelect.add(new Option(d, d));
                    });
                    districtSelect.disabled = false;
                    console.log('[Admin] Districts loaded:', districts.length);
                } else {
                    console.warn('[Admin] No districts found for:', stateValue);
                    districtSelect.add(new Option('-- NO DATA --', ''));
                }
            }).getDropdownData('District', stateValue);
        };
    }

    window.handleAdminCFile = function(input) {
        const file = input.files[0];
        if (!file) return;
        if (file.size > 10 * 1024 * 1024) {
            Swal.fire('File Too Large', 'Maximum allowed size is 10MB', 'error');
            input.value = '';
            return;
        }

        const preview = document.getElementById('adminCFilePreview');
        preview.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Uploading...';
        
        const reader = new FileReader();
        reader.onload = function(e) {
            google.script.run.withSuccessHandler(res => {
                if (res.success) {
                    document.getElementById('adminCAttachmentUrl').value = res.url;
                    preview.innerHTML = `<i class="fas fa-check-circle text-success me-2"></i> File uploaded: <a href="${res.url}" target="_blank" class="text-decoration-none">${file.name}</a>`;
                } else {
                    preview.innerHTML = `<i class="fas fa-times-circle text-danger me-2"></i> Upload failed: ${res.message}`;
                }
            }).uploadFile(e.target.result, file.name);
        };
        reader.readAsDataURL(file);
    };

    function handleCameraError(err, modalId) {
        console.error('Camera Error:', err);
        const errMsg = err ? (err.message || String(err)) : '';
        
        let title = 'Camera Error';
        let text = 'Could not start camera. Please check connections and permissions.';
        let icon = 'error';

        if (errMsg.indexOf('NotAllowedError') > -1 || errMsg.indexOf('Permission denied') > -1 || errMsg.indexOf('Permission dismissed') > -1) {
            title = 'Permission Required';
            text = 'Camera access is required to scan. Please allow camera access in your browser settings and try again.';
            icon = 'warning';
        } else if (errMsg.indexOf('NotFoundError') > -1 || errMsg.indexOf('DevicesNotFoundError') > -1 || errMsg.indexOf('no cameras') > -1 || errMsg.indexOf('No camera') > -1) {
            title = 'Camera Not Found';
            text = 'Camera is not connected to your system, so you cannot scan.';
            icon = 'warning';
        } else if (errMsg) {
            text = errMsg;
        }

        Swal.fire({
            icon: icon,
            title: title,
            text: text,
            footer: errMsg ? 'Details: ' + errMsg : undefined,
            confirmButtonColor: '#ff6b00'
        });
        
        if (modalId) {
            const modalEl = document.getElementById(modalId);
            if (modalEl) {
                const modalInstance = bootstrap.Modal.getInstance(modalEl);
                if (modalInstance) modalInstance.hide();
            }
        }
    }

    window.startCameraScanner = function() {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            handleCameraError('NotFoundError: Camera is not connected to your system.', 'scannerModal');
            return;
        }

        // Show loading while requesting camera permission
        Swal.fire({
            title: 'Requesting Camera...',
            text: 'Please allow camera access when prompted by your browser.',
            allowOutsideClick: false,
            didOpen: () => {
                Swal.showLoading();
            }
        });

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
        .then(stream => {
            // Permission granted! Stop the temp stream tracks
            stream.getTracks().forEach(track => track.stop());
            Swal.close();

            document.getElementById('readerContainer').style.display = 'block';
            if (html5QrCode) {
                try {
                    html5QrCode.clear();
                } catch(e) {}
            }
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
                document.getElementById(targetInputId).value = text;
                if (targetInputId === 'adminCWarrantyId') verifyWarrantyAdmin();
                stopScanner();
                const modalInstance = bootstrap.Modal.getInstance(document.getElementById('scannerModal'));
                if (modalInstance) modalInstance.hide();
            }).catch(err => {
                handleCameraError(err, 'scannerModal');
            });
        })
        .catch(err => {
            Swal.close();
            handleCameraError(err, 'scannerModal');
        });
    };

    window.handleFileScan = function(input) {
        if (!input.files || input.files.length === 0) return;
        const fileScanner = new Html5Qrcode("reader"); // We can reuse the reader div even if modal is hidden
        fileScanner.scanFile(input.files[0], true).then(text => {
            document.getElementById(targetInputId).value = text;
            if (targetInputId === 'adminCWarrantyId') verifyWarrantyAdmin();
            // Reset input so the same file can be selected again if needed
            input.value = "";
        }).catch(err => {
            Swal.fire('Error', 'No QR code found in image.', 'error');
            input.value = "";
        });
    };

    window.stopScanner = function() {
        if (html5QrCode && html5QrCode.isScanning) {
            html5QrCode.stop().then(() => html5QrCode.clear()).catch(e => console.error(e));
        }
    };

    // Safe initialization for scanner modal listener
    const scanModalEl = document.getElementById('scannerModal');
    if (scanModalEl) {
        scanModalEl.addEventListener('hidden.bs.modal', stopScanner);
    } else {
        // Fallback for when script loads before modal
        window.addEventListener('load', () => {
            const el = document.getElementById('scannerModal');
            if (el) el.addEventListener('hidden.bs.modal', stopScanner);
        });
    }

        form.querySelector('select[name="audience"]').value = n.Audience || n.audience || 'All';
        form.querySelector('select[name="channel"]').value = n.Channel || n.channel || 'System';

        const refId = n.RefID || n.refid || n.RefId || '';

    function searchPartiesTable() {
        const input = document.getElementById('partySearchInput');
        if (!input) return;
        const query = input.value.toLowerCase();
        
        const container = document.getElementById('parties-list-content');
        if (!container) return;
        const allRows = container.querySelectorAll('tbody tr');
        
        // Also apply the active filter type so it works together with search
        const activeBtn = document.querySelector('#section-parties .btn-group .btn.active');
        const activeType = activeBtn ? activeBtn.innerText.trim().toLowerCase() : 'all';
        // Map UI text back to data-type
        let typeFilter = 'all';
        const typeText = activeBtn ? activeBtn.innerText.trim().toUpperCase() : 'ALL';
        
        if (typeText === 'B2B') typeFilter = 'B2B';
        if (typeText === 'B2C') typeFilter = 'B2C';
        if (typeText === 'VENDORS') typeFilter = 'Vendor';
        
        allRows.forEach(row => {
            const text = row.innerText.toLowerCase();
            const rowType = row.getAttribute('data-type');
            
            const typeMatch = (typeFilter === 'all' || rowType === typeFilter);
            const searchMatch = text.includes(query);
            
            if (typeMatch && searchMatch) {
                row.style.display = '';
            } else {
                row.style.display = 'none';
            }
        });
    }

    /**
     * Download Invoice PDF
     */
    function downloadInvoice(invNum) {
        if (!invNum) return;
        showAdminLoading();
        google.script.run.withSuccessHandler(res => {
            hideAdminLoading();
            if (res.success) {
                const byteCharacters = atob(res.base64);
                const byteNumbers = new Array(byteCharacters.length);
                for (let i = 0; i < byteCharacters.length; i++) {
                    byteNumbers[i] = byteCharacters.charCodeAt(i);
                }
                const byteArray = new Uint8Array(byteNumbers);
                const blob = new Blob([byteArray], { type: 'application/pdf' });
                const blobUrl = URL.createObjectURL(blob);
                
                // Open in new tab
                window.open(blobUrl, '_blank');
                
                // Trigger download
                const link = document.createElement('a');
                link.href = blobUrl;
                link.download = res.filename;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                Swal.fire({
                    icon: 'success',
                    title: 'Invoice Opened',
                    text: `Invoice ${invNum} has been opened in a new tab.`,
                    timer: 1500,
                    showConfirmButton: false,
                    toast: true,
                    position: 'top-end'
                });
            } else {
                Swal.fire('Error', res.message, 'error');
            }
        }).downloadInvoicePDF(invNum);
    }

    function loadPartyStates(selectedState = '', selectedDistrict = '') {
        const stateSelect = document.getElementById('party-state');
        google.script.run.withSuccessHandler(states => {
            let html = '<option value="">Select State</option>';
            states.forEach(s => {
                html += `<option value="${s}" ${s === selectedState ? 'selected' : ''}>${s}</option>`;
            });
            stateSelect.innerHTML = html;
            if (selectedState) {
                loadPartyDistricts(selectedState, selectedDistrict);
            }
        }).getDropdownData('State');
        
        stateSelect.onchange = function() {
            loadPartyDistricts(this.value);
        };
    }

    function loadPartyDistricts(state, selectedDistrict = '') {
        const districtSelect = document.getElementById('party-district');
        if (!state) {
            districtSelect.innerHTML = '<option value="">Select District</option>';
            return;
        }
        google.script.run.withSuccessHandler(districts => {
            let html = '<option value="">Select District</option>';
            districts.forEach(d => {
                html += `<option value="${d}" ${d === selectedDistrict ? 'selected' : ''}>${d}</option>`;
            });
            districtSelect.innerHTML = html;
        }).getDropdownData('District', state);
    }

    function saveParty() {
        const form = document.getElementById('partyForm');
        if (!form.checkValidity()) {
            form.reportValidity();
            return;
        }
        
        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());
        
        // Handle field mapping to match savePartyRecord expectations
        data.Id = data['Party ID'];
        data.PartyType = data.Type;
        data.GstNumber = data['GST Number'];
        data.OpeningBalance = parseFloat(data['Opening Balance']) || 0;
        data.CurrentBalance = data['Current Balance'] !== undefined && data['Current Balance'] !== '' ? parseFloat(data['Current Balance']) : null;
        
        const isUpdate = !!data.Id;
        
        if (isUpdate) {
            const oldParty = partyDataCache.find(item => item['Party ID'] === data.Id);
            const oldMobile = oldParty ? oldParty.Mobile : '';
            
            Swal.fire({
                title: 'Confirm Party Update & Sync',
                html: `
                    <div class="text-start small">
                        <p class="mb-2">Are you sure you want to update this party and synchronize the fields across related records?</p>
                        <ul class="mb-2">
                            <li><b>Columns Modified:</b> Party ID, Name, Mobile, Email, GST Number, District</li>
                            <li><b>Synced Sheets:</b> Warranty Register, Complaints, Ledger, Dealers List</li>
                        </ul>
                        <p class="mb-0 text-muted">Click <b>OK / Proceed</b> to run the synchronization script.</p>
                    </div>
                `,
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'OK, Sync & Update',
                cancelButtonText: 'Cancel'
            }).then((result) => {
                if (result.isConfirmed) {
                    executeSaveParty(data, oldMobile);
                }
            });
        } else {
            executeSaveParty(data, null);
        }
    }

    function executeSaveParty(data, oldMobile) {
        showAdminLoading();
        google.script.run
            .withSuccessHandler(res => {
                if (res.success) {
                    if (oldMobile) {
                        google.script.run
                            .withSuccessHandler(syncRes => {
                                hideAdminLoading();
                                const modalEl = document.getElementById('partyModal');
                                const modal = bootstrap.Modal.getInstance(modalEl);
                                if (modal) modal.hide();
                                refreshParties();
                                Swal.fire('Success', 'Party updated and synchronized across all records successfully!', 'success');
                            })
                            .withFailureHandler(syncErr => {
                                hideAdminLoading();
                                Swal.fire('Sync Warning', 'Party was saved, but synchronization failed: ' + syncErr.message, 'warning');
                            })
                            .propagatePartyUpdates(oldMobile, data.Id, data);
                    } else {
                        hideAdminLoading();
                        const modalEl = document.getElementById('partyModal');
                        const modal = bootstrap.Modal.getInstance(modalEl);
                        if (modal) modal.hide();
                        refreshParties();
                        Swal.fire('Success', res.message, 'success');
                    }
                } else {
                    hideAdminLoading();
                    Swal.fire('Error', res.message, 'error');
                }
            })
            .withFailureHandler(err => { 
                hideAdminLoading(); 
                Swal.fire('Error', err.message, 'error'); 
            })
            .saveParty(data);
    }

    function switchCatalogTab(tabId) {
        // Track the source tab if switching to dashboard/active/archived
        if (['dashboard', 'active', 'archived'].includes(tabId)) {
            catalogSourceTab = tabId;
        }

        document.querySelectorAll('.catalog-tab').forEach(t => t.style.display = 'none');
        document.getElementById('catalog-tab-' + tabId).style.display = 'block';

        document.querySelectorAll('.premium-nav .nav-link').forEach(b => b.classList.remove('active'));
        const activeBtn = document.getElementById('btn-catalog-' + tabId);
        if (activeBtn) activeBtn.classList.add('active');

        // Ensure catalog management data (dropdowns) is loaded
        if (tabId === 'create' || tabId === 'management') {
            if (!catalogMgmtData || Object.keys(catalogMgmtData).length === 0) {
                refreshCatalogManagement();
            } else if (tabId === 'management') {
                // If explicitly clicking management, refresh anyway to show latest
                refreshCatalogManagement();
            }
        }

        if (tabId === 'dashboard') refreshCatalogDashboard();
        else if (tabId === 'active') refreshCatalogList('catalog-active-list-content', 'Active');
        else if (tabId === 'archived') refreshCatalogList('catalog-archived-list-content', 'Archived');

            document.getElementById('catalog-wizard-title').innerText = 'Create New Catalog Product';
            document.getElementById('catalog-create-btn-text').innerText = 'Create Product';

        // Pre-fetch management data for dropdowns if empty
        if (!catalogMgmtData || Object.keys(catalogMgmtData).length === 0) {
            refreshCatalogManagement();
        }

        // Fetch stats via safe wrapper
        callServer('getCatalogStats', [], (stats) => {
            if (stats) {
                safeSetText('cat-stat-products', stats.totalProducts || 0);
                safeSetText('cat-stat-categories', stats.totalCategories || 0);
                safeSetText('cat-stat-low-stock', stats.lowStock || 0);
                safeSetText('cat-stat-stock', stats.totalStock || 0);

    function editCatalogProduct(pid) {
        showAdminLoading();
        console.log('[Catalog] Fetching latest data for product:', pid);
        
        callServer('getCatalogProducts', [], (allProducts) => {
            hideAdminLoading();
            if (!allProducts || allProducts.length === 0) {
                Swal.fire('Error', 'Could not refresh catalog data.', 'error');
                return;
            }
            
            catalogDataCache = allProducts;
            const product = allProducts.find(p => String(p.ProductID || p.productid).trim() === String(pid).trim());
            
            if (!product) {
                Swal.fire('Error', 'Product not found: ' + pid, 'error');
                return;
            }

            currentEditingCatalogId = pid;
            const form = document.getElementById('create-catalog-form');
            if (form) form.reset();

            // Corrected IDs to match dashboard_admin.html
            document.getElementById('cat-model-name').value = product.Name || '';
            document.getElementById('cat-product-title').value = product.ProductTitle || '';
            document.getElementById('cat-part-no').value = product['Part Number'] || product.PartNumber || '';
            document.getElementById('cat-category').value = product.Category || '';
            document.getElementById('cat-type').value = product.ModeOfOperation || '';
            document.getElementById('cat-model-no').value = product.ModelNo || '';
            document.getElementById('cat-tagline').value = product.Tagline || '';
            document.getElementById('cat-usage').value = product.Usage || '';
            document.getElementById('cat-working-type').value = product.WorkingType || '';
            document.getElementById('cat-voltage').value = product.Voltage || '';
            document.getElementById('cat-amps').value = product.Amps || '';
            document.getElementById('cat-dry-run').value = product.DryRunFeature || 'No';
            document.getElementById('cat-timers').value = product.Timers || 'No';
            document.getElementById('cat-in-box').value = product.InBoxKit || '';
            document.getElementById('cat-wires').value = product.Wires || '';
            document.getElementById('cat-desc').value = product.Description || '';
            
            let features = product.Features;
            // Robustly unwrap double/triple nested stringified arrays
            for (let i = 0; i < 3; i++) {
                if (typeof features === 'string' && features.trim().startsWith('[')) {
                    try { features = JSON.parse(features); } catch(e) { break; }
                } else {
                    break;
                }
            }
            if (Array.isArray(features)) {
                features = features.map(item => {
                    let val = item;
                    // Recursively unwrap inner elements if they are stringified arrays
                    for (let j = 0; j < 3; j++) {
                        if (typeof val === 'string' && val.trim().startsWith('[')) {
                            try {
                                let parsed = JSON.parse(val);
                                if (Array.isArray(parsed) && parsed.length > 0) val = parsed[0];
                                else val = parsed;
                            } catch(e) { break; }
                        } else {
                            break;
                        }
                    }
                    if (typeof val === 'string') {
                        // Strip raw escaped backslashes and surrounding double/single quotes
                        val = val.replace(/\\"/g, '"').replace(/\\'/g, "'").replace(/^["']|["']$/g, '').trim();
                    }
                    return val;
                });
                features = features.join('\n');
            } else if (features) {
                features = String(features);
            } else {
                features = '';
            }
            document.getElementById('cat-features').value = features;
            
            document.getElementById('cat-warranty').value = product.Warranty || '';
            document.getElementById('cat-accessories').value = product.Accessories || '';
            document.getElementById('cat-tc').value = product.TC || '';
            document.getElementById('cat-colors').value = product.Colors || '';
            document.getElementById('cat-mrp').value = product.MRP || '';
            document.getElementById('cat-selling').value = product.SellingPrice || '';
            document.getElementById('cat-wholesale').value = product.WholesalePrice || product.wholesaleprice || product['Wholesale Price'] || '';
            document.getElementById('cat-offer').value = product.OfferPrice || '';
            document.getElementById('cat-inst-inclusive').value = product.InstallationInclusive || 'No';
            document.getElementById('cat-inst-charges').value = product.InstallationCharges || 0;
            document.getElementById('cat-free-acc').value = product.FreeAccessory || '';
            
            // Tax classification fields
            const hsnVal = product.HSNCode || product.hsncode || product['HSN Code'] || '';
            const sacVal = product.SACCode || product.saccode || product['SAC Code'] || '';
            document.getElementById('cat-hsn').value = hsnVal;
            document.getElementById('cat-sac').value = sacVal;
            document.getElementById('cat-gstrate').value = product.GSTRate || product.gstrate || product['GST Rate'] || '18';

            if (sacVal && !hsnVal) {
                const sacRadio = document.getElementById('cat-tax-type-sac');
                if (sacRadio) sacRadio.checked = true;
            } else {
                const hsnRadio = document.getElementById('cat-tax-type-hsn');
                if (hsnRadio) hsnRadio.checked = true;
            }
            if (typeof toggleCatalogTaxFields === 'function') toggleCatalogTaxFields();
            
            // Clear and populate YouTube Videos dynamic fields
            const ytContainer = document.getElementById('youtube-videos-container');
            if (ytContainer) ytContainer.innerHTML = '';
            
            let ytVal = product.YouTube || product.youtube || '';
            let videoList = [];
            if (typeof ytVal === 'string' && ytVal.trim().startsWith('[')) {
                try { videoList = JSON.parse(ytVal); } catch(e) {}
            } else if (ytVal && ytVal.trim().length > 10) {
                videoList = [{ title: 'Product Demonstration', url: ytVal }];
            }
            
            if (videoList && Array.isArray(videoList) && videoList.length > 0) {
                videoList.forEach(video => {
                    addYoutubeVideoField(video.title || '', video.url || '', video.size || '1.25rem', video.color || '#fd7e14');
                });
            } else {
                addYoutubeVideoField('Product Demonstration', ''); // Default row
            }
            
            catalogBanners = [];
            let bannerArr = product.Banners || product.banners || '[]';
            let parsedLayout = 'single';
            
            // Loop up to 3 times to unwrap nested stringifications
            for (let i = 0; i < 3; i++) {
                if (typeof bannerArr === 'string' && bannerArr.trim()) {
                    try {
                        let parsed = JSON.parse(bannerArr);
                        bannerArr = parsed;
                    } catch(e) {
                        break;
                    }
                } else {
                    break;
                }
            }
            
            let bannerItems = [];
            if (Array.isArray(bannerArr)) {
                bannerItems = bannerArr;
            } else if (bannerArr && typeof bannerArr === 'object') {
                parsedLayout = bannerArr.layout || 'single';
                bannerItems = bannerArr.items || [];
            }
            
            const layoutSelect = document.getElementById('cat-banner-layout');
            if (layoutSelect) layoutSelect.value = parsedLayout;

            if (bannerItems && Array.isArray(bannerItems)) {
                bannerItems.forEach(bannerObj => {
                    let url = '';
                    let title = '';
                    let size = '1.25rem';
                    let color = '#333333';
                    
                    if (typeof bannerObj === 'string') {
                        url = bannerObj.trim();
                    } else if (bannerObj && typeof bannerObj === 'object') {
                        url = (bannerObj.url || bannerObj.ImageURL || bannerObj.imageurl || bannerObj.ImageUrl || bannerObj.imageUrl || bannerObj.Image || bannerObj.image || '').trim();
                        title = bannerObj.title || '';
                        size = bannerObj.size || '1.25rem';
                        color = bannerObj.color || '#333333';
                    }
                    
                    if (url && url.length > 10) {
                        catalogBanners.push({ url, title, size, color });
                    }
                });
            }
            renderCatalogBannersPreviews();
            
            catalogImages = [];
            let galleryArr = product.Gallery;
            if (typeof galleryArr === 'string' && galleryArr.trim().startsWith('[')) {
                try { galleryArr = JSON.parse(galleryArr); } catch(e) {}
            }

            if (galleryArr && Array.isArray(galleryArr)) {
                galleryArr.forEach((img, index) => {
                    let imgUrl = null;
                    if (typeof img === 'string') imgUrl = img;
                    else if (typeof img === 'object' && img !== null) {
                        imgUrl = img.ImageBase64 || img.imagebase64 || img.ImageURL || img.imageurl || img.ImageUrl || img.imageUrl || img.url || img.URL;
                    }
                    if (imgUrl && imgUrl.length > 10) {
                        catalogImages.push({ url: imgUrl, isPrimary: index === 0 });
                    }
                });
            }
            
            // Fallback: If gallery is empty but product has a primary image, use it
            if (catalogImages.length === 0 && product.PrimaryImage) {
                console.log('[Catalog] Gallery empty, using PrimaryImage fallback:', product.PrimaryImage);
                catalogImages.push({ url: product.PrimaryImage, isPrimary: true });
            }
            
            renderCatalogImagePreviews();
            calculateDiscount();

            catalogCurrentStep = 1;
            document.querySelectorAll('.wizard-step-content').forEach(c => c.style.display = 'none');
            document.getElementById('step-content-1').style.display = 'block';
            document.querySelectorAll('.step-item').forEach(s => s.classList.remove('active', 'completed'));
            document.getElementById('step-1').classList.add('active');
            document.getElementById('wizard-progress').style.width = '0%';
            document.getElementById('wizard-prev').style.visibility = 'hidden';
            document.getElementById('wizard-next').innerHTML = 'Next <i class="fas fa-arrow-right ms-2"></i>';

            const titleEl = document.getElementById('catalog-wizard-title');
            const btnTextEl = document.getElementById('catalog-create-btn-text');
            if(titleEl) titleEl.innerText = 'Edit Catalog Product: ' + (product.Name || pid);
            if(btnTextEl) btnTextEl.innerText = 'Edit Product';

            switchCatalogTab('create');
            document.querySelector('.wizard-container').scrollIntoView({ behavior: 'smooth' });
        });
    }

    function openMasterScannerOptions(context = 'inventory') {
        scannerContext = context;
        const pref = window.AdminConfig ? window.AdminConfig.scannerPref : 'camera';
        
        if (pref === 'system') {
            let inputToFocus = null;
            if (context === 'sales_global') {
                inputToFocus = document.getElementById('globalSalesSearch');
            } else if (context === 'billing_product') {
                inputToFocus = document.getElementById('billProductSearch');
            } else if (context.startsWith('billing_row_')) {
                const rowId = context.replace('billing_row_', '');
                inputToFocus = document.getElementById('rowSerialInput-' + rowId);
            } else if (context === 'inventory_product_search') {
                inputToFocus = document.getElementById('inv-product-search');
            } else if (context === 'inventory_modal') {
                inputToFocus = document.getElementById('inv-serial-input');
            } else if (context === 'inventory') {
                inputToFocus = document.querySelector('input[placeholder="Search Serial..."]');
            } else {
                inputToFocus = document.getElementById('catalog-search-input');
            }

            if (inputToFocus) {
                inputToFocus.focus();
            }

            Swal.fire({
                title: 'System Scanner Active',
                text: 'Your physical scanner is ready. Please focus and scan.',
                icon: 'info',
                toast: true,
                position: 'top-end',
                timer: 3000
            });
            return;
        }
        
        if (pref === 'gallery') {
            triggerMasterFileScanner();
            return;
        }

        const modal = new bootstrap.Modal(document.getElementById('masterScannerModal'));
        
        // Reset UI: hide options selector by default so the user NEVER sees the buttons!
        document.getElementById('scanner-type-selector').style.display = 'none';
        document.getElementById('master-reader-wrapper').style.display = 'block';
        document.getElementById('scanner-processing').style.display = 'none';
        
        modal.show();

        if (pref === 'camera') {
            setTimeout(() => {
                startMasterScanner('camera', 'all');
            }, 350); // Let modal animation finish
        }
    }

    function startMasterScanner(source, type) {
        document.getElementById('scanner-type-selector').style.display = 'none';
        document.getElementById('master-reader-wrapper').style.display = 'block';
        
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            handleCameraError('NotFoundError: Camera is not connected to your system.', 'masterScannerModal');
            return;
        }

        // Show loading while requesting camera permission
        Swal.fire({
            title: 'Requesting Camera...',
            text: 'Please allow camera access when prompted by your browser.',
            allowOutsideClick: false,
            didOpen: () => {
                Swal.showLoading();
            }
        });

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
        .then(stream => {
            // Permission granted! Stop the temp stream tracks
            stream.getTracks().forEach(track => track.stop());
            Swal.close();

            if (html5QrScanner) {
                try {
                    html5QrScanner.clear();
                } catch(e) {}
            }
            
            const config = { 
                fps: 10, 
                qrbox: { width: 250, height: 250 },
                aspectRatio: 1.0
            };
            
            html5QrScanner = new Html5Qrcode("master-reader");
            
            if (type === 'qr') config.formatsToSupport = [Html5QrcodeSupportedFormats.QR_CODE];
            else if (type === 'barcode') config.formatsToSupport = [Html5QrcodeSupportedFormats.CODE_128, Html5QrcodeSupportedFormats.EAN_13, Html5QrcodeSupportedFormats.EAN_8];

            html5QrScanner.start(
                { facingMode: "environment" }, 
                config,
                (decodedText, decodedResult) => {
                    console.log(`Scan result: ${decodedText}`, decodedResult);
                    handleScannerMatch(decodedText);
                    stopMasterScanner();
                },
                (errorMessage) => {
                    // parse error, ignore it.
                }
            ).catch((err) => {
                handleCameraError(err, 'masterScannerModal');
            });
        })
        .catch(err => {
            Swal.close();
            handleCameraError(err, 'masterScannerModal');
        });
    }

    function stopMasterScanner() {
        if (html5QrScanner) {
            html5QrScanner.stop().then(() => {
                html5QrScanner.clear();
                document.getElementById('master-reader-wrapper').style.display = 'none';
                document.getElementById('scanner-type-selector').style.display = 'none';
                const mInst = bootstrap.Modal.getInstance(document.getElementById('masterScannerModal'));
                if (mInst) mInst.hide();
            }).catch(err => {
                console.warn('Scanner Stop Warning:', err);
                document.getElementById('master-reader-wrapper').style.display = 'none';
                document.getElementById('scanner-type-selector').style.display = 'none';
                const mInst = bootstrap.Modal.getInstance(document.getElementById('masterScannerModal'));
                if (mInst) mInst.hide();
            });
        } else {
            const mInst = bootstrap.Modal.getInstance(document.getElementById('masterScannerModal'));
            if (mInst) mInst.hide();
        }
    }

    function triggerMasterFileScanner() {
        document.getElementById('master-file-input').click();
    }

    function processMasterFileScanner(input) {
        if (!input.files || input.files.length === 0) return;
        
        const file = input.files[0];
        
        // Show modal now to display loading state
        const modal = new bootstrap.Modal(document.getElementById('masterScannerModal'));
        document.getElementById('scanner-type-selector').style.display = 'none';
        document.getElementById('master-reader-wrapper').style.display = 'none';
        document.getElementById('scanner-processing').style.display = 'block';
        modal.show();
        
        const html5QrCode = new Html5Qrcode("master-reader");
        html5QrCode.scanFile(file, true)
            .then(decodedText => {
                document.getElementById('scanner-processing').style.display = 'none';
                handleScannerMatch(decodedText);
                const mInst = bootstrap.Modal.getInstance(document.getElementById('masterScannerModal'));
                if(mInst) mInst.hide();
            })
            .catch(err => {
                document.getElementById('scanner-processing').style.display = 'none';
                const mInst = bootstrap.Modal.getInstance(document.getElementById('masterScannerModal'));
                if (mInst) mInst.hide();
                Swal.fire('Scan Failed', 'Could not find a valid Barcode or QR Code in this image.', 'error');
            });
    }

    function handleScannerMatch(data) {
        console.log('[Scanner] Handling match for context:', scannerContext, 'Data:', data);
        
        if (scannerContext === 'billing_product') {
            if (typeof processBarcodeScan === 'function') {
                processBarcodeScan(data);
                const modalEl = document.getElementById('masterScannerModal');
                if (modalEl) {
                    const modal = bootstrap.Modal.getInstance(modalEl);
                    if (modal) modal.hide();
                }
            } else {
                Swal.fire('Error', 'Billing module not loaded.', 'error');
            }
            return;
        }
        
        if (scannerContext && scannerContext.startsWith('billing_row_')) {
            const rowId = Number(scannerContext.split('_')[2]);
            if (typeof processRowBarcodeScan === 'function') {
                processRowBarcodeScan(rowId, data);
                const modalEl = document.getElementById('masterScannerModal');
                if (modalEl) {
                    const modal = bootstrap.Modal.getInstance(modalEl);
                    if (modal) modal.hide();
                }
            } else {
                Swal.fire('Error', 'Billing module not loaded.', 'error');
            }
            return;
        }
        
        if (scannerContext === 'inventory_modal') {
            // Append to input list in Step 2 (Continuous Scan Support)
            const input = document.getElementById('inv-serial-input');
            if (input) {
                const currentVal = input.value.trim();
                if (currentVal) {
                    input.value = currentVal + ', ' + data.toUpperCase();
                } else {
                    input.value = data.toUpperCase();
                }
                Swal.fire({
                    icon: 'success',
                    title: 'Added: ' + data.toUpperCase(),
                    toast: true,
                    position: 'top-end',
                    timer: 1000,
                    showConfirmButton: false
                });

                // Do not close the scanner modal to allow "Next next scan"
                // But update the UI to show it was added
                const reader = document.getElementById('master-reader');
                if (reader) {
                    reader.style.border = '4px solid #28a745';
                    setTimeout(() => reader.style.border = 'none', 1000);
                }
            }
            return;
        }

        if (scannerContext === 'inventory_product_search') {
            // Searching for a product in Step 1
            const product = catalogDataCache.find(p => 
                String(p.ProductID).toLowerCase() === data.toLowerCase() || 
                String(p.PartNumber || p['Part Number']).toLowerCase() === data.toLowerCase() ||
                String(p.ModelNo).toLowerCase() === data.toLowerCase()
            );

            if (product) {
                selectProductForInventory(product.ProductID);
                bootstrap.Modal.getInstance(document.getElementById('masterScannerModal')).hide();
                Swal.fire({
                    title: 'Product Identified',
                    text: product.Name,
                    icon: 'success',
                    toast: true,
                    position: 'top-end',
                    timer: 2000,
                    showConfirmButton: false
                });
                
                // Advance to serial step after a short delay
                setTimeout(() => {
                    moveInventoryWizard(1);
                }, 500);
            } else {
                Swal.fire('Not Found', `Product code "${data}" not found in catalog.`, 'warning');
            }
            return;
        }

        // Search in catalogDataCache for product match
        const product = catalogDataCache.find(p => 
            String(p.ProductID).toLowerCase() === data.toLowerCase() || 
            String(p.PartNumber || p['Part Number']).toLowerCase() === data.toLowerCase() ||
            String(p.Name).toLowerCase() === data.toLowerCase()
        );

        if (product) {
            bootstrap.Modal.getInstance(document.getElementById('masterScannerModal')).hide();
            
            if (scannerContext === 'inventory') {
                showQuickResults(product);
            } else {
                Swal.fire({
                    title: 'Product Found!',
                    html: `
                        <div class="text-center">
                            <img src="${product.PrimaryImage || 'https://via.placeholder.com/100'}" class="img-fluid rounded mb-2" style="max-height: 100px;">
                            <h6 class="fw-bold">${product.Name}</h6>
                            <p class="small text-muted mb-0">Part: ${product.PartNumber || product['Part Number']}</p>
                        </div>
                    `,
                    showCancelButton: true,
                    confirmButtonText: 'Edit Product',
                    cancelButtonText: 'Close'
                }).then(res => {
                    if (res.isConfirmed) editCatalogProduct(product.ProductID);
                });
            }
        } else {
            Swal.fire({
                title: 'No Match Found',
                text: `Scanned Data: "${data}" does not match any product in our catalog.`,
                icon: 'warning',
                confirmButtonText: 'Search Manually'
            }).then(res => {
                if (res.isConfirmed) {
                    if (scannerContext === 'inventory') {
                        showStockEntryModal();
                        setTimeout(() => {
                            const searchInput = document.getElementById('inv-product-search');
                            if (searchInput) {
                                searchInput.value = data;
                                searchCatalogForInventory(data);
                            }

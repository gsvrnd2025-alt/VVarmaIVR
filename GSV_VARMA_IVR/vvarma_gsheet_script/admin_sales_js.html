    function editRowSerialTag(rowId, serialIndex) {
        const item = billingItems.find(x => x.id === rowId);
        if (!item) return;
        const serials = (item.sn || '').split(',').map(s => s.trim()).filter(Boolean);
        const currentSerial = serials[serialIndex];
        
        Swal.fire({
            title: 'Edit Serial Number',
            input: 'text',
            inputValue: currentSerial,
            showCancelButton: true,
            confirmButtonText: 'Save',
            cancelButtonText: 'Cancel',
            inputValidator: (value) => {
                const clean = value.trim();
                if (!clean) {
                    return 'Serial number cannot be empty';
                }
            }
        }).then((result) => {
            if (result.isConfirmed) {
                const newSerial = result.value.trim();
                if (newSerial.toLowerCase() === currentSerial.toLowerCase()) return;
                
                // Check duplicates in document
                const allSerialsInDoc = billingItems.flatMap(x => (x.sn || '').split(',').map(s => s.trim()).filter(Boolean));
                const currentFlatIndex = allSerialsInDoc.indexOf(currentSerial);
                if (currentFlatIndex !== -1) {
                    allSerialsInDoc.splice(currentFlatIndex, 1);
                }
                if (allSerialsInDoc.some(s => s.toLowerCase() === newSerial.toLowerCase())) {
                    Swal.fire('Duplicate Serial', `Serial number "${newSerial}" is already added in this document.`, 'warning');
                    return;
                }
                
                // Check inventory database
                Swal.fire({
                    title: 'Checking Inventory Database...',
                    allowOutsideClick: false,
                    didOpen: () => Swal.showLoading()
                });
                
                google.script.run
                    .withSuccessHandler(res => {
                        Swal.close();
                        if (res && res.success) {
                            if (res.duplicates && res.duplicates.length > 0) {
                                Swal.fire('Duplicate Serial', `Serial number "${newSerial}" already exists in the inventory database.`, 'warning');
                            } else {
                                serials[serialIndex] = newSerial;
                                item.sn = serials.join(', ');
                                item.serialNumber = item.sn;
                                renderBillingItems();
                                calculateBillingTotals();
                            }
                        } else {
                            Swal.fire('Error', res.message || 'Verification failed', 'error');
                        }
                    })
                    .checkSerialsInInventory([newSerial]);
            }
        });
    }

    function removeRowSerialTag(rowId, serialIndex) {
        const item = billingItems.find(x => x.id === rowId);
        if (!item) return;
        const serials = (item.sn || '').split(',').map(s => s.trim()).filter(Boolean);
        serials.splice(serialIndex, 1);
        item.sn = serials.join(', ');
        item.serialNumber = item.sn;
        
        if (serials.length === 0) {
            clearRowProductSelection(rowId);
        } else {
            item.qty = serials.length;
            renderBillingItems();
            calculateBillingTotals();
        }
    }

    function handleRowSerialSubmit(rowId, val) {
        const cleanVal = val.trim();
        if (!cleanVal) return;
        
        const allSerialsInDoc = billingItems.flatMap(x => (x.sn || '').split(',').map(s => s.trim()).filter(Boolean));
        if (allSerialsInDoc.some(s => s.toLowerCase() === cleanVal.toLowerCase())) {
            Swal.fire('Duplicate Serial', `Serial number "${cleanVal}" is already added in this document.`, 'warning');
            const input = document.getElementById(`rowSerialInput-${rowId}`);
            if (input) {
                input.value = '';
                input.focus();
            }
            return;
        }
        
        const item = billingItems.find(x => x.id === rowId);
        if (!item) return;

        let knownSerial = billingSerials.find(s => s.sn.toLowerCase() === cleanVal.toLowerCase());
        
        if (knownSerial) {
            const prodMatch = billingProducts.find(p => String(p.id) === String(knownSerial.modelId) || p.sku === knownSerial.modelId);
            const actualModelId = prodMatch ? String(prodMatch.id) : String(knownSerial.modelId);
            
            if (item.productId && String(item.productId) !== actualModelId) {
                addScannedProduct('Serial', knownSerial.sn);
                const input = document.getElementById(`rowSerialInput-${rowId}`);
                if (input) input.value = '';
                return;
            } else if (!item.productId) {
                item.productId = actualModelId;
                item.name = prodMatch ? prodMatch.name : knownSerial.name;
                item.hsn = prodMatch ? prodMatch.hsn || '' : '';
                item.rate = prodMatch ? prodMatch.rate || 0 : 0;
                item.gst = prodMatch ? prodMatch.gst || 18 : 18;
                item.sn = knownSerial.sn;
                item.serialNumber = item.sn;
                item.qty = 1;
                
                const input = document.getElementById(`rowSerialInput-${rowId}`);
                if (input) input.value = '';
                
                renderBillingItems();
                calculateBillingTotals();
                ensureEmptyRowAndFocusSerial();
                return;
            } else {
                const serials = (item.sn || '').split(',').map(s => s.trim()).filter(Boolean);
                serials.push(knownSerial.sn);
                item.sn = serials.join(', ');
                item.serialNumber = item.sn;
                item.qty = serials.length;
                
                const input = document.getElementById(`rowSerialInput-${rowId}`);
                if (input) {
                    input.value = '';
                    input.focus();
                }
                
                renderBillingItems();
                calculateBillingTotals();
                return;
            }
        }
        
        if (!item.productId) {
             Swal.fire('Unknown Serial', 'This serial is not in inventory and no product is selected for this row.', 'warning');
             return;
        }
        
        Swal.fire({
            title: 'Verifying Serial Number...',
            allowOutsideClick: false,
            didOpen: () => Swal.showLoading()
        });
        
        google.script.run
            .withSuccessHandler(res => {
                Swal.close();
                if (res && res.success) {
                    if (res.duplicates && res.duplicates.length > 0) {
                        Swal.fire('Duplicate Serial', `Serial number "${cleanVal}" already exists in the inventory database.`, 'warning');
                    } else {
                        const serials = (item.sn || '').split(',').map(s => s.trim()).filter(Boolean);
                        serials.push(cleanVal);
                        item.sn = serials.join(', ');
                        item.serialNumber = item.sn;
                        item.qty = serials.length;
                        
                        const input = document.getElementById(`rowSerialInput-${rowId}`);
                        if (input) {
                            input.value = '';
                            input.focus();
                        }
                        
                        renderBillingItems();
                        calculateBillingTotals();
                    }
                } else {
                    Swal.fire('Error', res.message || 'Verification failed', 'error');
                }
            })
            .checkSerialsInInventory([cleanVal]);
    }

    function handleRowProductSearch(e, rowId) {
        const input = document.getElementById(`rowProductSearch-${rowId}`);
        const dropdown = document.getElementById(`rowProductDropdown-${rowId}`);
        if (!input || !dropdown) return;

        const val = input.value.trim().toLowerCase();

        if (e.key === 'Enter' && val) {
            dropdown.classList.remove('show');
            processRowBarcodeScan(rowId, val);
            input.value = '';
            return;
        }

        if (!val) {
            dropdown.classList.remove('show');
            return;
        }

        let matches = [];
        billingSerials.forEach(s => {
            if (s.sn && s.sn.toLowerCase().includes(val)) {
                const parentProd = billingProducts.find(p => String(p.id) === String(s.modelId) || p.sku === s.modelId) || {};
                matches.push({
                    type: 'Serial',
                    ...s,
                    stock: parentProd.stock || 0,
                    rate: parentProd.rate || 0,
                    sku: parentProd.sku || s.modelId,
                    modelName: parentProd.modelName || parentProd.name || s.modelName || s.name || '',
                    imageUrl: parentProd.imageUrl || s.imageUrl || ''
                });
            }
        });

        billingProducts.forEach(p => {
            if ((p.name && p.name.toLowerCase().includes(val)) ||
                (p.sku && p.sku.toLowerCase().includes(val)) ||
                (p.partNumber && p.partNumber.toLowerCase().includes(val))) {
                matches.push({ type: 'Product', ...p });
            }
        });

        let uniqueMatches = [];
        let seenProductIds = new Set();

        matches.forEach(m => {
            let rawId = m.type === 'Serial' ? m.modelId : m.id;
            const relatedProd = billingProducts.find(p => String(p.id) === String(rawId) || p.sku === rawId);
            const actualId = relatedProd ? String(relatedProd.id) : String(rawId);

            if (!seenProductIds.has(actualId)) {
                uniqueMatches.push({...m, _actualId: actualId});
                seenProductIds.add(actualId);
            } else {
                const existingIndex = uniqueMatches.findIndex(x => x._actualId === actualId);
                if (existingIndex !== -1 && uniqueMatches[existingIndex].type === 'Product' && m.type === 'Serial') {
                    uniqueMatches[existingIndex] = {...m, _actualId: actualId};
                }
            }
        });

        dropdown.innerHTML = renderSearchDropdownHtml(uniqueMatches, (m) => {
            return m.type === 'Serial' 
                ? `selectRowProduct(${rowId}, 'Serial', '${m.sn}')`
                : `selectRowProduct(${rowId}, 'Product', '${m.id}')`;
        });
        dropdown.classList.add('show');
    }

    let serialScanInProgress = false;
    function handleRowSerialScan(rowId, val) {
        if (serialScanInProgress) return;
        serialScanInProgress = true;
        setTimeout(() => { serialScanInProgress = false; }, 300);

        const cleanVal = val.trim();
        if (!cleanVal) return;

        let serial = billingSerials.find(s => s.sn.toLowerCase() === cleanVal.toLowerCase());
        if (serial) {
            let productDetails = billingProducts.find(p => String(p.id) === String(serial.modelId) || p.sku === serial.modelId);
            if (!productDetails) {
                productDetails = { id: serial.modelId, name: serial.name, rate: 0, gst: 18, hsn: '' };
            }

            const item = billingItems.find(x => x.id === rowId);
            if (item) {
                item.productId = productDetails.id;
                item.name = productDetails.name;
                item.sn = serial.sn;
                item.serialNumber = serial.sn;
                item.hsn = productDetails.hsnCode || productDetails.sacCode || productDetails.hsn || '';
                item.rate = productDetails.rate || 0;
                item.gst = productDetails.gst || 18;

                assignSerialsToRow(item.id, item.qty);
                renderBillingItems();
                calculateBillingTotals();
                ensureEmptyRowAndFocusSerial();
            }
            return;
        }

        let product = billingProducts.find(p =>
            (p.sku && p.sku.toLowerCase() === cleanVal.toLowerCase()) ||
            (p.partNumber && p.partNumber.toLowerCase() === cleanVal.toLowerCase())
        );
        if (product) {
            selectRowProduct(rowId, 'Product', product.id);
            return;
        }

        Swal.fire('Not Found', `Serial number "${cleanVal}" is not recognized in stock inventory.`, 'warning');
    }

    function processRowBarcodeScan(rowId, val) {
        handleRowSerialScan(rowId, val);
    }

    function ensureEmptyRowAndFocusSerial() {
        let emptyRow = billingItems.find(item => (!item.name || item.name === '') && item.qty === 1 && item.rate === 0);
        if (!emptyRow) {
            const newId = Date.now();
            billingItems.push({
                id: newId, name: '', hsn: '', qty: 1, unit: 'Nos', rate: 0, disc: 0, gst: 18, taxAmt: 0, total: 0
            });
            renderBillingItems();
            setTimeout(() => {
                const nextInput = document.getElementById(`rowSerialInput-${newId}`);
                if (nextInput) {
                    nextInput.focus();
                    nextInput.select();
                }
            }, 80);
        } else {
            setTimeout(() => {
                const nextInput = document.getElementById(`rowSerialInput-${emptyRow.id}`);
                if (nextInput) {
                    nextInput.focus();
                    nextInput.select();
                }
            }, 80);
        }
    }

    function selectRowProduct(rowId, type, idVal) {
        const dropdown = document.getElementById(`rowProductDropdown-${rowId}`);
        if (dropdown) dropdown.classList.remove('show');

        let productDetails = null;
        let serialToAdd = '';

        if (type === 'Serial') {
            let serial = billingSerials.find(s => s.sn === idVal);
            if (serial) {
                productDetails = billingProducts.find(p => String(p.id) === String(serial.modelId) || p.sku === serial.modelId);
                if (!productDetails) {
                    productDetails = { id: serial.modelId, name: serial.name, rate: 0, gst: 18, hsn: '' };
                }
                serialToAdd = serial.sn;
                promptForQuantityRow(rowId, productDetails, serialToAdd);
            }
        } else {
            productDetails = billingProducts.find(p => String(p.id) === String(idVal));
            if (!productDetails) return;

            const availSerial = billingSerials.find(s =>
                String(s.modelId) === String(idVal) &&
                !billingItems.some(x => (x.sn || '').split(',').map(z => z.trim().toLowerCase()).includes(s.sn.toLowerCase()))
            );
            if (availSerial) {
                serialToAdd = availSerial.sn;
            }
            promptForQuantityRow(rowId, productDetails, serialToAdd);
        }
    }

    function promptForQuantityRow(rowId, productDetails, serialToAdd) {
        const stock = productDetails.stock || 0;
        Swal.fire({
            title: 'Enter Quantity',
            html: `<div class="text-start mb-2"><b>Product:</b> ${productDetails.name}</div>
                   <div class="text-start mb-3"><b>Available Stock:</b> ${stock} Nos</div>`,
            input: 'number',
            inputValue: 1,
            inputAttributes: {
                min: 1,
                step: 1
            },
            showCancelButton: true,
            confirmButtonText: 'Submit',
            cancelButtonText: 'Cancel',
            inputValidator: (value) => {
                if (!value || parseInt(value) <= 0) {
                    return 'Please enter a valid quantity greater than 0';
                }
            }
        }).then((result) => {
            if (result.isConfirmed) {
                const qty = parseInt(result.value);
                if (qty > stock) {
                    Swal.fire({
                        title: 'Low Stock Warning',
                        text: `Only ${stock} units are available in stock. Do you want to proceed with the available quantity of ${stock}?`,
                        icon: 'warning',
                        showCancelButton: true,
                        confirmButtonText: 'Yes, adjust to ' + stock,
                        cancelButtonText: 'No, keep ' + qty
                    }).then((warnResult) => {
                        if (warnResult.isConfirmed) {
                            handleSelectedProductQuantityRow(rowId, productDetails, serialToAdd, stock);
                        } else if (warnResult.dismiss === Swal.DismissReason.cancel) {
                            handleSelectedProductQuantityRow(rowId, productDetails, serialToAdd, qty);
                        }
                    });
                } else {
                    handleSelectedProductQuantityRow(rowId, productDetails, serialToAdd, qty);
                }
            }
        });
    }

    function handleSelectedProductQuantityRow(rowId, productDetails, serialToAdd, qty) {
        const item = billingItems.find(x => x.id === rowId);
        if (!item) return;
        
        const availSerials = billingSerials.filter(s => String(s.modelId) === String(productDetails.id) || (productDetails.sku && s.modelId === productDetails.sku));
        const usedSerials = billingItems.filter(x => x.id !== rowId).flatMap(x => (x.sn || '').split(',').map(s => s.trim().toLowerCase()).filter(Boolean));
        const unassignedAvail = availSerials.filter(s => !usedSerials.includes(s.sn.toLowerCase())).map(s => s.sn);
        
        if (qty <= unassignedAvail.length) {
            const assignedSns = unassignedAvail.slice(0, qty);
            item.productId = productDetails.id;

            const pendingQty = qty - availCount;
            
            const generatedSns = [];
            let tempSerials = [...billingSerials];
            for (let i = 0; i < pendingQty; i++) {
                let highest = 0;
                let prefix = productDetails.sku ? productDetails.sku + '-' : 'SN-';
                tempSerials.forEach(s => {
                    if (s.modelId === productDetails.id || s.sn.startsWith(prefix)) {
                        let num = parseInt(s.sn.replace(/^\D+/g, ''));
                        if (num > highest) highest = num;
                    }
                });
                const nextSn = prefix + String(highest + 1).padStart(4, '0');
                generatedSns.push(nextSn);
                tempSerials.push({ sn: nextSn, modelId: productDetails.id });

                        const val = inp.value.trim();

                    }
                    
                    return new Promise((resolve) => {

    function assignSerialsToRow(id, qty) {
        const item = billingItems.find(x => x.id === id);
        if (!item || !item.productId) return;

        // If a specific serial is already set (e.g. scanned), preserve it and don't overwrite!
        if (item.sn && item.sn.trim() !== '') {
            return;
        }

        const product = billingProducts.find(p => String(p.id) === String(item.productId));
        if (!product) return;

        // Get all available serials for this model, sorted ascending
        let avail = billingSerials
            .filter(s => String(s.modelId) === String(item.productId) || (product.sku && s.modelId === product.sku))
            .sort((a, b) => a.sn.localeCompare(b.sn, undefined, { numeric: true, sensitivity: 'base' }));

        // Check which ones are already assigned in OTHER rows
        const alreadyAssigned = billingItems
            .filter(x => x.id !== id && String(x.productId) === String(item.productId))
            .flatMap(x => (x.sn || '').split(',').map(s => s.trim()))
            .filter(s => s !== '');

        const unassignedAvail = avail.filter(s => !alreadyAssigned.includes(s.sn));

        // Take needed qty
        const toAssign = unassignedAvail.slice(0, qty).map(s => s.sn);
        item.sn = toAssign.join(', ');
        item.serialNumber = item.sn;
    }

    function handleBillingProductSearch(e) {
        const input = document.getElementById('billProductSearch');
        const dropdown = document.getElementById('billProductDropdown');
        if (!input || !dropdown) return;
        const val = input.value.trim().toLowerCase();

        // Auto-select on Enter (Barcode scanner behavior)
        if (e.key === 'Enter' && val) {
            dropdown.classList.remove('show');
            processBarcodeScan(val);
            input.value = '';
            return;
        }

        if (!val) {
            dropdown.classList.remove('show');
            return;
        }

        // Search products
        let matches = [];

        // Search Serials
        billingSerials.forEach(s => {
            if (s.sn && s.sn.toLowerCase().includes(val)) {
                const parentProd = billingProducts.find(p => String(p.id) === String(s.modelId) || p.sku === s.modelId) || {};
                matches.push({
                    type: 'Serial',
                    ...s,
                    stock: parentProd.stock || 0,
                    rate: parentProd.rate || 0,
                    sku: parentProd.sku || s.modelId,
                    modelName: parentProd.modelName || parentProd.name || s.modelName || s.name || '',
                    imageUrl: parentProd.imageUrl || s.imageUrl || ''
                });
            }
        });

        // Search Products
        billingProducts.forEach(p => {
            if ((p.name && p.name.toLowerCase().includes(val)) ||
                (p.sku && p.sku.toLowerCase().includes(val)) ||
                (p.partNumber && p.partNumber.toLowerCase().includes(val))) {
                matches.push({ type: 'Product', ...p });
            }
        });

        // Deduplicate matches so that we don't show duplicate products
        let uniqueMatches = [];
        let seenProductIds = new Set();

        matches.forEach(m => {
            let rawId = m.type === 'Serial' ? m.modelId : m.id;
            const relatedProd = billingProducts.find(p => String(p.id) === String(rawId) || p.sku === rawId);
            const actualId = relatedProd ? String(relatedProd.id) : String(rawId);

            if (!seenProductIds.has(actualId)) {
                uniqueMatches.push({...m, _actualId: actualId});
                seenProductIds.add(actualId);
            } else {
                // Prefer "Serial" match if existing is just "Product"
                const existingIndex = uniqueMatches.findIndex(x => x._actualId === actualId);
                if (existingIndex !== -1 && uniqueMatches[existingIndex].type === 'Product' && m.type === 'Serial') {
                    uniqueMatches[existingIndex] = {...m, _actualId: actualId};
                }
            }
        });

        dropdown.innerHTML = renderSearchDropdownHtml(uniqueMatches, (m) => {
            return m.type === 'Serial' 
                ? `addScannedProduct('Serial', '${m.sn}')`
                : `addScannedProduct('Product', '${m.id}')`;
        });
        dropdown.classList.add('show');
    }

    function processBarcodeScan(val) {
        const cleanVal = val.trim().toLowerCase();
        // 1. Check Exact Serial
        let serial = billingSerials.find(s => s.sn.toLowerCase() === cleanVal);
        if (serial) {
            addScannedProduct('Serial', serial.sn);
            return;
        }
        // 2. Check Exact SKU or Part Number
        let product = billingProducts.find(p =>
            (p.sku && p.sku.toLowerCase() === cleanVal) ||
            (p.partNumber && p.partNumber.toLowerCase() === cleanVal)
        );
        if (product) {
            addScannedProduct('Product', product.id);
            return;
        }
        Swal.fire('Not Found', 'Barcode/Serial not recognized in inventory.', 'warning');
    }

        const stock = productDetails.stock || 0;

    function addScannedProduct(type, idVal) {
        const dropdown = document.getElementById('billProductDropdown');
        if (dropdown) dropdown.classList.remove('show');

        const input = document.getElementById('billProductSearch');
        if (input) input.value = '';

        let productDetails = null;
        let serialToAdd = '';

        if (type === 'Serial') {
            let serial = billingSerials.find(s => s.sn === idVal);
            if (serial) {
                productDetails = billingProducts.find(p => String(p.id) === String(serial.modelId) || p.sku === serial.modelId);
                if (!productDetails) {
                    productDetails = { id: serial.modelId, name: serial.name, rate: 0, gst: 18, hsn: '' };
                }
                serialToAdd = serial.sn;
                promptForQuantity(productDetails, serialToAdd, input);
            }
        } else {
            productDetails = billingProducts.find(p => String(p.id) === String(idVal));
            if (!productDetails) return;

            const availSerial = billingSerials.find(s =>
                String(s.modelId) === String(idVal) &&
                !billingItems.some(item => (item.sn || '').split(',').map(x => x.trim().toLowerCase()).includes(s.sn.toLowerCase()))
            );
            if (availSerial) {
                serialToAdd = availSerial.sn;
            }
            promptForQuantity(productDetails, serialToAdd, input);
        }
    }

    function finalizeAddScannedProduct(productDetails, serialToAdd, input) {
        if (!productDetails) return;

        let existingItem = billingItems.find(item => String(item.productId) === String(productDetails.id) && (!item.sn || item.sn === ''));
        if (existingItem && (!serialToAdd || serialToAdd === '')) {
            existingItem.qty += 1;
            updateItem(existingItem.id, 'qty', existingItem.qty);
            if (input) setTimeout(() => input.focus(), 10);
            return;
        }

        let rowToUse = billingItems.find(item => (!item.name || item.name === '') && item.qty === 1 && item.rate === 0);
        let newId = rowToUse ? rowToUse.id : Date.now();

        let newItem = {
            id: newId,
            productId: productDetails.id,
            serialNumber: serialToAdd || '',
            name: productDetails.name,
            sn: serialToAdd || '',
            hsn: productDetails.hsnCode || productDetails.sacCode || productDetails.hsn || '',
            qty: 1,
            unit: 'Nos',
            rate: productDetails.rate || 0,
            disc: 0,
            gst: productDetails.gst || 18,
            taxAmt: 0,
            total: 0
        };

        if (rowToUse) {
            Object.assign(rowToUse, newItem);
        } else {
            billingItems.push(newItem);
        }

        renderBillingItems();
        updateItem(newId, 'qty', 1);

        if (input) setTimeout(() => input.focus(), 10);
    }

            if (dd) dd.classList.remove('show');
        }
    });

    function updateItem(id, field, value) {
        const item = billingItems.find(x => x.id === id);
        if (!item) return;

        if (field === 'qty') {
            const qty = parseInt(value) || 1;
            const product = billingProducts.find(p => p.id === item.productId);
            
            const availSerials = billingSerials.filter(s => String(s.modelId) === String(item.productId) || (product && product.sku && s.modelId === product.sku));
            const usedSerials = billingItems.filter(x => x.id !== id).flatMap(x => (x.sn || '').split(',').map(s => s.trim().toLowerCase()).filter(Boolean));
            const unassignedAvail = availSerials.filter(s => !usedSerials.includes(s.sn.toLowerCase())).map(s => s.sn);
            
            if (qty > unassignedAvail.length) {
                const availCount = unassignedAvail.length;
                const pendingQty = qty - availCount;
                
                const tr = document.querySelector(`tr[data-id="${id}"]`);
                const qtyInput = tr ? tr.querySelector('input[type="number"]') : null;
                
                const generatedSns = [];
                let tempSerials = [...billingSerials];
                for (let i = 0; i < pendingQty; i++) {
                    let highest = 0;
                    let prefix = product.sku ? product.sku + '-' : 'SN-';
                    tempSerials.forEach(s => {
                        if (s.modelId === item.productId || s.sn.startsWith(prefix)) {
                            let num = parseInt(s.sn.replace(/^\D+/g, ''));
                            if (num > highest) highest = num;
                        }
                    });
                    const nextSn = prefix + String(highest + 1).padStart(4, '0');
                    generatedSns.push(nextSn);
                    tempSerials.push({ sn: nextSn, modelId: item.productId });
                }
                
                Swal.fire({
                    title: 'Register Missing Serials',
                    focusConfirm: false,
                    html: `
                        <div class="text-start">
                            <p class="mb-2">We need to generate <b>${pendingQty}</b> new serial number(s) to fulfill the quantity of <b>${qty}</b> (Available: ${availCount}).</p>
                            <p class="mb-3 text-muted small">You can edit the auto-generated serial numbers below:</p>
                            <div id="swalGeneratedSerialsContainer" style="max-height: 200px; overflow-y: auto; padding: 5px;">
                                ${generatedSns.map((sn, idx) => `
                                    <div class="mb-2 d-flex align-items-center gap-2">
                                        <span class="fw-bold text-secondary" style="width: 30px;">#${idx + 1}</span>
                                        <input type="text" class="form-control form-control-sm swal-gen-sn-input fw-bold border-primary" value="${sn}" data-index="${idx}">
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `,
                    icon: 'info',
                    showCancelButton: true,
                    confirmButtonText: 'Confirm & Register',
                    cancelButtonText: 'Cancel',
                    confirmButtonColor: '#8B5A2B',
                    showLoaderOnConfirm: true,
                    preConfirm: () => {
                        const inputs = document.querySelectorAll('.swal-gen-sn-input');
                        const customSns = [];
                        let hasEmpty = false;
                        inputs.forEach(inp => {
                            const val = inp.value.trim();
                            if (!val) hasEmpty = true;
                            customSns.push(val);
                        });
                        
                        if (hasEmpty) {
                            Swal.showValidationMessage('Serial numbers cannot be empty');
                            return false;
                        }
                        
                        const uniqueCustomSns = [...new Set(customSns.map(s => s.toLowerCase()))];
                        if (uniqueCustomSns.length !== customSns.length) {
                            Swal.showValidationMessage('Duplicate serial numbers in the list');
                            return false;
                        }
                        
                        const docDup = customSns.find(s => usedSerials.includes(s.toLowerCase()));
                        if (docDup) {
                            Swal.showValidationMessage(`Serial "${docDup}" already added in this document.`);
                            return false;
                        }
                        
                        return new Promise((resolve) => {
                            google.script.run
                                .withSuccessHandler(res => {
                                    if (res && res.success) {
                                        if (res.duplicates && res.duplicates.length > 0) {
                                            Swal.showValidationMessage(`Serials already exist in DB: ${res.duplicates.join(', ')}`);
                                            resolve(false);
                                        } else {
                                            const payload = {
                                                ProductID: item.productId,
                                                Action: 'Stock Addition',
                                                Serials: customSns,
                                                VendorName: 'Auto Generated',
                                                BillNumber: 'AUTO-INV',
                                                Reference: 'Sales Document Auto-Gen',
                                                Notes: 'Auto-added serials from billing module'
                                            };
                                            google.script.run
                                                .withSuccessHandler(saveRes => {
                                                    if (saveRes && saveRes.success) {
                                                        resolve({ success: true, sns: customSns });
                                                    } else {
                                                        Swal.showValidationMessage(`Save failed: ${saveRes ? saveRes.message : 'Unknown error'}`);
                                                        resolve(false);
                                                    }
                                                })
                                                .withFailureHandler(err => {
                                                    Swal.showValidationMessage(`Server Error: ${err.message}`);
                                                    resolve(false);
                                                })
                                                .saveInventoryStock(payload);
                                        }
                                    } else {
                                        Swal.showValidationMessage(`Validation failed: ${res.message}`);
                                        resolve(false);
                                    }
                                })
                                .withFailureHandler(err => {
                                    Swal.showValidationMessage(`Server Error: ${err.message}`);
                                    resolve(false);
                                })
                                .checkSerialsInInventory(customSns);
                        });
                    },
                    allowOutsideClick: () => !Swal.isLoading()
                }).then((result) => {
                    if (result.isConfirmed && result.value) {
                        const finalSns = result.value.sns;
                        finalSns.forEach(sn => {
                            billingSerials.push({
                                sn: sn,
                                modelId: item.productId,
                                name: product.name,
                                modelName: product.modelName || '',
                                imageUrl: product.imageUrl || ''
                            });
                            
                            const localProd = billingProducts.find(p => String(p.id) === String(item.productId));
                            if (localProd) {
                                localProd.stock = (localProd.stock || 0) + 1;
                            }
                        });
                        
                        const allAssigned = [...unassignedAvail, ...finalSns];
                        item.sn = allAssigned.join(', ');
                        item.serialNumber = item.sn;
                        item.qty = qty;
                        
                        renderBillingItems();
                        calculateBillingTotals();
                        
                        Swal.fire('Success', `${finalSns.length} serial(s) registered successfully!`, 'success');
                    } else {
                        item.qty = unassignedAvail.length > 0 ? unassignedAvail.length : 1;
                        if (qtyInput) qtyInput.value = item.qty;
                        renderBillingItems();
                        calculateBillingTotals();
                    }
                });
            } else {
                const assignedSns = unassignedAvail.slice(0, qty);
                item.sn = assignedSns.join(', ');
                item.serialNumber = item.sn;
                item.qty = qty;
                renderBillingItems();
                calculateBillingTotals();
            }
            return;
        }

        if (field === 'name' || field === 'hsn' || field === 'unit' || field === 'sn') {
            item[field] = value;
        } else {
            item[field] = parseFloat(value) || 0;
        }

        const gstEnabled = document.getElementById('billGstToggle').checked;

        let baseAmt = item.qty * item.rate;
        let discAmt = baseAmt * (item.disc / 100);
        let taxableAmt = baseAmt - discAmt;

        if (gstEnabled) {
            item.taxAmt = taxableAmt * (item.gst / 100);
        } else {
            item.taxAmt = 0;
        }

        item.total = taxableAmt + item.taxAmt;

        const tr = document.querySelector(`tr[data-id="${id}"]`);
        if (tr) {
            tr.querySelector('.tax-amt-disp').innerText = `\u20B9${item.taxAmt.toFixed(2)}`;
            tr.querySelector('.total-disp').innerText = `\u20B9${item.total.toFixed(2)}`;
        }

        calculateBillingTotals();
    }

    function calculateBillingTotals() {
        const gstEnabled = document.getElementById('billGstToggle').checked;

        // Dynamic Document Renaming based on GST Toggle
        if (!gstEnabled) {
            if (currentDocType === 'Invoice' || currentDocType === 'Sales Invoice') {
                currentDocType = 'Proforma Invoice';
            } else if (currentDocType === 'Quotation') {
                currentDocType = 'Estimate';
            }
        } else {
            if (currentDocType === 'Proforma Invoice') {
                currentDocType = 'Invoice';
            } else if (currentDocType === 'Estimation' || currentDocType === 'Estimate') {
                currentDocType = 'Quotation';
            }
        }
        
        const titleEl = document.getElementById('billingModalTitle');
        if (titleEl) {
            if (titleEl.innerHTML.includes('fa-edit')) {
                titleEl.innerHTML = `<i class="fas fa-edit me-2"></i> Edit ${currentDocType}`;
            } else {
                titleEl.innerHTML = `<i class="fas fa-file-invoice me-2"></i> Create ${currentDocType}`;
            }
        }

        // Re-calc all items if toggle changed
        let subtotal = 0;
        let totalDisc = 0;
        let totalTax = 0;
        let grandTotalRaw = 0;

        billingItems.forEach(item => {
            let baseAmt = item.qty * item.rate;
            let discAmt = baseAmt * (item.disc / 100);
            let taxableAmt = baseAmt - discAmt;

            if (gstEnabled) item.taxAmt = taxableAmt * (item.gst / 100);
            else item.taxAmt = 0;

            item.total = taxableAmt + item.taxAmt;

            const tr = document.querySelector(`tr[data-id="${item.id}"]`);
            if (tr) {
                const taxDisp = tr.querySelector('.tax-amt-disp');
                const totalDisp = tr.querySelector('.total-disp');
                if (taxDisp) taxDisp.innerText = `\u20B9${item.taxAmt.toFixed(2)}`;
                if (totalDisp) totalDisp.innerText = `\u20B9${item.total.toFixed(2)}`;
            }

            subtotal += baseAmt;
            totalDisc += discAmt;
            totalTax += item.taxAmt;
            grandTotalRaw += item.total;
        });

        // Toggle GST columns using body class
        if (gstEnabled) {
            document.body.classList.remove('gst-disabled');
        } else {
            document.body.classList.add('gst-disabled');
        }
        let grandTotal = Math.round(grandTotalRaw);
        let roundOff = grandTotal - grandTotalRaw;

        let amountPaid = parseFloat(document.getElementById('billAmountPaid').value) || 0;
        let balanceDue = grandTotal - amountPaid;

        document.getElementById('billReceivedDisplay').innerText = `\u20B9${amountPaid.toFixed(2)}`;

        if (amountPaid >= grandTotal && grandTotal > 0) {
            document.getElementById('billPaymentStatus').value = 'Paid';
            document.getElementById('billPaymentStatus').className = 'form-control form-control-sm bg-success text-white fw-bold';
        } else if (amountPaid > 0) {
            document.getElementById('billPaymentStatus').value = 'Partial';
            document.getElementById('billPaymentStatus').className = 'form-control form-control-sm bg-warning text-dark fw-bold';
        } else {
            document.getElementById('billPaymentStatus').value = 'Unpaid';
            document.getElementById('billPaymentStatus').className = 'form-control form-control-sm bg-light fw-bold';
        }

        document.getElementById('billSubtotal').innerText = `\u20B9${subtotal.toFixed(2)}`;
        document.getElementById('billTotalDiscount').innerText = `-\u20B9${totalDisc.toFixed(2)}`;
        document.getElementById('billTotalTax').innerText = `\u20B9${totalTax.toFixed(2)}`;
        document.getElementById('billRoundOff').innerText = `\u20B9${roundOff.toFixed(2)}`;
        document.getElementById('billGrandTotal').innerText = `\u20B9${grandTotal.toFixed(2)}`;
        document.getElementById('billBalanceDue').innerText = `\u20B9${balanceDue.toFixed(2)}`;

        // Dynamically regenerate and refresh UPI QR payment link
        try {
            if (typeof refreshBillingQR === 'function') refreshBillingQR();
        } catch (e) {
            console.warn('QR update deferred:', e);
        }
    }

    function saveBillingDocument(action) {
        const partyId = document.getElementById('billPartySelect').value;
        if (!partyId) {
            Swal.fire('Validation Error', 'Please select a Party.', 'warning');
            return;
        }

        if (billingItems.length === 0 || (billingItems.length === 1 && billingItems[0].name === '')) {
            Swal.fire('Validation Error', 'Please add at least one product.', 'warning');
            return;
        }

        Swal.fire({
            title: 'Saving Document...',
            allowOutsideClick: false,
            didOpen: () => Swal.showLoading()
        });

        const docData = {
            DocType: currentDocType,
            DocNumber: document.getElementById('billingDocNumber').innerText,
            Date: document.getElementById('billDate').value,
            PartyId: partyId,
            GstEnabled: document.getElementById('billGstToggle').checked,
            Items: JSON.stringify(billingItems),
            Subtotal: document.getElementById('billSubtotal').innerText.replace('\u20B9', ''),
            Discount: document.getElementById('billTotalDiscount').innerText.replace('-\u20B9', ''),
            Tax: document.getElementById('billTotalTax').innerText.replace('\u20B9', ''),
            RoundOff: document.getElementById('billRoundOff').innerText.replace('\u20B9', ''),
            GrandTotal: document.getElementById('billGrandTotal').innerText.replace('\u20B9', ''),
            AmountPaid: document.getElementById('billAmountPaid').value,
            BalanceDue: document.getElementById('billBalanceDue').innerText.replace('\u20B9', ''),
            PaymentMethod: document.getElementById('billPaymentMethod').value,
            PaymentStatus: document.getElementById('billPaymentStatus').value,
            DueDate: document.getElementById('billDueDate').value,
            Notes: document.getElementById('billNotes').value,
            Action: action // Draft, Saved, Print
        };

        // =====================================================================
        // CRITICAL FIX: Normalize DocType to canonical value.
        // GST toggle can drift 'Invoice' -> 'Proforma Invoice' or back, but we
        // must save the intended base type. Map Proforma -> Invoice, Estimate ->
        // Quotation etc. so the history filter always finds the record.
        // =====================================================================
        const docTypeNormMap = {
            'Proforma Invoice': 'Invoice',
            'Estimation': 'Estimate',
        };
        if (docTypeNormMap[docData.DocType]) {
            docData.DocType = docTypeNormMap[docData.DocType];
        }

        google.script.run
            .withSuccessHandler(res => {
                try {
                    if (res.success) {
                        closeBillingModal();
                        
                        // Pure English & Clean State Reset
                        billingItems = [];
                        const form = document.getElementById('billingForm');
                        if (form) form.reset();
                        calculateBillingTotals();
                        loadBillingProducts(); // Sync fresh stock & serials from GSheets
                        refreshBillingHistory();

                        // Action triggers
                        if (action === 'Print') {
                            const defaultPrinter = document.getElementById('set-default-printer') ? document.getElementById('set-default-printer').value : 'Regular';
                            if (defaultPrinter === 'Portable') {
                                if (bluetoothDevice && bluetoothDevice.gatt.connected && bluetoothCharacteristic) {
                                    printInvoiceToBluetooth(docData);
                                } else {
                                    Swal.fire({
                                        title: 'Printer Not Connected',
                                        text: 'Portable printer is not connected. Do you want to connect now or print standard A4?',
                                        icon: 'warning',
                                        showCancelButton: true,
                                        confirmButtonText: 'Connect BT Printer',
                                        cancelButtonText: 'Print A4 PDF'
                                    }).then(async (result) => {
                                        if (result.isConfirmed) {
                                            await connectBluetoothPrinter();
                                            if (bluetoothDevice && bluetoothDevice.gatt.connected) {
                                                printInvoiceToBluetooth(docData);
                                            }
                                        } else {
                                            printInvoiceDetails(docData.DocNumber);
                                        }
                                    });
                                }
                            } else if (defaultPrinter === 'Thermal') {
                                printInvoiceDetails(docData.DocNumber); 
                            } else {
                                printInvoiceDetails(docData.DocNumber);
                            }
                        } else if (action === 'Generate PDF' || action === 'Download PDF') {
                            downloadInvoice(docData.DocNumber);
                        } else if (action === 'Email Invoice') {
                            let partyEmail = '';
                            try {
                                const contactEl = document.getElementById('pdContact');
                                if (contactEl) {
                                    const contactText = contactEl.innerText || '';
                                    const emailPart = contactText.split('|')[1] || '';
                                    partyEmail = emailPart.trim();
                                }
                            } catch(e) {}
                            
                            const sendEmail = (email) => {
                                Swal.fire({
                                    title: 'Sending Email...',
                                    text: `Delivering invoice PDF to ${email}`,
                                    allowOutsideClick: false,
                                    didOpen: () => Swal.showLoading()
                                });
                                google.script.run
                                    .withSuccessHandler(emailRes => {

                                            Swal.fire('Email Sent', `Invoice successfully emailed to ${email}!`, 'success');

                                            Swal.fire('Email Failed', emailRes.message, 'error');

                            });

                                .withSuccessHandler(linkRes => {

                                if (contactEl) {
                                    const contactText = contactEl.innerText || '';
                                    const phonePart = contactText.split('|')[0] || '';
                                    partyMobile = phonePart.replace(/Ph:\s*/i, '').trim();
                                }
                            } catch(e) {}
                            
                            Swal.fire({
                                title: 'Generating Secure Link...',
                                allowOutsideClick: false,
                                didOpen: () => Swal.showLoading()

                                .withSuccessHandler(linkRes => {
                                    if (linkRes.success) {
                                        const finalUrl = linkRes.url + '&mobile=' + encodeURIComponent(partyMobile) + '&bill=' + encodeURIComponent(docData.DocNumber);
                                        const waUrl = 'https://api.whatsapp.com/send?phone=' + encodeURIComponent(partyMobile) + '&text=' + encodeURIComponent(`Please view and pay your invoice online at: ${finalUrl}`);
                                        
                                        Swal.fire({
                                            title: 'Share Payment Link',
                                            html: `
                                                <p class="small text-muted mb-2">A secure online payment link is active for this invoice.</p>
                                                <div class="input-group input-group-sm mb-3">
                                                    <input type="text" id="swal-share-url-input" class="form-control font-monospace bg-white text-dark text-center" value="${finalUrl}" readonly>
                                                    <button class="btn btn-primary fw-bold" type="button" onclick="const inp=document.getElementById('swal-share-url-input'); inp.select(); navigator.clipboard.writeText(inp.value); Swal.showValidationMessage('Copied to Clipboard!');"><i class="fas fa-copy"></i></button>
                                                </div>
                                                <div class="d-flex justify-content-center gap-2">
                                                    <a href="${waUrl}" target="_blank" class="btn btn-success btn-sm fw-bold"><i class="fab fa-whatsapp me-1"></i> WhatsApp</a>
                                                </div>
                                            `,
                                            showConfirmButton: true,
                                            confirmButtonText: 'Done'
                                        });
                                    } else {
                                        Swal.fire('Failed', linkRes.message || 'Could not generate share link', 'error');
                                    }
                                })
                                .withFailureHandler(err => Swal.fire('Error', err.message, 'error'))
                                .generatePublicLink(docData.DocNumber);
                        } else {
                            Swal.fire('Success', `${currentDocType} saved successfully!`, 'success');
                        }
                    } else {
                        Swal.fire('Error', res.message, 'error');
                    }
                } catch (e) {
                    console.error('Success handler UI exception:', e);
                    Swal.fire('Saved with Warning', `Document saved successfully, but UI error occurred: ${e.message}`, 'warning');
                }
            })
            .withFailureHandler(err => Swal.fire('Error', err.message, 'error'))
            .saveBillingDocument(docData);
    }

    function applySalesDocFilters() {
        const docType = currentDocType;
        const search = document.getElementById('sales-doc-search').value.toLowerCase();
        const dateFrom = document.getElementById('sales-doc-date-from').value;
        const dateTo = document.getElementById('sales-doc-date-to').value;
        const status = document.getElementById('sales-doc-status').value;

        let filtered = billingHistory.filter(h => {
            // Match both canonical type AND its GST variant (e.g. Invoice matches Proforma Invoice)
            const docTypeVariants = {
                'Invoice': ['Invoice', 'Proforma Invoice', 'Sales Invoice'],
                'Estimate': ['Estimate', 'Estimation', 'Quotation'],
                'Quotation': ['Quotation', 'Estimate', 'Estimation'],
            };
            const allowedTypes = docTypeVariants[docType] || [docType];
            let matchType = allowedTypes.includes(h.DocType);
            let matchSearch = `${h.DocNumber} ${h.PartyName} ${h.GrandTotal} ${h.PartyMobile || ''}`.toLowerCase().includes(search);

            let matchDate = true;
            if (dateFrom || dateTo) {
                try {
                    let hDateStr = '';
                    if (h.Date) {
                        const cleanDate = String(h.Date).split('T')[0].trim();
                        if (/^\d{4}-\d{2}-\d{2}$/.test(cleanDate)) {
                            hDateStr = cleanDate;
                        } else {
                            const d = new Date(h.Date);
                            if (!isNaN(d.getTime())) {
                                hDateStr = d.toISOString().split('T')[0];
                            } else {
                                const parts = cleanDate.split(/[-/]/);
                                if (parts.length === 3) {
                                    if (parts[0].length === 4) {
                                        hDateStr = `${parts[0]}-${parts[1].padStart(2, '0')}-${parts[2].padStart(2, '0')}`;
                                    } else {
                                        hDateStr = `${parts[2]}-${parts[1].padStart(2, '0')}-${parts[0].padStart(2, '0')}`;
                                    }
                                }
                            }
                        }
                    }
                    if (hDateStr) {
                        if (dateFrom && hDateStr < dateFrom) matchDate = false;
                        if (dateTo && hDateStr > dateTo) matchDate = false;
                    } else {
                        matchDate = false;
                    }
                } catch(e) {
                    console.warn('Failed parsing date for row:', h, e);
                    matchDate = false;
                }
            }

            let matchStatus = true;
            if (status !== 'All') {
                if (status === 'Paid' && h.PaymentStatus !== 'Paid') matchStatus = false;
                if (status === 'Unpaid' && h.PaymentStatus !== 'Unpaid') matchStatus = false;
                if (status === 'Partial' && h.PaymentStatus !== 'Partial') matchStatus = false;
            }

            return matchType && matchSearch && matchDate && matchStatus;
        });

    function getCatalogProductByProductId(productId) {
        if (!productId) return null;
        const cache = window.catalogDataCache || [];
        let prod = cache.find(p => String(p.ProductID || p.id) === String(productId));
        if (prod) return prod;
        const bProd = (window.billingProducts || []).find(p => String(p.id) === String(productId) || String(p.sku) === String(productId));
        if (bProd) {
            return {
                'Model Number': bProd.sku,
                'Model Name': bProd.modelName,
                'Part Number': bProd.partNumber,
                'Product Title': bProd.name
            };
        }
        return null;
    }

    function getProductMetadata(item) {
        const prod = getCatalogProductByProductId(item.productId);
        const modelNumber = prod ? (prod['Model Number'] || prod.ModelNumber || prod.modelNumber || prod.sku || '') : (item.modelNo || item.model || item.modelNumber || item.sku || '');
        const modelName = prod ? (prod['Model Name'] || prod.ModelName || prod.modelName || prod.name || '') : (item.modelName || item.model || '');
        const partNumber = prod ? (prod['Part Number'] || prod.PartNumber || prod.partnumber || prod.PartNumber || '') : (item.partNo || item.part || item.partNumber || '');
        return {
            modelNumber: modelNumber || 'N/A',
            modelName: modelName || item.name || 'N/A',
            partNumber: partNumber || 'N/A'
        };
    }

    function duplicateInvoice(docNumber) {
        const inv = billingHistory.find(x => x.DocNumber === docNumber);
        if (!inv) {
            Swal.fire('Error', 'Invoice not found.', 'error');
            return;
        }

        currentDocType = inv.DocType;
        document.getElementById('billingModalTitle').innerHTML = `<i class="fas fa-clone me-2"></i> Duplicate ${inv.DocType}`;

        document.getElementById('billingForm').reset();
        document.getElementById('billPartySelect').value = inv.PartyId;
        selectParty(inv.PartyId);

        document.getElementById('billDate').value = new Date().toISOString().split('T')[0];
        document.getElementById('billNotes').value = inv.Notes || '';
        document.getElementById('billGstToggle').checked = inv.GstEnabled === true || String(inv.GstEnabled) === 'true';

        document.getElementById('billAmountPaid').value = inv.AmountPaid || 0;
        document.getElementById('billPaymentMethod').value = inv.PaymentMethod || 'Cash';

        try {
            billingItems = JSON.parse(inv.ItemsJson || '[]');
            billingItems.forEach(item => {
                delete item.sn;
                delete item.serialNumber;
            });
        } catch (e) {
            console.error('Failed to parse billing items:', e);
            billingItems = [];
        }

        if (billingItems.length === 0) {
            addBillingProductRow();
        }

        google.script.run
            .withSuccessHandler(num => {
                document.getElementById('billingDocNumber').innerText = num;
            })
            .getNextDocNumber(inv.DocType);

        onBusinessTypeChange();
        renderBillingItems();
        calculateBillingTotals();
        loadBillingProducts();

        new bootstrap.Modal(document.getElementById('billingModal')).show();

        Swal.fire({
            icon: 'info',
            title: 'Document Duplicated',
            text: 'We have populated a new draft document using previous details. Please verify details and scan new serial numbers before saving.',
            timer: 4000
        });
    }

            Swal.fire('Info', 'Save this document first before duplicating it.', 'info');

        closeBillingModal();

    function cancelActiveDocument() {
        const activeDocNumber = document.getElementById('billingDocNumber') ? document.getElementById('billingDocNumber').innerText.trim() : '';
        if (!activeDocNumber || activeDocNumber === 'NEW' || activeDocNumber.includes('DRAFT')) {
            Swal.fire('Info', 'Nothing to cancel. This is a new document.', 'info');

    function printInvoiceDetails(docNumber) {
        if (!docNumber) return;
        Swal.fire({
            title: 'Preparing Print Dialog...',
            allowOutsideClick: false,
            didOpen: () => Swal.showLoading()
        });
        google.script.run.withSuccessHandler(res => {
            Swal.close();
            if (res.success) {
                const byteCharacters = atob(res.base64);
                const byteNumbers = new Array(byteCharacters.length);
                for (let i = 0; i < byteCharacters.length; i++) {
                    byteNumbers[i] = byteCharacters.charCodeAt(i);
                }
                const byteArray = new Uint8Array(byteNumbers);
                const blob = new Blob([byteArray], { type: 'application/pdf' });
                const blobUrl = URL.createObjectURL(blob);
                printPdfBlobDirectly(blobUrl);
            } else {
                Swal.fire('Error', res.message, 'error');
            }
        }).downloadInvoicePDF(docNumber);
    }

    function deleteInvoiceDetails(docNumber) {
        Swal.fire({
            title: 'Delete Document?',
            text: `Are you sure you want to permanently delete ${docNumber}? This action is irreversible!`,
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#d9534f',
            confirmButtonText: 'Yes, delete forever!'
        }).then((result) => {
            if (result.isConfirmed) {
                Swal.fire({
                    title: 'Deleting Document...',
                    allowOutsideClick: false,
                    didOpen: () => Swal.showLoading()
                });

                google.script.run
                    .withSuccessHandler(res => {
                        Swal.close();
                        if (res.success) {
                            Swal.fire('Deleted!', res.message, 'success');
                            refreshBillingHistory();
                        } else {
                            Swal.fire('Delete Failed', res.message, 'error');
                        }
                    })
                    .withFailureHandler(err => {
                        Swal.close();
                        Swal.fire('Error', err.message, 'error');
                    })
                    .deleteBillingDocument(docNumber);
            }
        });
    }

    function handleSalesDocQuickDate(preset) {
        const fromInput = document.getElementById('sales-doc-date-from');
        const toInput = document.getElementById('sales-doc-date-to');

        if (preset === 'All') {
            fromInput.value = '';
            toInput.value = '';
        } else if (preset === 'ThisWeek') {
            const today = new Date();
            const lastWeek = new Date(today.getTime() - 7 * 24 * 60 * 60 * 1000);
            fromInput.value = lastWeek.toISOString().split('T')[0];
            toInput.value = today.toISOString().split('T')[0];
        } else if (preset === 'ThisMonth') {
            const today = new Date();
            const firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
            const lastDay = new Date(today.getFullYear(), today.getMonth() + 1, 0);
            fromInput.value = firstDay.toISOString().split('T')[0];
            toInput.value = lastDay.toISOString().split('T')[0];
        }

        applySalesDocFilters();
    }

    function filterBillingHistory() {
        const type = document.getElementById('filterHistoryType').value;
        const search = document.getElementById('searchBillingHistory').value.toLowerCase();
        const dateFrom = document.getElementById('filterHistoryDateFrom').value;
        const dateTo = document.getElementById('filterHistoryDateTo').value;

        let filtered = billingHistory.filter(h => {
            // Match both 'All' and DocType variants (Invoice includes Proforma Invoice)
            const docTypeVariants = {
                'Invoice': ['Invoice', 'Proforma Invoice', 'Sales Invoice'],
                'Estimate': ['Estimate', 'Estimation', 'Quotation'],
                'Quotation': ['Quotation', 'Estimate', 'Estimation'],
            };
            let matchType = (type === 'All');
            if (!matchType) {
                const allowedTypes = docTypeVariants[type] || [type];
                matchType = allowedTypes.includes(h.DocType);
            }
            let matchSearch = `${h.DocNumber} ${h.PartyName} ${h.GrandTotal} ${h.PartyMobile || ''}`.toLowerCase().includes(search);

            let matchDate = true;
            if (dateFrom || dateTo) {
                try {
                    let hDateStr = '';
                    if (h.Date) {
                        const cleanDate = String(h.Date).split('T')[0].trim();
                        if (/^\d{4}-\d{2}-\d{2}$/.test(cleanDate)) {
                            hDateStr = cleanDate;
                        } else {
                            const d = new Date(h.Date);
                            if (!isNaN(d.getTime())) {
                                hDateStr = d.toISOString().split('T')[0];
                            } else {
                                const parts = cleanDate.split(/[-/]/);
                                if (parts.length === 3) {
                                    if (parts[0].length === 4) {
                                        hDateStr = `${parts[0]}-${parts[1].padStart(2, '0')}-${parts[2].padStart(2, '0')}`;
                                    } else {
                                        hDateStr = `${parts[2]}-${parts[1].padStart(2, '0')}-${parts[0].padStart(2, '0')}`;
                                    }
                                }
                            }
                        }
                    }
                    if (hDateStr) {
                        if (dateFrom && hDateStr < dateFrom) matchDate = false;
                        if (dateTo && hDateStr > dateTo) matchDate = false;
                    } else {
                        matchDate = false;
                    }
                } catch(e) {
                    console.warn('Failed parsing date for row:', h, e);
                    matchDate = false;
                }
            }

            return matchType && matchSearch && matchDate;
        });

        const tbody = document.getElementById('billing-history-body');
        if (!tbody) return;

        if (filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" class="text-center py-4 text-muted">No records found matching criteria.</td></tr>';
            return;
        }

        let html = '';
        filtered.forEach(h => {
            let statusBadge = '';
            if (h.PaymentStatus === 'Paid') statusBadge = '<span class="badge bg-success">Paid</span>';
            else if (h.PaymentStatus === 'Partial') statusBadge = '<span class="badge bg-warning text-dark">Partial</span>';
            else statusBadge = '<span class="badge bg-danger">Unpaid</span>';

            html += `
        <tr>
            <td>${formatDate(h.Date)}</td>
            <td class="fw-bold">${h.DocNumber}</td>
            <td><span class="badge bg-light text-dark border">${h.DocType}</span></td>
            <td>${h.PartyName}</td>
            <td class="fw-bold text-success">\u20B9${parseFloat(h.GrandTotal || 0).toFixed(2)}</td>
            <td>${statusBadge}</td>
            <td>
                <button class="btn btn-sm btn-outline-primary" onclick="viewInvoiceDetails('${h.DocNumber}')"><i class="fas fa-eye"></i></button>
                <button class="btn btn-sm btn-outline-secondary" onclick="downloadInvoice('${h.DocNumber}')"><i class="fas fa-download"></i></button>
            </td>
        </tr>`;
        });
        tbody.innerHTML = html;
    }

    function updateSalesReports(history) {
        let sales = 0, paid = 0, pending = 0, invoices = 0;

        history.forEach(h => {
            if (h.DocType === 'Invoice' || h.DocType === 'Sales Order') {
                sales += parseFloat(h.GrandTotal) || 0;
                paid += parseFloat(h.AmountPaid) || 0;
                pending += parseFloat(h.BalanceDue) || 0;
                invoices++;
            }
        });

        // Calculate Low Stock
        const lowStockThreshold = 5;
        const lowStockItems = billingProducts.filter(p => p.stock <= lowStockThreshold);
        const lowStockCount = lowStockItems.length;

        if (document.getElementById('report-total-sales')) document.getElementById('report-total-sales').innerText = `\u20B9${sales.toLocaleString('en-IN', { minimumFractionDigits: 2 })}`;
        if (document.getElementById('report-paid-amount')) document.getElementById('report-paid-amount').innerText = `\u20B9${paid.toLocaleString('en-IN', { minimumFractionDigits: 2 })}`;
        if (document.getElementById('report-pending-amount')) document.getElementById('report-pending-amount').innerText = `\u20B9${pending.toLocaleString('en-IN', { minimumFractionDigits: 2 })}`;
        if (document.getElementById('report-total-invoices')) document.getElementById('report-total-invoices').innerText = invoices;
        if (document.getElementById('report-low-stocks')) {
            document.getElementById('report-low-stocks').innerText = lowStockCount;
            if (lowStockCount > 0) document.getElementById('report-low-stocks').parentElement.parentElement.classList.add('bg-danger', 'text-white');
            else document.getElementById('report-low-stocks').parentElement.parentElement.classList.remove('bg-danger', 'text-white');
        }
    }

    function generateShareLinkForActiveInvoice() {
        const docNumInput = document.getElementById('billNo');
        const docNumber = docNumInput ? docNumInput.value : '';
        if (!docNumber) {
            Swal.fire('Empty Invoice', 'Please load or create an invoice in the editor before generating a share link.', 'info');
            return;
        }

        // Extract party mobile & email from the displayed party details
        let partyMobile = '';
        let partyEmail = '';
        try {
            const contactEl = document.getElementById('pdContact');
            if (contactEl) {
                const contactText = contactEl.innerText || '';
                const phonePart = contactText.split('|')[0] || '';
                partyMobile = phonePart.replace(/Ph:\s*/i, '').trim();
                const emailPart = contactText.split('|')[1] || '';
                partyEmail = emailPart.trim();
            }
        } catch(e) {}

        Swal.fire({
            title: 'Generating Link...',
            html: 'Please wait while we register the secure link in the database.',
            allowOutsideClick: false,
            didOpen: () => { Swal.showLoading(); }
        });

        google.script.run
            .withSuccessHandler(res => {
                if (res.success) {
                    Swal.close();
                    const linkBox = document.getElementById('active-share-link-box');
                    const urlInput = document.getElementById('active-share-url-input');
                    if (linkBox && urlInput) {
                        const finalUrl = res.url + '&mobile=' + encodeURIComponent(partyMobile) + '&bill=' + encodeURIComponent(docNumber);
                        urlInput.value = finalUrl;
                        linkBox.style.display = 'block';

                        const waBtn = document.getElementById('share-whatsapp-btn');
                        if (waBtn) {
                            waBtn.href = 'https://api.whatsapp.com/send?phone=' + encodeURIComponent(partyMobile) + '&text=' + encodeURIComponent('Please view and pay your invoice online at: ' + finalUrl);
                        }
                        const emailInput = document.getElementById('share-email-input');
                        if (emailInput && partyEmail) emailInput.value = partyEmail;
                    }
                } else {
                    Swal.fire('Failed', res.message || 'Could not generate share link', 'error');
                }
            })
            .withFailureHandler(err => {
                Swal.fire('Error', err.message || 'Server error generating link.', 'error');
            })
            .generatePublicLink(docNumber);
    }

                toast: true,
                position: 'top-end',
                timer: 2000,
                showConfirmButton: false
            });
        } else {
            targetRate = retail;
            Swal.fire({
                icon: 'info',
                title: 'Retail Price Applied',
                text: `Switched to Retail Price: \u20B9${retail}`,
                toast: true,
                position: 'top-end',
                timer: 2000,
                showConfirmButton: false
            });
        }
        
        item.rate = targetRate;

    function showAvailableSerialsDropdown(rowId) {
        const item = billingItems.find(x => x.id === rowId);
        const dropdown = document.getElementById(`rowSerialDropdown-${rowId}`);
        if (!item || !dropdown) return;

        if (!item.productId) {
            dropdown.innerHTML = '<div class="p-2 text-muted small text-center">Select product first</div>';
            dropdown.style.display = 'block';
            return;
        }

        // Get all available serials for this product
        const avail = billingSerials.filter(s => String(s.modelId) === String(item.productId));

        // Check which ones are already assigned in OTHER rows
        const alreadyAssigned = billingItems
            .filter(x => x.id !== rowId && String(x.productId) === String(item.productId))
            .flatMap(x => (x.sn || '').split(',').map(s => s.trim()))
            .filter(s => s !== '');

        const unassignedAvail = avail.filter(s => !alreadyAssigned.includes(s.sn));

        if (unassignedAvail.length === 0) {
            dropdown.innerHTML = '<div class="p-2 text-muted small text-center">No available serials in stock</div>';
            dropdown.style.display = 'block';
            return;
        }

        let html = '';
        unassignedAvail.forEach(s => {
            html += `<a href="javascript:void(0)" class="dropdown-item py-1 border-bottom small" onclick="selectRowSerial(${rowId}, '${s.sn}'); return false;">
            <i class="fas fa-barcode text-primary me-2"></i>${s.sn}
        </a>`;
        });

        dropdown.innerHTML = html;
        dropdown.style.display = 'block';
    }

            .filter(x => x.id !== rowId && String(x.productId) === String(item.productId))
            .flatMap(x => (x.sn || '').split(',').map(s => s.trim()))
            .filter(s => s !== '');

        const unassignedAvail = avail.filter(s => !alreadyAssigned.includes(s.sn));
        const matches = unassignedAvail.filter(s => s.sn.toLowerCase().includes(val.trim().toLowerCase()));

    <div class="container">
        <div class="row justify-content-center">

    <script>
        function handleUniversalTrack() {
            const val = document.getElementById('universalInput').value.trim();
            if (!val) {
                alert('Please enter a search term');
                return;
            }

            const resultsDiv = document.getElementById('universalResults');
            const loader = document.getElementById('loadingTracker');
            resultsDiv.innerHTML = '';
            loader.style.display = 'block';

            // Universal Logic
            let searchType = 'auto';
            if (val.length === 10 && !isNaN(val)) searchType = 'mobile';
            else if (val.toUpperCase().startsWith('C-')) searchType = 'complaint';
            else if (val.toUpperCase().startsWith('V-')) searchType = 'id';
            else searchType = 'partNumber';

            const func = (searchType === 'complaint') ? 'searchComplaint' : 'searchWarranty';
            const param = (searchType === 'auto' || searchType === 'partNumber') ? 'partNumber' : searchType;

            google.script.run.withSuccessHandler(res => {
                loader.style.display = 'none';
                if (res.success && res.data && res.data.length > 0) {
                    renderResults(res.data);
                } else {
                    // If no results, try the other table as a fallback
                    if (searchType === 'auto' || searchType === 'partNumber') {
                        // try complaint too
                        google.script.run.withSuccessHandler(res2 => {
                            if (res2.success && res2.data && res2.data.length > 0) renderResults(res2.data);
                            else showNotFound();
                        }).searchComplaint('id', val);
                    } else {
                        showNotFound();
                    }
                }
            })[func](param, val);
        }

        function renderResults(data) {
            const resultsDiv = document.getElementById('universalResults');
            let html = '';
            data.forEach(item => {
                const isComp = !!item.ComplaintID;
                html += `
                    <div class="tracking-result-card">
                        <div class="row align-items-center">
                            <div class="col-md-8">
                                <div class="d-flex align-items-center mb-3">
                                    <div class="bg-light p-2 rounded me-3">
                                        <i class="fas ${isComp ? 'fa-tools text-purple' : 'fa-certificate text-success'}"></i>
                                    </div>
                                    <div>
                                        <small class="text-muted text-uppercase fw-bold" style="font-size: 0.7rem;">${isComp ? 'Complaint' : 'Warranty'} Status</small>
                                        <h4 class="fw-bold m-0">${isComp ? item.ComplaintID : item.WarrantyID}</h4>
                                    </div>
                                </div>
                                <div class="row g-3">
                                    <div class="col-sm-6">
                                        <label class="text-muted small d-block">Customer Name</label>
                                        <span class="fw-bold">${item.CustomerName}</span>
                                    </div>
                                    <div class="col-sm-6">
                                        <label class="text-muted small d-block">Product Model</label>
                                        <span class="fw-bold">${item.ProductModel}</span>
                                    </div>
                                    <div class="col-sm-6">
                                        <label class="text-muted small d-block">${isComp ? 'Service Date' : 'Warranty End Date'}</label>
                                        <span class="fw-bold">${isComp ? item.ServiceDate : item.EndDate}</span>
                                    </div>
                                    <div class="col-sm-6">
                                        <label class="text-muted small d-block">Current Status</label>
                                        <span class="badge ${getStatusBadge(item.Status)}">${item.Status}</span>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-4 text-center border-start">
                                <i class="fas ${isComp ? 'fa-clock' : 'fa-shield-alt'} fa-3x text-light mb-2"></i>
                                <p class="small text-muted mb-0">Record found in V-VARMA<br>central database.</p>
                            </div>
                        </div>
                    </div>
                `;
            });
            resultsDiv.innerHTML = html;
        }

        function showNotFound() {
            document.getElementById('universalResults').innerHTML = `
                <div class="tracking-result-card text-center py-5" style="border-left-color: #cbd5e0;">
                    <i class="fas fa-search-minus fa-3x text-muted mb-3"></i>
                    <h3 class="fw-bold">No Records Found</h3>
                    <p class="text-muted">We couldn't find any details matching your input. Please check the ID or Mobile number and try again.</p>
                </div>
            `;
        }

        function getStatusBadge(s) {
            const st = s.toLowerCase();
            if (st.includes('active') || st.includes('resolved')) return 'bg-success';
            if (st.includes('pending') || st.includes('registered')) return 'bg-warning text-dark';
            return 'bg-primary';
        }

        // Enter key support
        document.getElementById('universalInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleUniversalTrack();
        });

        // Scanner Logic
        let html5QrCode;
        const scannerModal = new bootstrap.Modal(document.getElementById('scannerModal'));

        function showScannerOptions() {
            document.getElementById('scannerChoices').style.display = 'block';
            document.getElementById('readerContainer').style.display = 'none';
            scannerModal.show();
        }

        function startCameraScanner() {
            document.getElementById('scannerChoices').style.display = 'none';
            document.getElementById('readerContainer').style.display = 'block';
            
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };

            html5QrCode.start(
                { facingMode: "environment" }, 
                config, 
                (decodedText) => {
                    processScanResult(decodedText);
                },
                (errorMessage) => {}
            ).catch((err) => {
                alert("Camera error or permission denied: " + err);
                showScannerOptions();
            });
        }

        function handleFileScan(input) {
            if (!input.files || input.files.length === 0) return;
            const file = input.files[0];
            
            const fileScanner = new Html5Qrcode("reader");
            fileScanner.scanFile(file, true)
                .then(decodedText => {
                    processScanResult(decodedText);
                })
                .catch(err => {
                    alert("Error scanning file: Make sure the image contains a clear QR or Barcode.");
                    console.error(err);
                });
        }

        function processScanResult(text) {
            document.getElementById('universalInput').value = text;
            stopScanner();
            scannerModal.hide();
            handleUniversalTrack();
        }

        function stopScanner() {
            if (html5QrCode && html5QrCode.isScanning) {
                html5QrCode.stop().then(() => {
                    html5QrCode.clear();
                    document.getElementById('scannerChoices').style.display = 'block';
                    document.getElementById('readerContainer').style.display = 'none';
                }).catch(err => console.error(err));
            } else {
                scannerModal.hide();
            }
        }

        document.getElementById('scannerModal').addEventListener('hidden.bs.modal', () => {
            if (html5QrCode && html5QrCode.isScanning) stopScanner();
        });
    </script>
</body>

<script>
    /**
     * V-VARMA V3 - Administrative JavaScript Module
     * Centralized logic for the Admin Dashboard.
     */

    console.log('[Admin] Core Script Initialized - v3.0.9');

    // Heartbeat to verify script is alive
    setInterval(() => console.log('[Admin] Heartbeat... System Ready'), 30000);

    // Global State
    let cropper = null;
    let galleryCropper = null;
    let carouselModal = null;
    let carouselImageModal = null;
    let currentEditingSlideId = null;
    let currentEditingGalleryId = null;
    let allHeroSlides = [];
    let allCarouselImages = [];
    let catalogDataCache = [];
    let currentEditingCatalogId = null;
    let catalogSourceTab = 'dashboard';
    let catalogImages = [];
    let catalogBanners = [];
    let partnerLogos = [];
    let catalogCropper = null;
    let catalogCurrentEditingIndex = null;
    let catalogZoomLevel = 1;
    let catalogCurrentStep = 1;

    // Global Error Handler
    window.onerror = function (msg, url, line, col, error) {
        console.error('GLOBAL JS ERROR:', msg, 'at', line, ':', col);
        // Show visual alert for admin
        if (typeof Swal !== 'undefined') {
            Swal.fire({
                icon: 'error',
                title: 'System Script Error',
                text: msg,
                footer: 'Line: ' + line + ' Col: ' + col
            });
        }
        return false;
    };

    /**
     * Admin Loading Overlay
     */
    function showAdminLoading() {
        const loader = document.getElementById('section-loader');
        if (loader) {
            loader.style.display = 'flex';
            loader.style.pointerEvents = 'auto';
            console.log('[UI] Admin Loader Shown');
        }
    }

    function hideAdminLoading() {
        const loader = document.getElementById('section-loader');
        if (loader) {
            loader.style.display = 'none';
            loader.style.pointerEvents = 'none';
            console.log('[UI] Admin Loader Hidden');
        }
    }

    // Initial stubs removed in favor of full global exposure at the bottom

    /**
     * Utility: Format Date for UI
     */
    function formatDate(date) {
        if (!date) return 'N/A';
        const d = new Date(date);
        if (isNaN(d.getTime())) return String(date);
        const day = String(d.getDate()).padStart(2, '0');
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const year = d.getFullYear();
        return `${day}/${month}/${year}`;
    }

    /**
     * Utility: Get Status Badge Class
     */
    function getStatusBadge(s) {
        if (!s) return 'bg-secondary';
        const status = s.toString().toLowerCase();
        if (status.includes('registered') || status.includes('pending')) return 'bg-info';
        if (status.includes('assigned')) return 'bg-primary';
        if (status.includes('resolved') || status.includes('completed') || status.includes('active')) return 'bg-success';
        if (status.includes('cancelled') || status.includes('blocked') || status.includes('paused')) return 'bg-danger';
        return 'bg-warning text-dark';
    }

    /**
     * Global Search Stub
     */
    function globalSearch(query) {
        console.log('Searching for:', query);
        // Future: Implement cross-module filtering logic
    }

    function toggleSidebar() {
        console.log('[Sidebar] Toggle Triggered');
        const sidebar = document.getElementById('sidebar');
        if (!sidebar) {
            console.error('[Sidebar] Sidebar element not found!');
            return;
        }

        if (window.innerWidth < 992) {
            sidebar.classList.toggle('show');
            console.log('[Sidebar] Mobile Toggle:', sidebar.classList.contains('show'));
        } else {
            document.body.classList.toggle('sidebar-collapsed');
            console.log('[Sidebar] Desktop Toggle:', document.body.classList.contains('sidebar-collapsed'));
        }
    }



    function switchAdminModule(sectionId) {
        // Normalize sectionId (handle singular/plural mismatches)
        if (sectionId === 'installation') sectionId = 'installations';
        
        console.log('[Nav] switchAdminModule called for:', sectionId);

        // Handle specific route redirects
        if (sectionId === 'register') {
            window.location.search = '?page=register';
            return;
        }

        const target = document.getElementById('section-' + sectionId);
        if (!target) {
            console.error('[Nav] FAILED: Target section not found: section-' + sectionId);
            Swal.fire('Navigation Error', 'Module section not found: ' + sectionId, 'warning');
            return;
        }

        showAdminLoading();

        setTimeout(() => {
            try {
                // 1. Update Sidebar Active State
                document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
                const activeMenu = document.getElementById('menu-' + sectionId);
                if (activeMenu) activeMenu.classList.add('active');

                // 2. Hide All Sections Immediately
                document.querySelectorAll('.admin-section').forEach(s => {
                    s.style.display = 'none';
                });

                // 3. Reveal Target Section
                target.style.display = 'block';
                console.log('[Nav] Section visible:', sectionId);

                // 4. Trigger Data Refreshers
                const refreshers = {
                    'dashboard': typeof initDashboard === 'function' ? initDashboard : null,
                    'catalog': typeof refreshCatalogDashboard === 'function' ? refreshCatalogDashboard : null,
                    'complaints': typeof refreshComplaints === 'function' ? refreshComplaints : null,
                    'warranties': typeof refreshWarranties === 'function' ? refreshWarranties : null,
                    'installations': typeof refreshInstallations === 'function' ? refreshInstallations : null,
                    'products': typeof refreshProducts === 'function' ? refreshProducts : null,
                    'ledger': typeof refreshLedger === 'function' ? refreshLedger : null,
                    'inventory': typeof refreshInventory === 'function' ? refreshInventory : null,
                    'dealers': typeof refreshDealers === 'function' ? refreshDealers : null,
                    'technicians': typeof refreshTechnicians === 'function' ? refreshTechnicians : null,
                    'orders': typeof refreshOrders === 'function' ? refreshOrders : null,
                    'amc': typeof refreshAMC === 'function' ? refreshAMC : null,
                    'notifications': typeof refreshNotifications === 'function' ? refreshNotifications : null,
                    'parties': typeof refreshParties === 'function' ? refreshParties : null,
                    'websettings': typeof refreshWebSettings === 'function' ? refreshWebSettings : null,
                    'settings': () => console.log('Settings module loaded')
                };

                if (refreshers[sectionId]) {
                    try {
                        refreshers[sectionId]();
                    } catch (re) {
                        console.error('[Nav] Refresher failed for ' + sectionId + ':', re);
                    }
                }

                // 5. Mobile UX: Auto-close sidebar
                if (window.innerWidth < 992) {
                    const sidebar = document.getElementById('sidebar');
                    if (sidebar && sidebar.classList.contains('show')) sidebar.classList.remove('show');
                }
                hideAdminLoading();

            } catch (err) {
                console.error('[Nav] Critical Navigation Crash:', err);
                hideAdminLoading();
                Swal.fire('System Error', 'Navigation failed. Please refresh the page.', 'error');
            }
        }, 10);
    }

    /**
     * Safe DOM Utilities
     */
    function safeSetText(id, val) {
        const el = document.getElementById(id);
        if (el) el.innerText = val !== undefined && val !== null ? val : '0';
    }

    function safeSetHtml(id, val) {
        const el = document.getElementById(id);
        if (el) el.innerHTML = val !== undefined && val !== null ? val : '';
    }

    function saveManualSSId() {
        const id = document.getElementById('manual-ss-id').value;
        if (!id) {
            Swal.fire({
                title: 'Clear Override?',
                text: 'Are you sure you want to remove the manual spreadsheet ID and use the default?',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'Yes, clear it'
            }).then((result) => {
                if (result.isConfirmed) {
                    executeManualSSIdUpdate('');
                }
            });
        } else {
            executeManualSSIdUpdate(id);
        }
    }

    function executeManualSSIdUpdate(id) {
        showAdminLoading();
        google.script.run.withFailureHandler(err => { console.error('Backend Error:', err); Swal.fire('System Error', err.message || 'Failed to load data', 'error'); hideAdminLoading && typeof hideAdminLoading === 'function' ? hideAdminLoading() : null; }).withSuccessHandler(res => {
            hideAdminLoading();
            if (res.success) {
                Swal.fire('Success', res.message, 'success').then(() => {
                    checkDatabaseDiagnostics();
                    refreshWebSettings();
                });
            } else {
                Swal.fire('Error', res.message, 'error');
            }
        }).setManualSpreadsheetId(id);
    }

    function checkDatabaseDiagnostics() {
        google.script.run.withFailureHandler(err => { console.error('Backend Error:', err); Swal.fire('System Error', err.message || 'Failed to load data', 'error'); hideAdminLoading && typeof hideAdminLoading === 'function' ? hideAdminLoading() : null; }).withSuccessHandler(res => {
            const diag = document.getElementById('diag-results');
            diag.style.display = 'block';
            let html = `<strong>Connected To:</strong> ${res.ssName}<br>`;
            html += `<strong>SS ID:</strong> ${res.ssId}<br>`;
            html += `<strong>Manual Override:</strong> ${res.manualId}<br>`;
            html += `<strong>Container Bound:</strong> ${res.isContainerBound}<br>`;
            html += `<hr><strong>Tabs Detected:</strong><br>`;
            res.sheets.forEach(s => {
                html += `- ${s.name}: ${s.rows} rows<br>`;
            });
            diag.innerHTML = html;

            // Auto-fill manual ID field if not already filled
            if (res.manualId !== 'None (Using Default/Active)') {
                document.getElementById('manual-ss-id').value = res.ssId;
            }
        }).withFailureHandler(err => {
            Swal.fire('Diagnostic Error', err.message, 'error');
        }).getDiagnostics();
    }

    // --- Web Settings & Carousel Logic ---

    function refreshWebSettings() {
        console.log('[WS] refreshWebSettings called');

        // Defensive modal init
        try {
            if (!carouselModal) {
                var modalEl = document.getElementById('carouselModal');
                if (modalEl) carouselModal = new bootstrap.Modal(modalEl);
            }
            if (!carouselImageModal) {
                var galleryModalEl = document.getElementById('carouselImageModal');
                if (galleryModalEl) carouselImageModal = new bootstrap.Modal(galleryModalEl);
            }
        } catch (modalErr) {
            console.error('[WS] Modal init error:', modalErr);
        }

        // Load Configs
        try {
            google.script.run.withFailureHandler(err => { console.error('Backend Error:', err); Swal.fire('System Error', err.message || 'Failed to load data', 'error'); hideAdminLoading && typeof hideAdminLoading === 'function' ? hideAdminLoading() : null; }).withSuccessHandler(function (settings) {
                console.log('[WS] Settings loaded:', settings);
                try {
                    if (settings && settings.site_logo) {
                        var logoEl = document.getElementById('current-logo-preview');
                        if (logoEl) logoEl.src = settings.site_logo;
                    }
                    if (settings && settings.banner_timing) {
                        var btEl = document.getElementById('config-banner-timing');
                        if (btEl) btEl.value = settings.banner_timing;
                    }
                    if (settings && settings.catalog_timing) {
                        var ctEl = document.getElementById('config-catalog-timing');
                        if (ctEl) ctEl.value = settings.catalog_timing;
                    }
                    if (settings && settings.gallery_timing) {
                        var gtEl = document.getElementById('config-gallery-timing');
                        if (gtEl) gtEl.value = settings.gallery_timing;
                    }
                    
                    if (settings) {
                        const installs = settings.installations_count || '';
                        const dealers = settings.dealers_count || '';
                        const techs = settings.technicians_count || '';
                        const areas = settings.areas_count || '';
                        const serviceAreas = settings.service_areas || '';
                        
                        const installsEl = document.getElementById('stats-installs');
                        if (installsEl) installsEl.value = installs;
                        const dealersEl = document.getElementById('stats-dealers');
                        if (dealersEl) dealersEl.value = dealers;
                        const techsEl = document.getElementById('stats-techs');
                        if (techsEl) techsEl.value = techs;
                        const areasEl = document.getElementById('stats-areas-count');
                        if (areasEl) areasEl.value = areas;
                        const serviceAreasEl = document.getElementById('stats-service-areas');
                        if (serviceAreasEl) serviceAreasEl.value = serviceAreas;
                        
                        partnerLogos = [];
                        let pLogos = settings.partner_logos || '[]';
                        if (typeof pLogos === 'string' && pLogos.trim().startsWith('[')) {
                            try { pLogos = JSON.parse(pLogos); } catch(e) {}
                        }
                        if (pLogos && Array.isArray(pLogos)) {
                            pLogos.forEach(url => {
                                if (url && url.length > 10) {
                                    partnerLogos.push({ url: url });
                                }
                            });
                        }
                        renderPartnerLogosPreviews();
                    }
                } catch (e) { console.error('[WS] Settings render error:', e); }
            }).withFailureHandler(function (err) {
                console.error('[WS] Settings load failed:', err);
            }).getWebSettings();
        } catch (e) { console.error('[WS] Settings call error:', e); }

        // Load Hero Slides
        var heroTbody = document.getElementById('hero-slides-content');
        if (heroTbody) heroTbody.innerHTML = '<tr><td colspan="4" class="text-center py-3"><div class="spinner-border spinner-border-sm text-primary"></div> Loading slides...</td></tr>';

        try {
            google.script.run
                .withSuccessHandler(function (slides) {
                    console.log('[WS] Hero slides received:', slides ? slides.length : 'NULL');
                    try {
                        allHeroSlides = slides || [];
                        var tbody = document.getElementById('hero-slides-content');
                        if (!tbody) { console.error('[WS] hero-slides-content tbody not found!'); return; }

                        if (!slides || slides.length === 0) {
                            tbody.innerHTML = '<tr><td colspan="4" class="text-center py-5 text-muted">No hero slides found. getData returned: ' + JSON.stringify(slides) + '</td></tr>';
                            return;
                        }

                        var html = '';
                        for (var i = 0; i < slides.length; i++) {
                            var s = slides[i];
                            var sid = s.SlideID || s['Slide ID'] || s.ImageID || s.id || ('idx-' + i);
                            var imgUrl = s.ImageURL || s['Image URL'] || s.url || '';
                            var title = s.Title || s.title || 'No Title';
                            var badge = s.Badge || s.badge || '';
                            var status = (s.Status || s.status || '').toString().toLowerCase();
                            var statusText = status === 'active' ? 'Active' : 'Paused';
                            var badgeClass = status === 'active' ? 'bg-success' : 'bg-secondary';

                            html += '<tr>';
                            html += '<td class="ps-4"><img src="' + imgUrl + '" class="rounded border" style="width: 120px; height: 50px; object-fit: cover;" onerror="this.src=\'https://via.placeholder.com/120x50?text=No+Image\'"></td>';
                            html += '<td><div class="fw-bold text-brown">' + title + '</div><div class="small text-muted">' + badge + '</div></td>';
                            html += '<td><span class="badge ' + badgeClass + '">' + statusText + '</span></td>';
                            html += '<td class="text-end pe-4"><div class="btn-group">';
                            html += '<button class="btn btn-sm btn-outline-primary" onclick="editSlide(\'' + sid + '\')"><i class="fas fa-edit"></i></button>';
                            if (status === 'active') {
                                html += '<button class="btn btn-sm btn-outline-warning" onclick="toggleSlideStatus(\'' + sid + '\', \'Paused\')"><i class="fas fa-pause"></i></button>';
                            } else {
                                html += '<button class="btn btn-sm btn-outline-success" onclick="toggleSlideStatus(\'' + sid + '\', \'Active\')"><i class="fas fa-play"></i></button>';
                            }
                            html += '<button class="btn btn-sm btn-outline-danger" onclick="deleteSlide(\'' + sid + '\')"><i class="fas fa-trash-alt"></i></button>';
                            html += '</div></td></tr>';
                        }
                        tbody.innerHTML = html;
                        console.log('[WS] Rendered ' + slides.length + ' hero slides');
                    } catch (renderErr) {
                        console.error('[WS] Hero render error:', renderErr);
                        var errTbody = document.getElementById('hero-slides-content');
                        if (errTbody) errTbody.innerHTML = '<tr><td colspan="4" class="text-danger fw-bold p-3">RENDER ERROR: ' + renderErr.message + '</td></tr>';
                    }
                })
                .withFailureHandler(function (err) {
                    console.error('[WS] Hero slides server error:', err);
                    var errTbody = document.getElementById('hero-slides-content');
                    if (errTbody) errTbody.innerHTML = '<tr><td colspan="4" class="text-danger fw-bold p-3">SERVER ERROR: ' + (err.message || err) + '</td></tr>';
                })
                .getData('heroSlides');
        } catch (e) {
            console.error('[WS] Hero slides call error:', e);
            if (heroTbody) heroTbody.innerHTML = '<tr><td colspan="4" class="text-danger fw-bold p-3">JS ERROR: ' + e.message + '</td></tr>';
        }

        // Load Carousel Images
        try {
            google.script.run.withFailureHandler(err => { console.error('Backend Error:', err); Swal.fire('System Error', err.message || 'Failed to load data', 'error'); hideAdminLoading && typeof hideAdminLoading === 'function' ? hideAdminLoading() : null; }).withSuccessHandler(function (images) {
                console.log('[WS] Carousel images received:', images ? images.length : 'NULL');
                try {
                    allCarouselImages = images || [];
                    var grid = document.getElementById('carousel-grid-content');
                    if (!grid) { console.error('[WS] carousel-grid-content not found!'); return; }

                    if (!images || images.length === 0) {
                        grid.innerHTML = '<div class="col-12 text-center py-5 text-muted">No carousel images found.</div>';
                        return;
                    }

                    var html = '';
                    for (var i = 0; i < images.length; i++) {
                        var img = images[i];
                        var iid = img.ImageID || img['Image ID'] || img.id || ('ci-' + i);
                        var url = img.ImageURL || img['Image URL'] || img.url || '';
                        var caption = img.Caption || img.caption || iid;
                        var linkedId = img.LinkedProductID || img.linkedId || 'None';
                        var style = JSON.parse(img.StyleJSON || img.stylejson || '{}');

                        var titleStyle = `color: ${style.color || '#3d2b1f'}; font-weight: ${style.fontWeight || '800'};`;

                        html += '<div class="col-md-4 col-lg-3">';
                        html += '<div class="card h-100 shadow-sm border-0 overflow-hidden" onclick="editCarouselImage(\'' + iid + '\')" style="cursor: pointer;" title="Click to edit">';
                        html += '<img src="' + url + '" class="card-img-top" style="height: 120px; object-fit: cover;" onerror="this.src=\'https://via.placeholder.com/120x120?text=No+Image\'">';
                        html += '<div class="card-body p-2">';
                        html += '<div class="d-flex justify-content-between align-items-center mb-1">';
                        html += '<span class="small" style="' + titleStyle + '">' + caption + '</span>';
                        html += '<button class="btn btn-link btn-sm text-danger p-0" onclick="event.stopPropagation(); deleteCarouselImage(\'' + iid + '\')"><i class="fas fa-trash-alt"></i></button>';
                        html += '</div>';
                        html += '<div class="small text-muted"><i class="fas fa-link me-1"></i>Linked: ' + linkedId + '</div>';
                        html += '</div></div></div>';
                    }
                    grid.innerHTML = html;
                    console.log('[WS] Rendered ' + images.length + ' carousel images');
                } catch (renderErr) {
                    console.error('[WS] Carousel render error:', renderErr);
                }
            }).withFailureHandler(function (err) {
                console.error('[WS] Carousel load error:', err);
                var grid = document.getElementById('carousel-grid-content');
                if (grid) grid.innerHTML = '<div class="col-12 text-center py-5 text-danger">SERVER ERROR: ' + (err.message || err) + '</div>';
            }).getData('carousel');
        } catch (e) { console.error('[WS] Carousel call error:', e); }
    }

    // --- Dynamic Link Picker Helper Functions for Hero Slide Buttons ---

    function handleLinkTypeChange(btnNum) {
        const typeSelect = document.getElementById('slide-btn' + btnNum + '-link-type');
        const container = document.getElementById('slide-btn' + btnNum + '-link-target-container');
        if (!typeSelect || !container) return;

        const type = typeSelect.value;
        if (type === 'page') {
            const standardPages = btnNum === 2 ? 
                ['register', 'catalog', 'service_portal', 'complaint', 'installation', 'tracking', 'dealers', 'cart'] :
                ['catalog', 'register', 'service_portal', 'complaint', 'installation', 'tracking', 'dealers', 'cart'];
            
            let html = '<label class="form-label fw-bold" style="font-size: 0.75rem;">Destination</label>';
            html += `<select class="form-select form-select-sm" id="slide-btn${btnNum}-link-target" onchange="handleLinkTargetChange(${btnNum})">`;
            standardPages.forEach(p => {
                const label = p.replace('_', ' ').replace(/\b\w/g, c => c.toUpperCase());
                html += `<option value="${p}">${label}</option>`;
            });
            html += '</select>';
            container.innerHTML = html;
            handleLinkTargetChange(btnNum);
        } else if (type === 'product') {
            container.innerHTML = `
                <label class="form-label fw-bold" style="font-size: 0.75rem;">Destination</label>
                <select class="form-select form-select-sm" id="slide-btn${btnNum}-link-target" onchange="handleLinkTargetChange(${btnNum})">
                    <option value="">Loading products...</option>
                </select>
            `;
            fetchCatalogProductsForSlideDropdown(btnNum);
        } else {
            container.innerHTML = `
                <label class="form-label fw-bold" style="font-size: 0.75rem;">Custom URL / Anchor</label>
                <input type="text" class="form-control form-control-sm" id="slide-btn${btnNum}-link-target-input" placeholder="e.g. #about or https://..." oninput="handleLinkTargetChange(${btnNum})">
            `;
            handleLinkTargetChange(btnNum);
        }
    }

    function fetchCatalogProductsForSlideDropdown(btnNum, selectedVal = '') {
        const select = document.getElementById('slide-btn' + btnNum + '-link-target');
        if (!select) return;

        function populateSelect(products) {
            let html = '<option value="">-- SELECT PRODUCT --</option>';
            products.forEach(p => {
                const pid = p.ProductID || p.productid || p['Product ID'] || '';
                const mNo = p.ModelNo || p.modelno || p['Model Number'] || '';
                const title = p.ProductTitle || p.Name || '';
                html += `<option value="catalog?pid=${pid}">${mNo} - ${title}</option>`;
            });
            select.innerHTML = html;
            if (selectedVal) {
                select.value = selectedVal;
            }
        }

        if (catalogDataCache && catalogDataCache.length > 0) {
            populateSelect(catalogDataCache);
        } else {
            google.script.run
                .withSuccessHandler(data => {
                    catalogDataCache = data || [];
                    populateSelect(catalogDataCache);
                })
                .withFailureHandler(err => {
                    console.error('[Slide Link Dropdown] Product load error:', err);
                    select.innerHTML = '<option value="">Failed to load products</option>';
                })
                .getPublicCatalogProducts();
        }
    }

    function handleLinkTargetChange(btnNum) {
        const typeSelect = document.getElementById('slide-btn' + btnNum + '-link-type');
        const hiddenInput = document.getElementById('slide-btn' + btnNum + 'Url');
        if (!typeSelect || !hiddenInput) return;

        const type = typeSelect.value;
        if (type === 'custom') {
            const input = document.getElementById('slide-btn' + btnNum + '-link-target-input');
            hiddenInput.value = input ? input.value : '';
        } else {
            const select = document.getElementById('slide-btn' + btnNum + '-link-target');
            hiddenInput.value = select ? select.value : '';
        }
    }

    function initSlideLinkFields(btnNum, url) {
        url = url || (btnNum === 2 ? 'register' : 'catalog');
        const typeSelect = document.getElementById('slide-btn' + btnNum + '-link-type');
        const hiddenInput = document.getElementById('slide-btn' + btnNum + 'Url');
        if (hiddenInput) hiddenInput.value = url;
        if (!typeSelect) return;

        const standardPages = ['catalog', 'register', 'service_portal', 'complaint', 'installation', 'tracking', 'dealers', 'cart'];
        
        if (url.includes('catalog?pid=')) {
            typeSelect.value = 'product';
            handleLinkTypeChange(btnNum);
            fetchCatalogProductsForSlideDropdown(btnNum, url);
        } else if (standardPages.includes(url)) {
            typeSelect.value = 'page';
            handleLinkTypeChange(btnNum);
            const targetSelect = document.getElementById('slide-btn' + btnNum + '-link-target');
            if (targetSelect) targetSelect.value = url;
        } else {
            typeSelect.value = 'custom';
            handleLinkTypeChange(btnNum);
            const targetInput = document.getElementById('slide-btn' + btnNum + '-link-target-input');
            if (targetInput) targetInput.value = url;
        }
    }

    // Global exposed helper triggers for standard modal event callbacks
    window.handleLinkTypeChange = handleLinkTypeChange;
    window.handleLinkTargetChange = handleLinkTargetChange;

    // --- Dynamic Link Picker Helper Functions for Carousel Images ---

    function handleGalleryLinkTypeChange() {
        const typeSelect = document.getElementById('gallery-link-type');
        const container = document.getElementById('gallery-link-target-container');
        const hiddenInput = document.getElementById('gallery-linkedId');
        if (!typeSelect || !container || !hiddenInput) return;

        const type = typeSelect.value;
        if (type === 'none') {
            container.innerHTML = `
                <select class="form-select" id="gallery-link-target" disabled>
                    <option value="None">None</option>
                </select>
            `;
            hiddenInput.value = 'None';
        } else {
            container.innerHTML = `
                <select class="form-select" id="gallery-link-target" onchange="handleGalleryLinkTargetChange()">
                    <option value="">Loading products...</option>
                </select>
            `;
            fetchCatalogProductsForGalleryDropdown();
        }
    }

    function fetchCatalogProductsForGalleryDropdown(selectedVal = '') {
        const select = document.getElementById('gallery-link-target');
        if (!select) return;

        function populateSelect(products) {
            let html = '<option value="">-- SELECT PRODUCT --</option>';
            products.forEach(p => {
                const pid = p.ProductID || p.productid || p['Product ID'] || '';
                const mNo = p.ModelNo || p.modelno || p['Model Number'] || '';
                const title = p.ProductTitle || p.Name || '';
                html += `<option value="${pid}">${mNo} - ${title}</option>`;
            });
            select.innerHTML = html;
            if (selectedVal && selectedVal !== 'None') {
                select.value = selectedVal;
            }
        }

        if (catalogDataCache && catalogDataCache.length > 0) {
            populateSelect(catalogDataCache);
        } else {
            google.script.run
                .withSuccessHandler(data => {
                    catalogDataCache = data || [];
                    populateSelect(catalogDataCache);
                })
                .withFailureHandler(err => {
                    console.error('[Gallery Dropdown] Product load error:', err);
                    select.innerHTML = '<option value="">Failed to load products</option>';
                })
                .getPublicCatalogProducts();
        }
    }

    function saveCarouselSlide() {
        const btn = document.getElementById('saveCarouselBtnText');

        let base64 = null;
        if (cropper) {
            try {
                const canvas = cropper.getCroppedCanvas({ width: 1000, height: 1000 });
                if (canvas) {
                    base64 = canvas.toDataURL('image/jpeg', 0.85);
                }
            } catch (cropErr) {
                console.error('Cropper Canvas Error:', cropErr);
                if (!currentEditingSlideId) {
                    Swal.fire('Image Error', 'Could not process the image. Try uploading a new file.', 'error');
                    return;
                }
            }
        } else {
            base64 = window.slideImageBase64 || null;
        }

        if (!base64 && !currentEditingSlideId) {
            Swal.fire('Warning', 'Please select an image first.', 'warning');
            return;
        }

        if (btn) btn.style.opacity = '0.5';
        if (spinner) spinner.style.display = 'inline-block';

        const titleEl = document.getElementById('slide-title') || document.querySelector('input[name="title"]');
        const descEl = document.getElementById('slide-desc') || document.querySelector('textarea[name="subtitle"]');
        const btn1TextEl = document.getElementById('slide-btn1Text') || document.querySelector('input[name="btnText"]');
        const btn1UrlEl = document.getElementById('slide-btn1Url') || document.querySelector('input[name="btnLink"]');

        const data = {
            id: currentEditingSlideId,
            base64: base64,
            title: titleEl ? titleEl.value : '',
            badge: document.getElementById('slide-badge') ? document.getElementById('slide-badge').value : '',
            desc: descEl ? descEl.value : '',
            btn1Text: btn1TextEl ? btn1TextEl.value : '',
            btn1Url: btn1UrlEl ? btn1UrlEl.value : '',
            btn2Text: document.getElementById('slide-btn2Text') ? document.getElementById('slide-btn2Text').value : '',
            btn2Url: document.getElementById('slide-btn2Url') ? document.getElementById('slide-btn2Url').value : '',
            stat1: document.getElementById('slide-stat1') ? document.getElementById('slide-stat1').value : '',
            stat2: document.getElementById('slide-stat2') ? document.getElementById('slide-stat2').value : '',
            stat3: document.getElementById('slide-stat3') ? document.getElementById('slide-stat3').value : '',

                fontSize: document.getElementById('slide-font-size') ? document.getElementById('slide-font-size').value : '3.8',

                color: document.getElementById('slide-text-color') ? document.getElementById('slide-text-color').value : '#1a1a1a'
            })
        };

        const handler = currentEditingSlideId === 'GALLERY_UPLOAD' ? 'addCarouselImage' : (currentEditingSlideId ? 'updateHeroSlide' : 'addHeroSlide');

        google.script.run
            .withSuccessHandler(res => {
                if (btn) btn.style.opacity = '1';
                if (spinner) spinner.style.display = 'none';
                if (res.success) {
                    carouselModal.hide();

            })[handler](data);

    function downloadInvoice(invNum) {
        if (!invNum) return;
        showAdminLoading();
        google.script.run.withSuccessHandler(res => {
            hideAdminLoading();
            if (res.success) {
                const byteCharacters = atob(res.base64);
                const byteNumbers = new Array(byteCharacters.length);
                for (let i = 0; i < byteCharacters.length; i++) {
                    byteNumbers[i] = byteCharacters.charCodeAt(i);
                }
                const byteArray = new Uint8Array(byteNumbers);
                const blob = new Blob([byteArray], { type: 'application/pdf' });
                const blobUrl = URL.createObjectURL(blob);
                
                // Open in new tab
                window.open(blobUrl, '_blank');
                
                // Also trigger download fallback
                const link = document.createElement('a');
                link.href = blobUrl;
                link.download = res.filename;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                Swal.fire({
                    icon: 'success',
                    title: 'Invoice Opened',
                    text: `Invoice ${invNum} has been opened in a new tab.`,
                    timer: 1500,
                    showConfirmButton: false,
                    toast: true,
                    position: 'top-end'
                });
            } else {
                Swal.fire('Error', res.message, 'error');
            }
        }).downloadInvoicePDF(invNum);
    }

    function switchCatalogTab(tabId) {
        // Track the source tab if switching to dashboard/active/archived
        if (['dashboard', 'active', 'archived'].includes(tabId)) {
            catalogSourceTab = tabId;
        }

        document.querySelectorAll('.catalog-tab').forEach(t => t.style.display = 'none');
        document.getElementById('catalog-tab-' + tabId).style.display = 'block';

        document.querySelectorAll('.premium-nav .nav-link').forEach(b => b.classList.remove('active'));
        const activeBtn = document.getElementById('btn-catalog-' + tabId);
        if (activeBtn) activeBtn.classList.add('active');

        // Ensure catalog management data (dropdowns) is loaded
        if (tabId === 'create' || tabId === 'management') {
            if (!catalogMgmtData || Object.keys(catalogMgmtData).length === 0) {
                refreshCatalogManagement();
            } else if (tabId === 'management') {
                // If explicitly clicking management, refresh anyway to show latest
                refreshCatalogManagement();
            }
        }

        if (tabId === 'dashboard') refreshCatalogDashboard();
        else if (tabId === 'active') refreshCatalogList('catalog-active-list-content', 'Active');
        else if (tabId === 'archived') refreshCatalogList('catalog-archived-list-content', 'Archived');
        
        // Dynamic title reset
        if (tabId !== 'create' && !currentEditingCatalogId) {
            document.getElementById('catalog-wizard-title').innerText = 'Create New Catalog Product';
            document.getElementById('catalog-create-btn-text').innerText = 'Create Product';
        }
    }

    function refreshCatalogDashboard() {
        // Pre-fetch management data for dropdowns if empty
        if (!catalogMgmtData || Object.keys(catalogMgmtData).length === 0) {
            refreshCatalogManagement();
        }

        // Fetch stats via safe wrapper
        callServer('getCatalogStats', [], (stats) => {
            if (stats) {
                safeSetText('cat-stat-products', stats.totalProducts || 0);
                safeSetText('cat-stat-categories', stats.totalCategories || 0);
                safeSetText('cat-stat-low-stock', stats.lowStock || 0);
                safeSetText('cat-stat-stock', stats.totalStock || 0);
            }
        });

        // Load the main "Recent" list on the dashboard tab
        refreshCatalogList('catalog-list-content', null);
    }

    function filterCatalogTable(query, tableId) {

        const rows = document.querySelectorAll(`#${tableId} tbody tr`);

            row.style.display = text.includes(q) ? '' : 'none';

    function editCatalogProduct(pid) {
        showAdminLoading();
        console.log('[Catalog] Fetching latest data for product:', pid);
        
        callServer('getCatalogProducts', [], (allProducts) => {
            hideAdminLoading();
            if (!allProducts || allProducts.length === 0) {
                Swal.fire('Error', 'Could not refresh catalog data.', 'error');
                return;
            }
            
            catalogDataCache = allProducts;
            const product = allProducts.find(p => String(p.ProductID || p.productid).trim() === String(pid).trim());
            
            if (!product) {
                Swal.fire('Error', 'Product not found: ' + pid, 'error');
                return;
            }

            currentEditingCatalogId = pid;
            const form = document.getElementById('create-catalog-form');
            if (form) form.reset();

            // Corrected IDs to match dashboard_admin.html
            // Robust field population helper
            const populate = (id, keys) => {
                const el = document.getElementById(id);
                if (!el) return;
                for (let k of keys) {
                    if (product[k] !== undefined && product[k] !== null) {
                        el.value = product[k];
                        return;
                    }
                }
                el.value = '';
            };

            populate('cat-model-name', ['Model Name', 'Name', 'modelname', 'name']);
            populate('cat-part-no', ['Part Number', 'partnumber', 'PartNumber']);
            populate('cat-category', ['Category', 'category']);
            populate('cat-type', ['Mode of Operation', 'ModeOfOperation', 'modeofoperation', 'Type', 'type']);
            populate('cat-model-no', ['Model Number', 'ModelNo', 'modelnumber', 'modelno']);
            populate('cat-product-title', ['Product Title', 'ProductTitle', 'producttitle']);
            populate('cat-tagline', ['Tagline', 'tagline']);
            populate('cat-usage', ['Usage', 'usage']);
            populate('cat-working-type', ['Working Type', 'WorkingType', 'workingtype']);
            populate('cat-voltage', ['Voltage', 'voltage']);
            populate('cat-amps', ['Amps', 'amps']);
            
            const dryRun = product['Dry Run Feature'] || product.DryRunFeature || product.dryrunfeature || 'No';
            document.getElementById('cat-dry-run').value = dryRun;
            
            const timers = product.Timers || product.timers || 'No';
            document.getElementById('cat-timers').value = timers;
            
            populate('cat-in-box', ['In Box Kit', 'InBoxKit', 'inboxkit']);
            populate('cat-wires', ['Wires', 'wires']);
            populate('cat-desc', ['Description', 'description']);
            
            let features = product.Features;
            // Robustly unwrap double/triple nested stringified arrays
            for (let i = 0; i < 3; i++) {
                if (typeof features === 'string' && features.trim().startsWith('[')) {
                    try { features = JSON.parse(features); } catch(e) { break; }
                } else {
                    break;
                }
            }
            if (Array.isArray(features)) {
                features = features.map(item => {
                    let val = item;
                    // Recursively unwrap inner elements if they are stringified arrays
                    for (let j = 0; j < 3; j++) {
                        if (typeof val === 'string' && val.trim().startsWith('[')) {
                            try {
                                let parsed = JSON.parse(val);
                                if (Array.isArray(parsed) && parsed.length > 0) val = parsed[0];
                                else val = parsed;
                            } catch(e) { break; }
                        } else {
                            break;
                        }
                    }
                    if (typeof val === 'string') {
                        // Strip raw escaped backslashes and surrounding double/single quotes
                        val = val.replace(/\\"/g, '"').replace(/\\'/g, "'").replace(/^["']|["']$/g, '').trim();
                    }
                    return val;
                });
                features = features.join('\n');
            } else if (features) {
                features = String(features);
            } else {
                features = '';
            }
            document.getElementById('cat-features').value = features;
            
            populate('cat-warranty', ['Warranty', 'warranty']);
            populate('cat-accessories', ['Accessories', 'accessories']);
            populate('cat-tc', ['T&C', 'TC', 'tc', 'tandc']);
            populate('cat-colors', ['Colors', 'colors']);
            populate('cat-mrp', ['MRP', 'mrp']);
            populate('cat-selling', ['Selling Price', 'SellingPrice', 'sellingprice']);
            populate('cat-offer', ['Offer Price', 'OfferPrice', 'offerprice']);
            populate('cat-inst-inclusive', ['Installation Inclusive', 'InstallationInclusive', 'installationinclusive']);
            populate('cat-inst-charges', ['Installation Charges', 'InstallationCharges', 'installationcharges']);
            populate('cat-free-acc', ['Free Accessory', 'FreeAccessory', 'freeaccessory']);
            
            // Clear and populate YouTube Videos dynamic fields
            const ytContainer = document.getElementById('youtube-videos-container');
            if (ytContainer) ytContainer.innerHTML = '';
            
            let ytVal = product.YouTube || product.youtube || '';
            let videoList = [];
            if (typeof ytVal === 'string' && ytVal.trim().startsWith('[')) {
                try { videoList = JSON.parse(ytVal); } catch(e) {}
            } else if (ytVal && ytVal.trim().length > 10) {
                videoList = [{ title: 'Product Demonstration', url: ytVal }];
            }
            
            if (videoList && Array.isArray(videoList) && videoList.length > 0) {
                videoList.forEach(video => {
                    addYoutubeVideoField(video.title || '', video.url || '');
                });
            } else {
                addYoutubeVideoField('Product Demonstration', ''); // Default row
            }
            
            catalogBanners = [];
            let bannerArr = product.Banners || product.banners || '[]';
            let parsedLayout = 'single';
            
            // Loop up to 3 times to unwrap nested stringifications
            for (let i = 0; i < 3; i++) {
                if (typeof bannerArr === 'string' && bannerArr.trim()) {
                    try {
                        let parsed = JSON.parse(bannerArr);
                        bannerArr = parsed;
                    } catch(e) {
                        break;
                    }
                } else {
                    break;
                }
            }
            
            let bannerItems = [];
            if (Array.isArray(bannerArr)) {
                bannerItems = bannerArr;
            } else if (bannerArr && typeof bannerArr === 'object') {
                parsedLayout = bannerArr.layout || 'single';
                bannerItems = bannerArr.items || [];
            }
            
            const layoutSelect = document.getElementById('cat-banner-layout');
            if (layoutSelect) layoutSelect.value = parsedLayout;

            if (bannerItems && Array.isArray(bannerItems)) {
                bannerItems.forEach(bannerObj => {
                    let url = '';
                    let title = '';
                    let size = '1.25rem';
                    let color = '#333333';
                    
                    if (typeof bannerObj === 'string') {
                        url = bannerObj.trim();
                    } else if (bannerObj && typeof bannerObj === 'object') {
                        url = (bannerObj.url || bannerObj.ImageURL || bannerObj.imageurl || bannerObj.ImageUrl || bannerObj.imageUrl || bannerObj.Image || bannerObj.image || '').trim();
                        title = bannerObj.title || '';
                        size = bannerObj.size || '1.25rem';
                        color = bannerObj.color || '#333333';
                    }
                    
                    if (url && url.length > 10) {
                        catalogBanners.push({ url, title, size, color });
                    }
                });
            }
            renderCatalogBannersPreviews();
            
            catalogImages = [];
            let galleryArr = product.Gallery;
            if (typeof galleryArr === 'string' && galleryArr.trim().startsWith('[')) {
                try { galleryArr = JSON.parse(galleryArr); } catch(e) {}
            }

            if (galleryArr && Array.isArray(galleryArr)) {
                galleryArr.forEach((img, index) => {
                    let imgUrl = null;
                    if (typeof img === 'string') imgUrl = img;
                    else if (typeof img === 'object' && img !== null) {
                        imgUrl = img.ImageBase64 || img.imagebase64 || img.ImageURL || img.imageurl || img.ImageUrl || img.imageUrl || img.url || img.URL;
                    }
                    if (imgUrl && imgUrl.length > 10) {
                        catalogImages.push({ url: imgUrl, isPrimary: index === 0 });
                    }
                });
            }
            
            // Fallback: If gallery is empty but product has a primary image, use it
            if (catalogImages.length === 0 && product.PrimaryImage) {
                console.log('[Catalog] Gallery empty, using PrimaryImage fallback:', product.PrimaryImage);
                catalogImages.push({ url: product.PrimaryImage, isPrimary: true });
            }
            
            renderCatalogImagePreviews();
            calculateDiscount();

            catalogCurrentStep = 1;
            document.querySelectorAll('.wizard-step-content').forEach(c => c.style.display = 'none');
            document.getElementById('step-content-1').style.display = 'block';
            document.querySelectorAll('.step-item').forEach(s => s.classList.remove('active', 'completed'));
            document.getElementById('step-1').classList.add('active');
            document.getElementById('wizard-progress').style.width = '0%';
            document.getElementById('wizard-prev').style.visibility = 'hidden';
            document.getElementById('wizard-next').innerHTML = 'Next <i class="fas fa-arrow-right ms-2"></i>';

            const titleEl = document.getElementById('catalog-wizard-title');
            const btnTextEl = document.getElementById('catalog-create-btn-text');
            if(titleEl) titleEl.innerText = 'Edit Catalog Product: ' + (product.Name || pid);
            if(btnTextEl) btnTextEl.innerText = 'Edit Product';

            switchCatalogTab('create');
            document.querySelector('.wizard-container').scrollIntoView({ behavior: 'smooth' });
        });
    }

        const data = {
            ProductID: currentEditingCatalogId,

            Colors: document.getElementById('cat-colors').value,

            SellingPrice: document.getElementById('cat-selling').value,
            OfferPrice: document.getElementById('cat-offer').value,
            Images: catalogImages.map(img => img.url),
            Banners: JSON.stringify({
                layout: document.getElementById('cat-banner-layout') ? document.getElementById('cat-banner-layout').value : 'single',
                items: catalogBanners
            }),
            YouTube: (function() {
                const rows = document.querySelectorAll('.youtube-video-row');

                    const titleInput = row.querySelector('.yt-title-input');

                return JSON.stringify(list);
            })(),

        showAdminLoading();
        const action = currentEditingCatalogId ? 'updateCatalogProduct' : 'saveCatalogItem';
        
        callServer(action, [data], (res) => {

                form.reset();

                renderCatalogBannersPreviews();

                refreshCatalogList('catalog-active-list-content', 'Active');
                refreshCatalogList('catalog-archived-list-content', 'Archived');

            }

    function calculateDiscount() {
        const mrpInput = document.getElementById('cat-mrp');
        const sellInput = document.getElementById('cat-selling');
        const offerInput = document.getElementById('cat-offer');
        
        const mrp = parseFloat(mrpInput.value) || 0;
        const sell = parseFloat(sellInput.value) || 0;
        const offer = parseFloat(offerInput.value) || 0;
        
        // Final effective price is the lowest of selling or offer price (if set)
        const finalPrice = offer > 0 ? offer : sell;
        
        if (finalPrice > mrp && mrp > 0) {
            if (offer > mrp) offerInput.classList.add('is-invalid');
            else sellInput.classList.add('is-invalid');
            document.getElementById('cat-discount').value = 'Error';
            document.getElementById('cat-discount').style.color = 'red';
        } else {
            sellInput.classList.remove('is-invalid');
            offerInput.classList.remove('is-invalid');
            document.getElementById('cat-discount').style.color = 'inherit';
            if (mrp > 0 && finalPrice > 0) {
                const disc = ((mrp - finalPrice) / mrp) * 100;
                document.getElementById('cat-discount').value = disc.toFixed(1) + '%';
            } else {
                document.getElementById('cat-discount').value = '0%';
            }
        }
    }

    function initCatalogCropper(imgData, callback) {
        const modalEl = document.getElementById('catalogImageModal');
        const modal = new bootstrap.Modal(modalEl);
        const image = document.getElementById('catalog-cropper-image');
        image.src = imgData;
        
        const skipBtn = document.getElementById('catalog-skip-btn');
        if (callback && skipBtn) skipBtn.style.display = 'block';
        else if (skipBtn) skipBtn.style.display = 'none';

        if (catalogCropper) catalogCropper.destroy();

        modal.show();
        
        modalEl.addEventListener('shown.bs.modal', function onShown() {
            catalogCropper = new Cropper(image, {
                aspectRatio: 1,
                viewMode: 1,
                dragMode: 'move',
                autoCropArea: 0.8,
                responsive: true
            });
            modalEl.removeEventListener('shown.bs.modal', onShown);
        }, { once: true });

        window._catalogCropCallback = callback;
    }

        if (!catalogCropper) return;
        const canvas = catalogCropper.getCroppedCanvas({ width: 800, height: 800 });

        if (catalogCurrentEditingIndex !== -1) {
            catalogImages[catalogCurrentEditingIndex].url = croppedData;
        } else {
            catalogImages.push({
                url: croppedData,

        renderCatalogImagePreviews();
        bootstrap.Modal.getInstance(document.getElementById('catalogImageModal')).hide();
        
        if (window._catalogCropCallback) {

            window._catalogCropCallback = null;
            cb();
        }

    function processPartnerLogosFiles(files, index) {
        if (index >= files.length) {
            document.getElementById('stats-partners-input').value = ''; // Reset input
            return;
        }
        
        const file = files[index];
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                try {
                    const canvas = document.createElement('canvas');
                    const max_size = 200; // partner logos are displayed small, 200px is perfect
                    let width = img.width;
                    let height = img.height;
                    
                    if (width > height) {
                        if (width > max_size) {
                            height *= max_size / width;
                            width = max_size;
                        }
                    } else {
                        if (height > max_size) {
                            width *= max_size / height;
                            height = max_size;
                        }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    const compressedBase64 = canvas.toDataURL('image/png'); // Preserve transparent backgrounds
                    partnerLogos.push({ url: compressedBase64 });
                    renderPartnerLogosPreviews();
                } catch (err) {
                    console.error('Error compressing partner logo:', err);
                    partnerLogos.push({ url: e.target.result }); // Fallback to raw base64 if compression fails
                    renderPartnerLogosPreviews();
                }
                processPartnerLogosFiles(files, index + 1);
            };
            img.onerror = function() {
                console.error('Error loading logo image');
                processPartnerLogosFiles(files, index + 1);
            };
            img.src = e.target.result;
        };
        reader.onerror = function() {
            console.error('FileReader error during logo upload');
            processPartnerLogosFiles(files, index + 1);
        };
        reader.readAsDataURL(file);
    }

    function autoFixEditorImage() {
        if (!catalogCropper) return;
        // Get the current cropped canvas and apply auto-enhancement filters
        const canvas = catalogCropper.getCroppedCanvas();
        if (!canvas) return;
        
        const ctx = canvas.getContext('2d');
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;
        
        // Auto-levels: find min/max brightness and stretch
        let minBrightness = 255, maxBrightness = 0;
        for (let i = 0; i < data.length; i += 4) {
            const brightness = (data[i] + data[i+1] + data[i+2]) / 3;
            if (brightness < minBrightness) minBrightness = brightness;
            if (brightness > maxBrightness) maxBrightness = brightness;
        }
        
        const range = maxBrightness - minBrightness;
        if (range > 10) { // Only adjust if there's meaningful range
            const factor = 255 / range;
            for (let i = 0; i < data.length; i += 4) {
                data[i]   = Math.min(255, (data[i] - minBrightness) * factor);   // R
                data[i+1] = Math.min(255, (data[i+1] - minBrightness) * factor); // G
                data[i+2] = Math.min(255, (data[i+2] - minBrightness) * factor); // B
            }
        }
        
        // Slight contrast + saturation boost
        for (let i = 0; i < data.length; i += 4) {
            data[i]   = Math.min(255, Math.max(0, ((data[i] - 128) * 1.1) + 128 + 5));
            data[i+1] = Math.min(255, Math.max(0, ((data[i+1] - 128) * 1.1) + 128 + 5));
            data[i+2] = Math.min(255, Math.max(0, ((data[i+2] - 128) * 1.1) + 128 + 5));
        }
        
        ctx.putImageData(imageData, 0, 0);
        
        // Replace cropper image with the enhanced version
        const enhancedDataUrl = canvas.toDataURL('image/jpeg', 0.9);
        catalogCropper.replace(enhancedDataUrl);
        
        Swal.fire({ title: 'Auto-Fix Applied', icon: 'success', timer: 1200, showConfirmButton: false });
    }

    function rotatePreviewImage(index) {
        const img = new Image();
        img.src = catalogImages[index].url;
        img.onload = function() {
            const canvas = document.createElement('canvas');
            canvas.width = img.height;
            canvas.height = img.width;
            const ctx = canvas.getContext('2d');
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.rotate(90 * Math.PI / 180);
            ctx.drawImage(img, -img.width / 2, -img.height / 2);
            
            catalogImages[index].url = canvas.toDataURL('image/jpeg', 0.8);
            renderCatalogImagePreviews();
        };
    }

    function searchCatalogForInventory(query) {
        if (!query || query.length < 2) {
            document.getElementById('inv-search-results').style.display = 'none';
            return;
        }

        const q = query.toLowerCase();
        const results = catalogDataCache.filter(p => {
            const name = String(p.modelname || p.Name || '').toLowerCase();
            const model = String(p.modelnumber || p.ModelNo || '').toLowerCase();
            const part = String(p.partno || p.PartNumber || '').toLowerCase();
            const title = String(p.producttitle || p.ProductTitle || '').toLowerCase();
            const cat = String(p.category || p.Category || '').toLowerCase();
            const type = String(p.modeofoperation || p.ModeOfOperation || p.Type || '').toLowerCase();
            
            return name.includes(q) || 
                   model.includes(q) || 
                   part.includes(q) || 
                   title.includes(q) || 
                   cat.includes(q) || 
                   type.includes(q);
        });

        const container = document.getElementById('inv-search-results');
        if (results.length === 0) {
            container.innerHTML = '<div class="p-3 text-center text-muted">No matching products found</div>';
        } else {
            let html = '';
            results.forEach(p => {
                const name = p.producttitle || p.Name || p.modelname;
                const model = p.modelnumber || p.ModelNo;
                const part = p.partno || p.PartNumber;
                html += `<a href="#" class="list-group-item list-group-item-action py-3" onclick="selectProductForInventory('${p.ProductID}')">

                        </div>
                        <span class="badge bg-light text-dark border">Stock: ${p.Stock || 0}</span>
                    </div>
                </a>`;
            });
            container.innerHTML = html;
        }
        container.style.display = 'block';
    }

            Swal.fire('Error', 'Failed to load dealers: ' + err.message, 'error');
        }).withSuccessHandler(res => {
            hideAdminLoading();
            if (res.success) {
                dealerDataCache = res.data || [];
                
                // Update stats badges
                const pendingCount = res.stats.pending || 0;
                safeSetText('stat-total-dealers', res.stats.total);
                
                const mainBadge = document.getElementById('badge-pending-dealers');
                const tabBadge = document.getElementById('badge-pending-dealers-tab');
                
                if (pendingCount > 0) {
                    if (mainBadge) { mainBadge.innerText = pendingCount; mainBadge.classList.remove('d-none'); }
                    if (tabBadge) { tabBadge.innerText = pendingCount; tabBadge.classList.remove('d-none'); }
                } else {
                    if (mainBadge) mainBadge.classList.add('d-none');
                    if (tabBadge) tabBadge.classList.add('d-none');
                }
                
                renderDealersTable();
            } else {
                Swal.fire('Error', res.message, 'error');
            }
        }).getDealerData();
    }

    function switchDealerTab(tab) {
        currentDealerTab = tab;
        document.getElementById('btn-dealer-all').classList.toggle('active', tab === 'all');
        document.getElementById('btn-dealer-pending').classList.toggle('active', tab === 'pending');
        renderDealersTable();
    }

    let dealerSearchQuery = '';

    function filterDealers() {
        dealerSearchQuery = document.getElementById('dealer-search-input').value.toLowerCase();
        renderDealersTable();
    }

    function renderDealersTable() {
        const tbody = document.getElementById('dealers-list-body');
        if (!tbody) return;

        let filtered = dealerDataCache;
        
        // 1. Tab Filter
        if (currentDealerTab === 'pending') {
            filtered = filtered.filter(d => String(d.Status || '').toLowerCase().includes('pending') || !d.Status);
        }
        
        // 2. Search Filter
        if (dealerSearchQuery) {
            filtered = filtered.filter(d => {
                const id = String(d['Dealer ID'] || '').toLowerCase();
                const shop = String(d['Shop Name'] || '').toLowerCase();
                const name = String(d['Dealer Name'] || '').toLowerCase();
                const mob = String(d.Mobile || '').toLowerCase();
                const area = String(d.Area || '').toLowerCase();
                return id.includes(dealerSearchQuery) || shop.includes(dealerSearchQuery) || name.includes(dealerSearchQuery) || mob.includes(dealerSearchQuery) || area.includes(dealerSearchQuery);
            });
        }

        if (filtered.length === 0) {
            tbody.innerHTML = `<tr><td colspan="10" class="text-center py-5 text-muted">No ${currentDealerTab === 'pending' ? 'pending ' : ''}dealers found.</td></tr>`;
            return;
        }

        let html = '';
        filtered.forEach(d => {
            const status = String(d.Status || 'Pending').toLowerCase();
            let statusClass = 'bg-secondary';
            if (status.includes('active')) statusClass = 'bg-success';
            else if (status.includes('pending')) statusClass = 'bg-warning text-dark';
            else if (status.includes('blocked') || status.includes('rejected')) statusClass = 'bg-danger';

            const id = d['Dealer ID'] || d.id || 'N/A';
            const shopName = d['Shop Name'] || d.shopname || 'N/A';
            const dealerName = d['Dealer Name'] || d.dealername || 'N/A';
            const mobile = d.Mobile || 'N/A';
            const email = d.Email || 'N/A';
            const address = d.Address || 'N/A';
            const area = d.Area || 'N/A';
            const city = d.City || 'N/A';
            const pincode = d.Pincode || 'N/A';

            const mapsUrl = d['Maps URL'] || d.mapsurl;
            const waLink = mobile !== 'N/A' ? `https://wa.me/91${mobile.replace(/\D/g, '')}` : '#';

            html += `<tr>
                <td class="ps-4 fw-bold text-brown">${shopName}</td>
                <td>${dealerName}</td>
                <td>
                    <div class="d-flex align-items-center gap-2">
                        <span>${mobile}</span>
                        ${mobile !== 'N/A' ? `
                            <a href="tel:${mobile}" class="btn btn-call-dealer btn-outline-primary" title="Call Dealer">
                                <i class="fas fa-phone-alt"></i>
                            </a>
                        ` : ''}
                    </div>
                </td>
                <td class="small">${email}</td>
                <td class="small" title="${address}">${address.length > 20 ? address.substring(0, 20) + '...' : address}</td>
                <td>${area}</td>
                <td>${city}</td>
                <td>${pincode}</td>
                <td><span class="badge ${statusClass}">${status.toUpperCase()}</span></td>
                <td class="text-end pe-4">
                    <div class="dropdown">
                        <button class="btn btn-sm btn-light border dropdown-toggle" data-bs-toggle="dropdown">Actions</button>
                        <ul class="dropdown-menu dropdown-menu-end shadow-sm">
                            <li><a class="dropdown-item" href="javascript:void(0)" onclick="viewDealerDetails('${id}')"><i class="fas fa-eye me-2 text-primary"></i>View Details</a></li>
                            <li><a class="dropdown-item" href="javascript:void(0)" onclick="editDealer('${id}')"><i class="fas fa-edit me-2 text-warning"></i>Edit Record</a></li>
                            ${mapsUrl ? `<li><a class="dropdown-item" href="${mapsUrl}" target="_blank"><i class="fas fa-map-marker-alt me-2 text-success"></i>Find on Map</a></li>` : ''}
                            <li><hr class="dropdown-divider"></li>
                            
                            ${status.includes('pending') ? 
                                `<li><a class="dropdown-item fw-bold text-success" href="javascript:void(0)" onclick="toggleDealerStatusRecord('${id}', 'Active')"><i class="fas fa-check-circle me-2"></i>Approve Application</a></li>
                                 <li><a class="dropdown-item text-danger" href="javascript:void(0)" onclick="toggleDealerStatusRecord('${id}', 'Rejected')"><i class="fas fa-times-circle me-2"></i>Reject Application</a></li>` : ''
                            }

                            ${status.includes('active') ? 
                                `<li><a class="dropdown-item" href="javascript:void(0)" onclick="toggleDealerStatusRecord('${id}', 'Inactive')"><i class="fas fa-power-off me-2 text-muted"></i>Deactivate Dealer</a></li>` : 
                                (status !== 'pending' && status !== 'blocked' ? `<li><a class="dropdown-item text-success" href="javascript:void(0)" onclick="toggleDealerStatusRecord('${id}', 'Active')"><i class="fas fa-play-circle me-2"></i>Activate Dealer</a></li>` : '')
                            }

                            ${!status.includes('blocked') ? 
                                `<li><a class="dropdown-item text-danger" href="javascript:void(0)" onclick="toggleDealerStatusRecord('${id}', 'Blocked')"><i class="fas fa-ban me-2"></i>Block Dealer</a></li>` :
                                `<li><a class="dropdown-item text-success" href="javascript:void(0)" onclick="toggleDealerStatusRecord('${id}', 'Active')"><i class="fas fa-unlock me-2"></i>Unblock/Activate</a></li>`
                            }

                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item text-danger" href="javascript:void(0)" onclick="deleteDealerRecord('${id}')"><i class="fas fa-trash-alt me-2"></i>Delete Record</a></li>
                        </ul>
                    </div>
                </td>
            </tr>`;
        });
        tbody.innerHTML = html;
    }

                    if (res.success) {
                        Swal.fire('Deleted!', res.message, 'success');
